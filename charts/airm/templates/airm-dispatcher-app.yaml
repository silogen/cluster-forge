---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: '{{ .Release.Name }}-cluster-nodes-dispatcher'
  namespace: '{{ .Release.Namespace }}'
spec:
  concurrencyPolicy: Replace
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: check-dispatcher-is-ready
              command:
              - /bin/bash
              - -c
              - |

                apt-get update -y 1> /dev/null 2>&1
                apt-get install ncat -y 1> /dev/null 2>&1
                while ! nc -z "$ENDPOINT_URL_TO_CHECK" "$ENDPOINT_PORT_TO_CHECK"; do
                  echo "Waiting for Airm dispatcher at ${ENDPOINT_URL_TO_CHECK}:${ENDPOINT_PORT_TO_CHECK}..."
                  sleep 3
                done
                echo "Airm dispatcher is accepting connections at ${ENDPOINT_URL_TO_CHECK}:${ENDPOINT_PORT_TO_CHECK}."
                sleep 12
                exit 0

              image: ubuntu:22.04
              imagePullPolicy: IfNotPresent 
              # volumeMounts:
              #   - name: config-script
              #     mountPath: /opt/scripts
              env:
              - name: ENDPOINT_URL_TO_CHECK
                value: "{{ .Release.Name }}-airm-dispatcher.{{ .Release.Namespace }}.svc.cluster.local"
              - name: ENDPOINT_PORT_TO_CHECK
                value: "80" #"{{ .Values.airm.backend.rabbitmqPort }}"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: false
                runAsUser: 0
                capabilities:
                  drop:
                    - ALL
                  add:
                    - SETUID
                    - SETGID
                    - CHOWN
                    - DAC_OVERRIDE
                    - FOWNER
                    - FSETID
                seccompProfile:
                  type: RuntimeDefault

          containers:
          - name: airm-cluster-nodes-cron
            image: '{{ .Values.airm.dispatcher.nodes.image.repository }}:{{ .Values.airm.dispatcher.nodes.image.tag }}'
            imagePullPolicy: '{{ .Values.airm.dispatcher.nodes.image.pullPolicy }}'
            command: ["curl", "-X", "POST", "http://{{ .Release.Name }}-airm-dispatcher:80/v1/clusters/nodes"]
            resources:
              requests:
                memory: "100Mi"
                cpu: "50m"
              limits:
                memory: "100Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{ .Release.Name }}-airm-dispatcher'
  namespace: '{{ .Release.Namespace }}'
spec:
  selector:
    matchLabels:
      app: '{{ .Release.Name }}-airm-dispatcher'
  template:
    metadata:
      labels:
        app: '{{ .Release.Name }}-airm-dispatcher'
    spec:
      serviceAccountName: '{{ .Release.Name }}-airm-dispatcher-sa'

      initContainers:
        - name: check-airmui-is-ready
          command:
          - /bin/bash
          - -c
          - |

            apt-get update -y 1> /dev/null 2>&1
            apt-get install ncat -y 1> /dev/null 2>&1
            while ! nc -z "$ENDPOINT_URL_TO_CHECK" "$ENDPOINT_PORT_TO_CHECK"; do
              echo "Waiting for Airm UI at ${ENDPOINT_URL_TO_CHECK}:${ENDPOINT_PORT_TO_CHECK}..."
              sleep 3
            done
            echo "Airm UI is accepting connections at ${ENDPOINT_URL_TO_CHECK}:${ENDPOINT_PORT_TO_CHECK}."
            sleep 12
            exit 0

          image: ubuntu:22.04
          imagePullPolicy: IfNotPresent 
          # volumeMounts:
          #   - name: config-script
          #     mountPath: /opt/scripts
          env:
          - name: ENDPOINT_URL_TO_CHECK
            value: "{{ .Release.Name }}-airm-api.{{ .Release.Namespace }}.svc.cluster.local"
          - name: ENDPOINT_PORT_TO_CHECK
            value: "80" #"{{ .Values.airm.backend.rabbitmqPort }}"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - FSETID
            seccompProfile:
              type: RuntimeDefault

      containers:
      - name: airm-dispatcher
        image: '{{ .Values.airm.dispatcher.core.image.repository }}:{{ .Values.airm.dispatcher.core.image.tag }}'
        imagePullPolicy: '{{ .Values.airm.dispatcher.core.image.pullPolicy }}'
        ports:
        - containerPort: 8080
        env:
        - name: RABBITMQ_HOST
          value: "{{ .Release.Name }}-rabbitmq.{{ .Release.Namespace }}.svc.cluster.local"
        - name: RABBITMQ_PORT
          value: "5672" #"{{ .Values.airm.backend.rabbitmqPort }}"
        - name: RABBITMQ_AIRM_COMMON_VHOST
          value: "vh_airm_common"
        - name: RABBITMQ_AIRM_COMMON_QUEUE
          value: "airm_common"
        - name: RABBITMQ_USER
          valueFrom:
            secretKeyRef:
              name: '{{ .Release.Name }}-airm-rabbitmq-common-vhost-user'
              key: username
        - name: RABBITMQ_PASSWORD
          valueFrom:
            secretKeyRef:
              name: '{{ .Release.Name }}-airm-rabbitmq-common-vhost-user'
              key: password
        livenessProbe:
          httpGet:
            path: /v1/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
          successThreshold: 1
        readinessProbe:
          httpGet:
            path: /v1/health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
          successThreshold: 1
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "1Gi"
        securityContext:
          runAsUser: 0
---
