---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: '{{ .Release.Name }}-airm-dispatcher-cluster-access-binding'
subjects:
- kind: ServiceAccount
  name: '{{ .Release.Name }}-airm-dispatcher-sa'
  namespace: '{{ .Release.Namespace }}'
roleRef:
  kind: ClusterRole
  name: '{{ .Release.Name }}-airm-dispatcher-cluster-access-role'
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: '{{ .Release.Name }}-airm-dispatcher-cluster-access-role'
rules:
- apiGroups: [""]
  resources: ["services", "namespaces", "configmaps"]
  verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
- apiGroups: ["kaiwo.silogen.ai"]
  resources: ["kaiwojobs", "kaiwoservices", "kaiwoqueueconfigs"]
  verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
- apiGroups: ["gateway.networking.k8s.io"]
  resources: ["httproutes"]
  verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: '{{ .Release.Name }}-airm-dispatcher-sa'
  namespace: '{{ .Release.Namespace }}'

# TODO: Is this service below needed??
---
apiVersion: v1
kind: Service
metadata:
  name: '{{ .Release.Name }}-airm-dispatcher'
  namespace: '{{ .Release.Namespace }}'
  labels:
    app: '{{ .Release.Name }}-airm-dispatcher'
spec:
  ports:
  - name: web
    port: {{ .Values.airm.dispatcher.core.servicePort }}
    targetPort: 8080
  type: ClusterIP
  selector:
    app: '{{ .Release.Name }}-airm-dispatcher'
