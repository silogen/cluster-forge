---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: '{{ .Release.Name }}-airm-api'
  name: '{{ .Release.Name }}-airm-api'
  namespace: '{{ .Release.Namespace }}'
spec:
  ports:
    - name: web
      port: {{ .Values.airm.backend.servicePort }}
      targetPort: 8080
  selector:
    app: '{{ .Release.Name }}-airm-api'
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: '{{ .Release.Name }}-airm-api'
  namespace: '{{ .Release.Namespace }}'
spec:
  selector:
    matchLabels:
      app: '{{ .Release.Name }}-airm-api'
  template:
    metadata:
      labels:
        app: '{{ .Release.Name }}-airm-api'
        auth-required: "true"
    spec:
      containers:
        - env:
            - name: OPENID_CLIENT_ID
              value: '{{ .Values.keycloak.keycloakClientId }}'
            - name: OPENID_CONFIGURATION_URL
              value: 'http://{{ .Values.keycloak.prefixUrl }}.{{ .Values.airm.publicNodeIp }}/realms/airm/.well-known/openid-configuration'
            - name: POST_REGISTRATION_REDIRECT_URL
              value: 'https://{{ .Values.kgateway.airmui.prefixValue }}.{{ .Values.airm.publicNodeIp }}/'
            - name: CLUSTER_BASE_URL
              value: 'https://{{ .Values.airm.workloads.prefixUrl }}.{{ .Values.airm.publicNodeIp }}/'
            - name: DATABASE_HOST
              value: '{{ .Release.Name }}-airm-cnpg-rw.{{ .Release.Namespace }}.svc.cluster.local'
            - name: DATABASE_PORT
              value: '{{ .Values.airm.backend.env.dbPort }}'
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: '{{ .Release.Name }}-airm-cnpg-user'
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: '{{ .Release.Name }}-airm-cnpg-user'
            - name: RABBITMQ_HOST
              value: '{{ .Release.Name }}-rabbitmq.{{ .Release.Namespace }}.svc.cluster.local'
            - name: RABBITMQ_PORT
              value: '{{ .Values.airm.backend.env.rabbitmqPort }}'
            - name: RABBITMQ_MANAGEMENT_URL
              value: http://{{ .Release.Name }}-rabbitmq.{{ .Release.Namespace }}.svc.cluster.local:15672/api
            - name: RABBITMQ_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: '{{ .Release.Name }}-airm-rabbitmq-admin'
            - name: RABBITMQ_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: '{{ .Release.Name }}-airm-rabbitmq-admin'
            - name: KEYCLOAK_ADMIN_SERVER_URL
              value: 'http://{{ .Values.keycloak.serviceName }}.{{ .Values.keycloak.namespace }}.svc.cluster.local:{{ .Values.keycloak.servicePort }}'
            - name: KEYCLOAK_REALM
              value: airm
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: client-id
                  name: '{{ .Release.Name }}-airm-keycloak-admin-client'
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: client-secret
                  name: '{{ .Release.Name }}-airm-keycloak-admin-client'
            - name: MINIO_URL
              value: '{{ .Values.airm.backend.env.minio_url }}'
            - name: MINIO_BUCKET
              value: '{{ .Values.airm.backend.env.minio_bucket }}' 
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  key: minio-access-key
                  name: '{{ .Release.Name }}-api-minio-credentials'
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  key: minio-secret-key
                  name: '{{ .Release.Name }}-api-minio-credentials'
            - name: PROMETHEUS_URL
              value: '{{ .Values.airm.backend.env.prometheus_url }}'  
          image: '{{ .Values.airm.backend.image.repository }}:{{ .Values.airm.backend.image.tag }}'
          imagePullPolicy: {{ .Values.airm.backend.image.pullPolicy }}
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 2
          name: airm
          ports:
            - containerPort: 8080
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 2
          resources:
            {{- toYaml .Values.airm.backend.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.airm.backend.securityContext | nindent 12 }}
      initContainers:
        - command:
            - sh
            - -c
            - cp /code/migrations/* /mnt/code/migrations/
          image: '{{ .Values.airm.backend.image.repository }}:{{ .Values.airm.backend.image.tag }}'
          name: init-migration-scripts
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - mountPath: /mnt/code/migrations
              name: airm-migration-volume
        - command:
            - liquibase
            - --url=jdbc:postgresql://{{ .Release.Name }}-airm-cnpg-rw.{{ .Release.Namespace }}.svc.cluster.local:5432/airm 
            - --username=$(DATABASE_USER)
            - --password=$(DATABASE_PASSWORD)
            - --logLevel=INFO
            - --changeLogFile=changelog/changelog.xml
            - update
          env:
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: '{{ .Release.Name }}-airm-cnpg-user'
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: '{{ .Release.Name }}-airm-cnpg-user'
          image: {{ .Values.airm.backend.initContainers.image }}
          name: liquibase-migrate
          volumeMounts:
            - mountPath: /liquibase/changelog
              name: airm-migration-volume
              readOnly: true
        - name: check-rabbitmq-is-ready
          command:
          - /bin/bash
          - -c
          - |

            # airmchartdemo-rabbitmq.silodemo-airm.svc.cluster.local:5672
            apt-get update -y && apt-get install ncat -y 1> /dev/null 2>&1
            while ! nc -z "$RABBITMQ_HOST" "$RABBITMQ_PORT"; do
              echo "Waiting for RabbitMQ at ${RABBITMQ_HOST}:${RABBITMQ_PORT}..."
              sleep 3
            done
            sleep 12
            echo "RabbitMQ is accepting connections at ${RABBITMQ_HOST}:${RABBITMQ_PORT}."
            exit 0

          image: ubuntu:22.04
          imagePullPolicy: IfNotPresent 
          # volumeMounts:
          #   - name: config-script
          #     mountPath: /opt/scripts
          env:
          - name: RABBITMQ_HOST
            value: "{{ .Release.Name }}-rabbitmq.{{ .Release.Namespace }}.svc.cluster.local"
          - name: RABBITMQ_PORT
            value: "5672" #"{{ .Values.airm.backend.rabbitmqPort }}"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
            runAsUser: 0
            capabilities:
              drop:
                - ALL
              add:
                - SETUID
                - SETGID
                - CHOWN
                - DAC_OVERRIDE
                - FOWNER
                - FSETID
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - emptyDir: {}
          name: airm-migration-volume
