clusterForge:
  repoUrl: "https://github.com/silogen/cluster-forge.git"
  targetRevision: gitops-forge
  valuesFile: "values.yaml"

externalValues:
  enabled: false
  repoUrl: # define if enabled
  targetRevision: main

common:
  domain: localhost

apps:

  # Core apps
  - name: argo-cd
    path: argo-cd/8.3.0
    namespace: argocd
    valuesFile: values.yaml
    #valuesFile: ../values_ha.yaml
    syncWave: -100

  - name: cert-manager
    path: cert-manager/v1.18.2
    namespace: cert-manager
    valuesFile: ../custom_values.yaml
    syncWave: -50

  - name: external-secrets
    path: external-secrets/0.19.2
    namespace: external-secrets
    valuesFile: values.yaml
    syncWave: -50

  - name: k8s-cluster-secret-store
    path: k8s-cluster-secret-store
    namespace: cf-es-backend
    syncWave: -40

  # Network apps
  - name: gateway-api
    path: gateway-api/v1.3.0
    namespace: default
    syncWave: -50

  - name: metallb
    path: metallb/v0.15.2
    namespace: default
    syncWave: -50

  - name: kgateway-crds
    path: kgateway-crds/v2.0.4
    namespace: kgateway-system
    valuesFile: values.yaml
    syncWave: -45

  - name: kgateway
    path: kgateway/v2.0.4
    namespace: kgateway-system
    valuesFile: values.yaml
    syncWave: -40

  - name: kgateway-config
    path: kgateway-config
    namespace: kgateway-system
    valuesFile: values.yaml
    helmParameters:
      - name: domain
        value: "{{ .Values.common.domain }}"
    syncWave: -35

  # Monitoring
  - name: prometheus-crds
    path: prometheus-crds/23.0.0
    namespace: prometheus-system
    valuesFile: values.yaml
    syncWave: -50

  - name: opentelemetry-operator
    path: opentelemetry-operator/0.93.1
    namespace: opentelemetry-operator-system
    valuesFile: values.yaml
    syncWave: -45

  - name: otel-lgtm-stack
    path: otel-lgtm-stack
    namespace: otel-lgtm-stack
    valuesFile: values.yaml
    syncWave: -20

  # Databases
  - name: cnpg-operator
    path: cnpg-operator/0.26.0
    namespace: cnpg-system
    valuesFile: values.yaml
    syncWave: -30

  # Access control
  - name: keycloak
    path: keycloak/18.10.0-patched
    namespace: keycloak
    valuesFile: ../values_custom.yaml
    syncWave: -30

  - name: keycloak-config
    path: keycloak-config
    namespace: keycloak
    valuesFile: values.yaml
    helmParameters:
      - name: domain
        value: "{{ .Values.common.domain }}"
    syncWave: -30

  - name: kyverno
    path: keycloak/3.5.1
    namespace: kyverno
    valuesFile: values.yaml
    syncWave: -30

  #  - name: kyverno-config
  #    path: kyverno-config
  #    namespace: kyverno
  #    syncWave: -30

  # GPU
  - name: amd-gpu-operator
    path: amd-gpu-operator/1.3.1
    namespace: kube-amd-gpu
    valuesFile: values.yaml
    syncWave: -30

  - name: amd-gpu-operator-config
    path: amd-gpu-operator-config
    namespace: kube-amd-gpu
    syncWave: -30

  - name: kuberay-operator
    path: kuberay-operator/1.4.2
    namespace: default
    valuesFile: values.yaml
    syncWave: -30

  # Queues
  - name: rabbitmq
    path: rabbitmq/v2.15.0
    namespace: rabbitmq-system
    syncWave: -30

  - name: kueue
    path: kueue/0.13.0
    namespace: kueue-system
    valuesFile: ../values_ha.yaml
#    valuesFile: ../values_onenode.yaml
    syncWave: -30

  - name: kueue-config
    path: kueue-config
    namespace: kueue-system
    syncWave: -30

  - name: appwrapper
    path: appwrapper/v1.1.2
    namespace: appwrapper-system
    syncWave: -30

  # Storage
  - name: minio-operator
    path: minio-operator/7.1.1
    namespace: minio-operator
    valuesFile: values.yaml
    syncWave: -30

  - name: minio-tenant
    path: minio-tenant/7.1.1
    namespace: minio-tenant-default
    valuesFile: ../values_custom.yaml
    syncWave: -30

  - name: minio-tenant-config
    path: minio-tenant-config
    namespace: minio-tenant-default
    valuesFile: values.yaml
    syncWave: -30

  # Kaiwo stuff
  - name: kaiwo
    path: kaiwo/v0.1.7
    namespace: kaiwo
    syncWave: -30

  - name: kaiwo-config
    path: kaiwo-config
    namespace: kaiwo
    syncWave: -25

  # Airm stuff
  - name: airm
    path: airm
    namespace: airm
    valuesFile: values.yaml
    helmParameters:
      - name: domain
        value: "{{ .Values.common.domain }}"
    syncWave: -20

  - name: airm-config
    path: airm-config
    namespace: airm
    syncWave: -25

  - name: airm-configure
    path: airm-configure
    namespace: default
    valuesFile: values.yaml
    helmParameters:
      - name: domain
        value: "{{ .Values.common.domain }}"
    syncWave: -30

  # Etc..

#  - name: openbao
#    path: openbao/0.16.3
#    namespace: openbao
#    valuesFile: values.yaml
#    syncWave: 1
#    ignoreDifferences:
#      - group: "apps"
#        kind: "Deployment"
#        jsonPointers:
#          - /spec/replicas