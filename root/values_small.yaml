enabledApps:
  - aim-cluster-model-source
  - aim-engine
  - aim-engine-crds
  - airm
  - airm-infra-cnpg
  - airm-infra-external-secrets
  - airm-infra-rabbitmq
  - aiwb
  - aiwb-infra-cnpg
  - aiwb-infra-external-secrets
  - amd-gpu-operator
  - amd-gpu-operator-config
  - appwrapper
  - argocd
  - argocd-config
  - cert-manager
  - cluster-auth
  - cluster-auth-config
  - cnpg-operator
  - external-secrets
  - external-secrets-config
  - gateway-api
  - gitea
  - gitea-config
  - kaiwo
  - kaiwo-config
  - kaiwo-crds
  - keda
  - kedify-otel
  - keycloak
  - kgateway
  - kgateway-config
  - kgateway-crds
  - kserve
  - kserve-crds
  - kuberay-operator
  - kueue
  - kueue-config
  - kyverno
  - kyverno-policies-base               # applicable to all cluster sizes
  - kyverno-policies-storage-local-path # small & medium cluster sizes only
  - metallb
  - minio-operator
  - minio-tenant
  - minio-tenant-config
  - openbao
  - openbao-config
  - openbao-init
  - opentelemetry-operator
  - otel-lgtm-stack
  - prometheus-crds
  - rabbitmq

apps:
  argocd:
    valuesObject:
      applicationSet:
        replicas: 1
      controller:
        replicas: 1
        resources:
          limits:
            cpu: "2000m"
            memory: "4Gi"
          requests:
            cpu: "500m" 
            memory: "1Gi"
      redis-ha:
        enabled: false
        redis:
          resources:
            limits:
              cpu: "1000m"
              memory: "2Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
      repoServer:
        replicas: 1
        resources:
          limits:
            cpu: "1000m" 
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
      server:
        replicas: 1
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "125m"
            memory: "256Mi"
  grafana:
    valuesObject:
      persistence:
        accessModes:
          - ReadWriteOnce
        enabled: true
        size: 5Gi
        storageClassName: local-path
      replicas: 1
      resources:
        limits:
          cpu: "1000m"
          memory: "2Gi"
        requests:
          cpu: "250m"
          memory: "512Mi"
  kyverno-policies-storage-local-path:
    ignoreDifferences: []
    namespace: kyverno
    path: kyverno-policies/storage-local-path
    source: clusterForge
    syncOptions:
      - CreateNamespace=true
    syncWave:
      - group: kyverno.io
        kind: ClusterPolicy
    wave: 26  # Deploy after base policies
  minio-tenant:
    valuesObject:
      tenant:
        buckets:
          - name: default-bucket
            objectLock: true
          - name: models
            objectLock: true
          - name: datasets
            objectLock: false
        pools:
          - name: pool-0
            servers: 1
            size: 2Ti
            storageClassName: local-path
            volumesPerServer: 2
        resources:
          limits:
            cpu: "4000m"
            memory: "8Gi"
          requests:
            cpu: "1000m"
            memory: "2Gi"
  openbao:
    valuesObject:
      server:
        dataStorage:
          size: 5Gi
          storageClass: local-path
        ha:
          enabled: false
          raft:
            enabled: false
          replicas: 1
        resources:
          limits:
            cpu: "1000m"
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
  prometheus:
    valuesObject:
      prometheus:
        prometheusSpec:
          resources:
            limits:
              cpu: "2000m"
              memory: "4Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          retention: 15d
          retentionSize: 20GB
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 25Gi
                storageClassName: local-path
