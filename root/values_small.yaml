# Medium & Small clusters add local-path storage policy for RWX→RWO conversion

global:
  clusterSize: values_small.yaml

# Small cluster uses GitHub (no Gitea deployed)
clusterForge:
  repoUrl: "https://github.com/silogen/cluster-forge.git"
  targetRevision: main  # Overridden by bootstrap --target-revision flag
externalValues:
  enabled: false

enabledApps:
  - aim-cluster-model-source
  - aim-engine
  - aim-engine-crds
  - airm
  - airm-infra-cnpg
  - airm-infra-external-secrets
  - airm-infra-rabbitmq
  - aiwb
  - aiwb-infra-cnpg
  - aiwb-infra-external-secrets
  - amd-gpu-operator
  - amd-gpu-operator-config
  - appwrapper
  - argocd
  - argocd-config
  - cert-manager
  - cert-manager-config
  - cluster-auth
  - cluster-cert
  - cluster-auth-config
  - cnpg-operator
  - external-secrets
  - external-secrets-config
  - gateway-api
  - kaiwo
  - kaiwo-config
  - kaiwo-crds
  - keda
  - kedify-otel
  - keycloak
  - kgateway
  - kgateway-config
  - kgateway-crds
  - kserve
  - kserve-crds
  - kuberay-operator
  - kueue
  - kueue-config
  - kyverno
  - kyverno-policies-base               # applicable to all cluster sizes
  - kyverno-policies-storage-local-path # small & medium cluster sizes only
  - metallb
  - minio-operator
  - minio-tenant
  - minio-tenant-config
  - openbao
  - openbao-config
  - openbao-init
  - opentelemetry-operator
  - otel-lgtm-stack
  - prometheus-crds
  - rabbitmq

apps:
  # Modular Kyverno policy applications (only the storage-local-path addition)
  cluster-cert:
    namespace: static-cert-system
  kyverno-policies-storage-local-path:
    namespace: kyverno
    path: kyverno-policies/storage-local-path
    syncWave: -25
    ignoreDifferences:
      - group: kyverno.io
        kind: ClusterPolicy
        jsonPointers:
          - /spec/rules/*/skipBackgroundRequests
          - /spec/rules/*/validate/allowExistingViolations
  airm-infra-cnpg:
    syncWave: 5
    valuesObject:
      instances: 1
      storage:
        storageClass: local-path
      walStorage:
        storageClass: local-path
  airm-infra-rabbitmq:
    syncWave: 5
    valuesObject:
      persistence:
        storageClassName: local-path
  aiwb-infra-cnpg:
    syncWave: 5
    valuesObject:
      instances: 1
      storage:
        storageClass: local-path
      walStorage:
        storageClass: local-path
  argocd:
    valuesObject:
      applicationSet:
        replicas: 1
      controller:
        replicas: 1
        resources:
          limits:
            memory: "2Gi"
          requests:
            cpu: "125m" 
            memory: "1Gi"
      redis-ha:
        enabled: false
        redis:
          resources:
            limits:
              memory: "1Gi"
            requests:
              cpu: "5m"
              memory: "512Mi"
      repoServer:
        replicas: 1
        resources:
          limits:
            memory: "1Gi"
          requests:
            cpu: "25m"
            memory: "512Mi"
      server:
        replicas: 1
        resources:
          limits:
            memory: "1Gi"
          requests:
            cpu: "25m"
            memory: "256Mi"
  grafana:
    valuesObject:
      persistence:
        accessModes:
          - ReadWriteOnce
        enabled: true
        size: 5Gi
        storageClassName: local-path
      replicas: 1
      resources:
        limits:
          memory: "2Gi"
        requests:
          cpu: "125m"
          memory: "512Mi"
  keycloak:
    syncWave: 5
    valuesObject:
      # Increase memory resources for Keycloak to prevent OOMKilled during initialization
      # Medium preset provides 1536Mi memory limit vs small preset's 768Mi
      resourcesPreset: "medium"
      cnpg:
        storage:
          storageClass: local-path
        walStorage:
          storageClass: local-path
  minio-operator:
    valuesObject:
      operator:
        replicaCount: 1
  minio-tenant:
    valuesObject:
      tenant:
        buckets:
          - name: default-bucket
            objectLock: true
          - name: models
            objectLock: true
          - name: datasets
            objectLock: false
        pools:
          - name: pool-0
            servers: 1
            size: 2Ti
            storageClassName: local-path
            volumesPerServer: 2
        resources:
          limits:
            memory: "8Gi"
          requests:
            cpu: "500m"
            memory: "2Gi"
  openbao:
    valuesObject:
      server:
        dataStorage:
          size: 5Gi
          storageClass: local-path
        ha:
          enabled: false
          raft:
            enabled: false
          replicas: 1
        resources:
          limits:
            memory: "2Gi"
          requests:
            cpu: "5m"
            memory: "512Mi"
  otel-lgtm-stack:
    syncWave: 5
  prometheus:
    valuesObject:
      prometheus:
        prometheusSpec:
          resources:
            limits:
              memory: "4Gi"
            requests:
              cpu: "250m"
              memory: "1Gi"
          retention: 15d
          retentionSize: 20GB
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 25Gi
                storageClassName: local-path
