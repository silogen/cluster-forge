externalValues:
  enabled: false
clusterForge:
  valuesFile: values.yaml
  repoUrl: "https://github.com/silogen/cluster-forge.git"
enabledApps:
  - aim-cluster-model-source
  - aim-engine
  - aim-engine-crds
  - airm
  - airm-infra-cnpg
  - airm-infra-external-secrets
  - airm-infra-rabbitmq
  - aiwb
  - aiwb-infra-cnpg
  - aiwb-infra-external-secrets
  - amd-gpu-operator
  - amd-gpu-operator-config
  - appwrapper
  - argocd
  - argocd-config
  - cert-manager
  - cluster-auth
  - cluster-auth-config
  - cnpg-operator
  - external-secrets
  - external-secrets-config
  - gitea
  - gitea-config
  - kaiwo
  - kaiwo-config
  - kaiwo-crds
  - keda
  - kedify-otel
  - keycloak
  - kserve
  - kserve-crds
  - kuberay-operator
  - kueue
  - kueue-config
  - kyverno
  - kyverno-policies-base # applicable to all cluster sizes
  - kyverno-policies-storage-local-path # small & medium cluster sizes only
  - metallb
  - openbao
  - openbao-config
  - opentelemetry-operator
  - otel-lgtm-stack
  - prometheus-crds
  - rabbitmq
  - gateway-api
  - kgateway
  - kgateway-config
  - kgateway-crds
  - minio-operator
  - minio-tenant
  - minio-tenant-config
apps:
  argocd:
    valuesObject:
      applicationSet:
        replicas: 1
      controller:
        replicas: 1
        resources:
          limits:
            cpu: "2000m"
            memory: "4Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
      redis-ha:
        enabled: false
        redis:
          resources:
            limits:
              cpu: "1000m"
              memory: "2Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
      repoServer:
        replicas: 1
        resources:
          limits:
            cpu: "1000m"
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
      server:
        replicas: 1
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "125m"
            memory: "256Mi"
  grafana:
    valuesObject:
      persistence:
        accessModes:
          - ReadWriteOnce
        enabled: true
        size: 5Gi
        storageClassName: direct
      replicas: 1
      resources:
        limits:
          cpu: "1000m"
          memory: "2Gi"
        requests:
          cpu: "250m"
          memory: "512Mi"
  seaweedfs-config:
    valuesObject:
      seaweed:
        storageClassName: mlstorage
        master:
          replicas: 1
          volumeSizeLimitMB: 1024
        volume:
          replicas: 1
          requests:
            storage: 250Gi
        filer:
          replicas: 1
          requests:
            storage: 10Gi
  openbao:
    valuesObject:
      server:
        dataStorage:
          size: 5Gi
          storageClass: direct
        ha:
          enabled: false
          raft:
            enabled: false
          replicas: 1
        resources:
          limits:
            cpu: "1000m"
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
  prometheus:
    valuesObject:
      prometheus:
        prometheusSpec:
          resources:
            limits:
              cpu: "2000m"
              memory: "4Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          retention: 15d
          retentionSize: 20GB
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 25Gi
                storageClassName: direct
