{{- $clusterForgeRepoUrl := .Values.clusterForge.repoUrl }}
{{- $clusterForgeTargetRevision := .Values.clusterForge.targetRevision }}
{{- $root := . }}
{{- range .Values.enabledApps }}
{{- $name := . }}
{{- $scope := (index $.Values.apps .) | required (printf "Values for app %s are missing!" $name) }}
{{- with $scope }}
{{- $renderedRepoURL := "" }}
{{- if .repoURL }}
{{- $renderedRepoURL = tpl .repoURL $root }}
{{- end }}
{{- $useMultiSource := and .repoURL .valuesFiles }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
spec:
  project: default
  {{- if $useMultiSource }}
  sources:
    # Primary source: OCI/external chart
    - repoURL: {{ $renderedRepoURL }}
      {{- if hasPrefix "oci://" $renderedRepoURL }}
      {{- if eq .path "." }}
      chart: {{ trimPrefix "oci://" $renderedRepoURL | base }}
      {{- else }}
      chart: {{ .path }}
      {{- end }}
      {{- else }}
      path: {{ .path }}
      {{- end }}
      targetRevision: {{ .repoVersion | default $clusterForgeTargetRevision | quote }}
      helm:
        {{- if .valuesFiles }}
        valueFiles:
        {{- if kindIs "slice" .valuesFiles }}
        {{- range $idx, $file := .valuesFiles }}
        {{- if hasPrefix "../" $file }}
          - $values/sources/{{ $name }}/{{ trimPrefix "../" $file }}
        {{- else }}
          - {{ $file }}
        {{- end }}
        {{- end }}
        {{- else }}
        {{- if hasPrefix "../" .valuesFiles }}
          - $values/sources/{{ $name }}/{{ trimPrefix "../" .valuesFiles }}
        {{- else }}
          - {{ .valuesFiles }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if .valuesObject }}
        values: |
        {{ .valuesObject | toYaml | nindent 10 }}
        {{- end }}
        {{- if .helmParameters }}
        parameters:
        {{- range $parameter := .helmParameters }}
          - name: {{ include "common.tplvalues.render" ( dict "value" $parameter.name "context" $) | quote }}
            value: {{ include "common.tplvalues.render" ( dict "value" $parameter.value "context" $) | quote }}
        {{- end }}
        {{- end }}
    # Secondary source: cluster-forge repo for values files
    - repoURL: {{ $clusterForgeRepoUrl }}
      targetRevision: {{ $clusterForgeTargetRevision | quote }}
      ref: values
  {{- else }}
  source:
    repoURL: {{ $renderedRepoURL | default $clusterForgeRepoUrl }}
    targetRevision: {{ .repoVersion | default $clusterForgeTargetRevision | quote }}
    {{- if .repoURL }}
    {{- if hasPrefix "oci://" $renderedRepoURL }}
    {{- if or (eq .path ".") (not .path) }}
    chart: {{ trimPrefix "oci://" $renderedRepoURL | base }}
    {{- else }}
    chart: {{ .path }}
    {{- end }}
    {{- else }}
    path: {{ .path }}
    {{- end }}
    {{- else }}
    path: sources/{{ .path }}
    {{- end }}
    {{- if or .valuesFile .valuesFiles .valuesObject .helmParameters }}
    helm:
      {{- if or .valuesFile .valuesFiles }}
      valueFiles:
      {{- end }}
      {{- if .valuesFile }}
        - {{ .valuesFile }}
      {{- end }}
      {{- if .valuesFiles }}
      {{- if kindIs "slice" .valuesFiles }}
      {{- range .valuesFiles }}
        - {{ . }}
      {{- end }}
      {{- else }}
        - {{ .valuesFiles }}
      {{- end }}
      {{- end }}
      {{- if .valuesObject }}
      values: |
      {{ .valuesObject | toYaml | nindent 8 }}
      {{- end }}
      {{- if .helmParameters }}
      parameters:
      {{- range $parameter := .helmParameters }}
        - name: {{ include "common.tplvalues.render" ( dict "value" $parameter.name "context" $) | quote }}
          value: {{ include "common.tplvalues.render" ( dict "value" $parameter.value "context" $) | quote }}
      {{- end }}
      {{- end }}
    {{- end }}
    {{- with .directory }}
    directory: {{ . | toYaml | nindent 6 }}
    {{- end }}
  {{- end }}
{{- with .ignoreDifferences }}
  ignoreDifferences: {{ . | toYaml | nindent 2 }}
{{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      {{- if .ignoreDifferences }}
      - RespectIgnoreDifferences=true
      {{- end }}
{{- end }}
{{- end }}