{{- $clusterForgeRepoUrl := .Values.clusterForge.repoUrl }}
{{- $clusterForgeTargetRevision := .Values.clusterForge.targetRevision }}
{{- range .Values.enabledApps }}
{{- $name := . }}
{{- $scope := (index $.Values.apps .) | required (printf "Values for app %s are missing!" $name) }}
{{- with $scope }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ $name }}
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "{{ .syncWave }}"
spec:
  project: default
  source:
    repoURL: {{ .repoURL | default $clusterForgeRepoUrl }}
    targetRevision: {{ .repoVersion | default $clusterForgeTargetRevision }}
    {{- if .repoURL }}
    path: {{ .path }}
    {{- else }}
    path: sources/{{ .path }}
    {{- end }}
    {{- if or .valuesFile .valuesObject .helmParameters }}
    helm:
      {{- if .valuesFile }}
      valueFiles:
        - {{ .valuesFile }}
      {{- end }}
      {{- if .valuesObject }}
      values: |
      {{ .valuesObject | toYaml | nindent 8 }}
      {{- end }}
      {{- if .helmParameters }}
      parameters:
      {{- range $parameter := .helmParameters }}
        - name: {{ include "common.tplvalues.render" ( dict "value" $parameter.name "context" $) | quote }}
          value: {{ include "common.tplvalues.render" ( dict "value" $parameter.value "context" $) | quote }}
      {{- end }}
      {{- end }}
    {{- end }}
    {{- with .directory }}
    directory: {{ . | toYaml | nindent 6 }}
    {{- end }}
{{- $ignoreDiffs := .ignoreDifferences | default list }}
{{- if $.Values.global.requestsIgnoreDifferences }}
  {{- $deploymentIgnore := dict "group" "apps" "kind" "Deployment" "jqPathExpressions" (list ".spec.template.spec.containers[].resources.requests.cpu" ".spec.template.spec.initContainers[].resources.requests.cpu") }}
  {{- $statefulSetIgnore := dict "group" "apps" "kind" "StatefulSet" "jqPathExpressions" (list ".spec.template.spec.containers[].resources.requests.cpu" ".spec.template.spec.initContainers[].resources.requests.cpu") }}
  {{- $daemonSetIgnore := dict "group" "apps" "kind" "DaemonSet" "jqPathExpressions" (list ".spec.template.spec.containers[].resources.requests.cpu" ".spec.template.spec.initContainers[].resources.requests.cpu") }}
  {{- $replicaSetIgnore := dict "group" "apps" "kind" "ReplicaSet" "jqPathExpressions" (list ".spec.template.spec.containers[].resources.requests.cpu" ".spec.template.spec.initContainers[].resources.requests.cpu") }}
  {{- $jobIgnore := dict "group" "batch" "kind" "Job" "jqPathExpressions" (list ".spec.template.spec.containers[].resources.requests.cpu" ".spec.template.spec.initContainers[].resources.requests.cpu") }}
  {{- $cronJobIgnore := dict "group" "batch" "kind" "CronJob" "jqPathExpressions" (list ".spec.jobTemplate.spec.template.spec.containers[].resources.requests.cpu" ".spec.jobTemplate.spec.template.spec.initContainers[].resources.requests.cpu") }}
  {{- $ignoreDiffs = append $ignoreDiffs $deploymentIgnore $statefulSetIgnore $daemonSetIgnore $replicaSetIgnore $jobIgnore $cronJobIgnore }}
{{- end }}
{{- if $ignoreDiffs }}
  ignoreDifferences:
{{ $ignoreDiffs | toYaml | nindent 4 }}
{{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      {{- if or .ignoreDifferences $.Values.global.requestsIgnoreDifferences }}
      - RespectIgnoreDifferences=true
      {{- end }}
{{- end }}
{{- end }}