# MEDIUM CLUSTER CONFIGURATION  
# Target: Team Cluster (5-20 users)
# Nodes: 1-3 nodes (Option A: 1×CP + 1-2 GPU workers, Option B: 3×CP + GPU workers)
# CPU: 32-64 vCPU per GPU node, Memory: 128-256 GB RAM per GPU node  
# GPU: Up to 8 GPUs total, partitioning optional
# Storage: 4-16 TB total NVMe, Internal S3: 2-10 TB via MinIO
# Networking: 10 GbE recommended

apps:
  argocd:
    valuesObject:
      applicationSet:
        pdb:
          enabled: true
        replicas: 2
      controller:
        pdb:
          enabled: true
        replicas: 2
        # Medium tier resource allocation  
        resources:
          limits:
            cpu: "2000m"
            memory: "4Gi"
          requests:
            cpu: "500m" 
            memory: "1Gi"
      redis:
        enabled: false
      redis-ha:
        enabled: true
        # Medium tier Redis HA resources
        redis:
          resources:
            limits:
              cpu: "1000m"
              memory: "2Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
      repoServer:
        pdb:
          enabled: true
        replicas: 2
        # Medium tier repo server resources
        resources:
          limits:
            cpu: "1000m" 
            memory: "2Gi"
          requests:
            cpu: "250m"
            memory: "512Mi"
      server:
        pdb:
          enabled: true
        replicas: 2
        # Medium tier server resources
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "125m"
            memory: "256Mi"
  minio-tenant:
    valuesObject:
      tenant:
        buckets:
          - name: default-bucket
            objectLock: true
          - name: models
            objectLock: true
          - name: datasets
            objectLock: false  # Additional bucket for team datasets
        certificate:
          requestAutoCert: false
        configSecret:
          existingSecret: true
          name: default-minio-tenant-env-configuration
        env:
          - name: MINIO_PROMETHEUS_AUTH_TYPE
            value: "public"
        name: default-minio-tenant
        pools:
          - name: pool-0
            servers: 3
            size: 2Ti  # Medium tier: 4-16TB range, starting at 6TB total (3x2TB)
            storageClassName: direct
            volumesPerServer: 2  # Better performance with multiple volumes per server
        users:
          - name: default-user
        # Medium tier resource configuration (team environment)
        resources:
          limits:
            cpu: "4000m"    # More CPU for concurrent team usage
            memory: "8Gi"   # More memory for team workloads
          requests:
            cpu: "1000m"
            memory: "2Gi"
        # Medium tier security and lifecycle policies
        lifecycle:
          - id: team-data-transition
            status: Enabled
            transition:
              days: 30
              storageClass: IA  # Move to infrequent access after 30 days
