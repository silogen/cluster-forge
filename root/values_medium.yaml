# Medium & Small clusters add local-path storage policy for RWX→RWO conversion

global:
  clusterSize: values_medium.yaml

enabledApps:
  - aim-cluster-model-source
  - aim-engine
  - aim-engine-crds
  - airm
  - airm-infra-cnpg
  - airm-infra-external-secrets
  - airm-infra-rabbitmq
  - aiwb
  - aiwb-infra-cnpg
  - aiwb-infra-external-secrets
  - amd-gpu-operator
  - amd-gpu-operator-config
  - appwrapper
  - argocd
  - argocd-config
  - cert-manager
  - cluster-auth
  - cluster-auth-config
  - cnpg-operator
  - external-secrets
  - external-secrets-config
  - gateway-api
  - gitea
  - gitea-config
  - kaiwo
  - kaiwo-config
  - kaiwo-crds
  - keda
  - kedify-otel
  - keycloak
  - kgateway
  - kgateway-config
  - kgateway-crds
  - kserve
  - kserve-crds
  - kueue
  - kueue-config
  - kuberay-operator
  - kyverno
  - kyverno-policies-base
  - kyverno-policies-storage-local-path
  - metallb
  - minio-operator
  - minio-tenant
  - minio-tenant-config
  - openbao
  - openbao-config
  - opentelemetry-operator
  - otel-lgtm-stack
  - prometheus-crds
  - rabbitmq

apps:
  # Modular Kyverno policy applications (only the storage-local-path addition)
  kyverno-policies-storage-local-path:
    namespace: kyverno
    path: kyverno-policies/storage-local-path
    syncWave: -20
    ignoreDifferences:
      - group: kyverno.io
        kind: ClusterPolicy
        jsonPointers:
          - /spec/rules/*/skipBackgroundRequests
          - /spec/rules/*/validate/allowExistingViolations
  aiwb-infra-cnpg:
    valuesObject:
      instances: 1
  argocd:
    valuesObject:
      applicationSet:
        replicas: 1
      controller:
        replicas: 1
        resources:
          limits:
            memory: "2Gi"
          requests:
            cpu: "125m" 
            memory: "1Gi"
      redis-ha:
        enabled: false
        redis:
          resources:
            limits:
              memory: "1Gi"
            requests:
              cpu: "5m"
              memory: "512Mi"
      repoServer:
        replicas: 1
        resources:
          limits:
            memory: "1Gi"
          requests:
            cpu: "25m"
            memory: "512Mi"
      server:
        replicas: 1
        resources:
          limits:
            memory: "1Gi"
          requests:
            cpu: "25m"
            memory: "256Mi"
  grafana:
    valuesObject:
      persistence:
        accessModes:
          - ReadWriteOnce
        enabled: true
        size: 5Gi
        storageClassName: direct
      replicas: 1
      resources:
        limits:
          memory: "2Gi"
        requests:
          cpu: "125m"
          memory: "512Mi"
  keycloak:
    valuesObject:
      # Increase memory resources for Keycloak to prevent OOMKilled during initialization
      # Medium preset provides 1536Mi memory limit vs small preset's 768Mi
      resourcesPreset: "medium"
  minio-operator:
    valuesObject:
      operator:
        replicaCount: 1
  minio-tenant:
    valuesObject:
      tenant:
        buckets:
          - name: default-bucket
            objectLock: true
          - name: models
            objectLock: true
          - name: datasets
            objectLock: false
        pools:
          - name: pool-0
            servers: 1
            size: 2Ti
            storageClassName: direct
            volumesPerServer: 2
        resources:
          limits:
            memory: "8Gi"
          requests:
            cpu: "500m"
            memory: "2Gi"
  openbao:
    valuesObject:
      server:
        dataStorage:
          size: 5Gi
          storageClass: direct
        ha:
          enabled: false
          raft:
            enabled: false
          replicas: 1
        resources:
          limits:
            memory: "2Gi"
          requests:
            cpu: "5m"
            memory: "512Mi"
  opentelemetry-operator:
    valuesObject:
      manager:
        resources:
          requests:
            cpu: "125m"
            memory: "512Mi"
  otel-lgtm-stack:
    valuesObject:
      collectors:
        resources:
          metrics:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 4Gi
          logs:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 1Gi
  prometheus:
    valuesObject:
      prometheus:
        prometheusSpec:
          resources:
            limits:
              memory: "4Gi"
            requests:
              cpu: "250m"
              memory: "1Gi"
          retention: 15d
          retentionSize: 20GB
          storageSpec:
            volumeClaimTemplate:
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 25Gi
                storageClassName: direct
  aim-engine:
    valuesObject:
      operator:
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
  airm:
    valuesObject:
      backend:
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
      frontend:
        resources:
          requests:
            cpu: "400m"
            memory: "1Gi"
  airm-infra-cnpg:
    valuesObject:
      resources:
        requests:
          cpu: "500m"
          memory: "512Mi"
  airm-infra-external-secrets:
