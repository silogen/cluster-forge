global:
  clusterSize: values_large.yaml

# Large cluster uses Gitea for GitOps (multi-source)
clusterForge:
  repoUrl: "http://gitea-http.cf-gitea.svc:3000/cluster-org/cluster-forge.git"
  targetRevision: main  # Default branch, can be overridden via --target-revision
externalValues:
  enabled: true
  repoUrl: "http://gitea-http.cf-gitea.svc:3000/cluster-org/cluster-values.git"

enabledApps:
  - aim-cluster-model-source
  - aim-engine
  - aim-engine-crds
  - airm
  - airm-infra-cnpg
  - airm-infra-external-secrets
  - airm-infra-rabbitmq
  - aiwb
  - aiwb-infra-cnpg
  - aiwb-infra-external-secrets
  - amd-gpu-operator
  - amd-gpu-operator-config
  - appwrapper
  - argocd
  - argocd-config
  - cert-manager
  - cluster-auth
  - cluster-auth-config
  - cnpg-operator
  - external-secrets
  - external-secrets-config
  - gateway-api
  - gitea
  - gitea-config
  - kaiwo
  - kaiwo-config
  - kaiwo-crds
  - keda
  - kedify-otel
  - keycloak
  - kgateway
  - kgateway-config
  - kgateway-crds
  - kserve
  - kserve-crds
  - kueue
  - kueue-config
  - kuberay-operator
  - kyverno
  - kyverno-policies-base
  - metallb
  - minio-operator
  - minio-tenant
  - minio-tenant-config
  - openbao
  - openbao-config
  - openbao-init
  - opentelemetry-operator
  - otel-lgtm-stack
  - prometheus-crds
  - rabbitmq
  
apps:
  minio-tenant:
    valuesObject:
      tenant:
        pools:
          - name: pool-0
            servers: 1
            size: 500Gi
            storageClassName: direct
            volumesPerServer: 1
  openbao:
    valuesObject:
      server:
        ha:
          enabled: true
          raft:
            enabled: true
          replicas: 3
