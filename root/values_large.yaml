      # Large tier: Enhanced Keycloak for production scale
  keycloak:
    valuesObject:
      # Large tier: production HA setup
      replicaCount: 3
      # Keep original resources from component values_cf.yaml (no changes)
      # postgresql:  # TODO: May add later for production database config
      #   enabled: false  # Use external DB for production
      # extraStartupArgs: "--cache=ispn --features=scripts,admin-fine-grained-authz,token-exchange,account3 --import-realm --spi-sticky-session-encoder-infinispan-should-attach-route=false"

  openbao:
    valuesObject:
      server:
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
        # resources:  # TODO: May add later for fine-tuning
        #   limits:
        #     cpu: "2000m"
        #     memory: "4Gi"
        #   requests:
        #     cpu: "500m"
        #     memory: "1Gi"

  # Large tier: Kueue HA configuration from values_ha.yaml
  kueue:
    valuesObject:
      controllerManager:
        replicas: 2  # From values_ha.yaml
      mutatingWebhook:
        reinvocationPolicy: IfNeeded  # From values_ha.yaml
      managerConfig:
        controllerManagerConfigYaml: |-
          apiVersion: config.kueue.x-k8s.io/v1beta1
          kind: Configuration
          health:
            healthProbeBindAddress: :8081
          metrics:
            bindAddress: :8443
          webhook:
            port: 9443
          leaderElection:
            leaderElect: true
            resourceName: c1f6bfd2.kueue.x-k8s.io
          controller:
            groupKindConcurrency:
              Job.batch: 5
              Pod: 5
              Workload.kueue.x-k8s.io: 5
              LocalQueue.kueue.x-k8s.io: 1
              Cohort.kueue.x-k8s.io: 1
              ClusterQueue.kueue.x-k8s.io: 1
              ResourceFlavor.kueue.x-k8s.io: 1
          clientConnection:
            qps: 50
            burst: 100
          managedJobsNamespaceSelector:
            matchLabels:
              kueue-managed: "true"
          integrations:
            frameworks:
            - "batch/job"
            - "kubeflow.org/mpijob"
            - "ray.io/rayjob"
            - "ray.io/raycluster"
            - "jobset.x-k8s.io/jobset"
            - "kubeflow.org/paddlejob"
            - "kubeflow.org/pytorchjob"
            - "kubeflow.org/tfjob"
            - "kubeflow.org/xgboostjob"
            - "kubeflow.org/jaxjob"
            - "workload.codeflare.dev/appwrapper"
            - "pod"
            - "deployment"
            - "statefulset"

