apps:
  seaweedfs-config:
    valuesObject:
      seaweed:
        storageClassName: mlstorage
        master:
          replicas: 3
          volumeSizeLimitMB: 1024
        volume:
          replicas: 3
          requests:
            storage: 500Gi
        filer:
          replicas: 1
          requests:
            storage: 30Gi

  openbao:
    valuesObject:
      server:
        ha:
          enabled: true
          raft:
            enabled: true
          replicas: 3
