enabledApps:
  - aim-cluster-model-source
  - airm
  - amd-gpu-operator
  - amd-gpu-operator-config
  - appwrapper
  - argocd
  - argocd-config
  - cert-manager
  - cluster-auth
  - cluster-auth-config
  - cnpg-operator
  - external-secrets
  - external-secrets-config
  - gateway-api
  - gitea
  - gitea-config
  - kaiwo
  - kaiwo-config
  - kaiwo-crds
  - keda
  - kedify-otel
  - keycloak
  - kgateway
  - kgateway-config
  - kgateway-crds
  - kserve
  - kserve-crds
  - kueue
  - kueue-config
  - kuberay-operator
  - kyverno
  - kyverno-policies-base
  - metallb
  - minio-operator
  - minio-tenant
  - minio-tenant-config
  - openbao
  - openbao-config
  - openbao-init
  - opentelemetry-operator
  - otel-lgtm-stack
  - prometheus-crds
  - rabbitmq

apps:
  minio-tenant:
    valuesObject:
      tenant:
        pools:
          - name: pool-0
            servers: 1
            size: 500Gi
            storageClassName: direct
            volumesPerServer: 1

  seaweedfs-config:
    valuesObject:
      seaweed:
        storageClassName: mlstorage
        master:
          replicas: 3
          volumeSizeLimitMB: 1024
        volume:
          replicas: 3
          requests:
            storage: 500Gi
        filer:
          replicas: 1
          requests:
            storage: 30Gi

  # Secrets - OpenBao (Production: 3 replicas, 10Gi storage)
  openbao:
    valuesObject:
      server:
        ha:
          enabled: true
          raft:
            enabled: true
          replicas: 3
