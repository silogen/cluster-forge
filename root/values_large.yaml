# LARGE CLUSTER CONFIGURATION
# Target: Production-Path / Scale-Out (10s-100s users)  
# Nodes: 3-5 dedicated CP servers + 3-6 GPU nodes to start, scale to 100s
# CPU: Workers: 32-96 vCPU, CP nodes: 8-16 vCPU
# Memory: Workers: 256-1024 GB, CP nodes: 32-64 GB
# GPU: 8+ GPUs baseline, mixed families, heterogeneous, partitionable
# Storage: 10-100+ TB NVMe, External HA S3 object storage (recommended)
# Networking: 25 GbE or more, optional separate storage network
# RKE2: Dedicated, tainted CP nodes, etcd snapshots + full backup/restore plan

# LARGE CLUSTER: All apps enabled (inherited from base values_cf.yaml)  
# Only resource scaling overrides below - no need to redefine enabledApps

apps:
  argocd:
    valuesObject:
      # Large tier: Production scale with HA from values_ha.yaml
      applicationSet:
        replicas: 2  # From values_ha.yaml
        pdb:
          enabled: true  # From values_ha.yaml
      controller:
        replicas: 2  # From values_ha.yaml
        pdb:
          enabled: true  # From values_ha.yaml
      redis:
        enabled: false  # From values_ha.yaml
      redis-ha:
        enabled: true  # From values_ha.yaml
      repoServer:
        replicas: 2  # From values_ha.yaml
        pdb:
          enabled: true  # From values_ha.yaml
      server:
        replicas: 2  # From values_ha.yaml
        pdb:
          enabled: true  # From values_ha.yaml

  minio-tenant:
    valuesObject:
      tenant:
        # Large tier: Configuration from values_ha.yaml plus additional buckets
        name: default-minio-tenant  # From values_ha.yaml
        configSecret:
          name: default-minio-tenant-env-configuration  # From values_ha.yaml
          existingSecret: true  # From values_ha.yaml
        buckets:
          - name: default-bucket
            objectLock: true
          - name: models
            objectLock: true
          - name: datasets  # Additional for large tier
            objectLock: false
        pools:
          - name: pool-0
            servers: 4  # From values_ha.yaml  
            size: 500Gi  # From values_ha.yaml
            storageClassName: longhorn  # Longhorn deployed by cluster-bloom for large
            volumesPerServer: 1  # From values_ha.yaml
        users:
          - name: default-user  # From values_ha.yaml
        certificate:
          requestAutoCert: false  # From values_ha.yaml
          externalCaCertSecret:
          - name: cluster-tls  # From values_ha.yaml
            type: kubernetes.io/secret/v1  # From values_ha.yaml
        env:
          - name: MINIO_PROMETHEUS_AUTH_TYPE  # From values_ha.yaml
            value: "public"  # From values_ha.yaml
        # TODO: May add later for production optimizations
        # env:
        #   - name: MINIO_PROMETHEUS_AUTH_TYPE
