clusterForge:
  repoUrl: "http://gitea-http.cf-gitea.svc:3000/cluster-org/cluster-forge.git"
  targetRevision: # injected via scripts/bootstrap.sh; tag, branch, or commit
externalValues:
  enabled: true
  path: values.yaml
  repoUrl: "http://gitea-http.cf-gitea.svc:3000/cluster-org/cluster-values.git"
  targetRevision: main
global:
  clusterSize:    # injected via scripts/bootstrap.sh
  domain:         # injected via scripts/bootstrap.sh

apps:
  aim-cluster-model-source:
    namespace: kaiwo-system
    path: aim-cluster-model-source
    syncWave: -20
  airm:
    helmParameters:
      - name: airm-api.airm.appDomain
        value: "{{ .Values.global.domain }}"
    ignoreDifferences:
      - group: external-secrets.io
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
        kind: ExternalSecret
      - group: kyverno.io
        jqPathExpressions:
          - ".spec.rules"
        kind: ClusterPolicy
    namespace: airm
    path: airm/0.3.5
    syncWave: 0
    valuesFile: values.yaml
  amd-gpu-operator:
    namespace: kube-amd-gpu
    path: amd-gpu-operator/v1.4.1
    syncWave: -10
    valuesObject:
      crds:
        defaultCR:
          install: false
  amd-gpu-operator-config:
    namespace: kube-amd-gpu
    path: amd-gpu-operator-config
    syncWave: 0
  appwrapper:
    namespace: appwrapper-system
    path: appwrapper/v1.1.2
    syncWave: -10
  argocd:
    helmParameters:
      - name: global.domain
        value: "argocd.{{ .Values.global.domain }}"
      - name: configs.cm.oidc\.config
        value: |
          name: Keycloak
          issuer: https://kc.{{ .Values.global.domain }}/realms/airm
          clientID: argocd
          clientSecret: $$argocd-oidc-creds:client_secret
          rootCA: $cluster-tls:cert
          requestedScopes: ["openid", "profile", "email", "groups"]
    namespace: argocd
    path: argocd/8.3.5
    syncWave: -30
    valuesObject:
      applicationSet:
        replicas: 1
      configs:
        cm:
          create: true
          resource.customizations.health.apps_StatefulSet: |
            -- Custom health check for OpenBao StatefulSet
            -- Uses standard StatefulSet readiness for now - openbao-init job handles actual initialization
            hs = {}
            if obj.status ~= nil then
              if obj.status.readyReplicas ~= nil and obj.status.replicas ~= nil then
                if obj.status.readyReplicas == obj.status.replicas then
                  hs.status = "Healthy"
                  hs.message = "StatefulSet is ready"
                else
                  hs.status = "Progressing"
                  hs.message = "Waiting for StatefulSet replicas to be ready"
                end
              else
                hs.status = "Progressing"
                hs.message = "Waiting for StatefulSet status"
              end
            else
              hs.status = "Progressing"
              hs.message = "Waiting for StatefulSet status"
            end
            return hs
          resource.customizations.health.batch_Job: |
            -- Custom health check for Jobs, especially openbao-init
            hs = {}
            if obj.status ~= nil then
              if obj.status.conditions ~= nil then
                for _, condition in ipairs(obj.status.conditions) do
                  if condition.type == "Complete" and condition.status == "True" then
                    hs.status = "Healthy"
                    hs.message = "Job completed successfully"
                    return hs
                  elseif condition.type == "Failed" and condition.status == "True" then
                    hs.status = "Degraded"
                    hs.message = "Job failed"
                    return hs
                  end
                end
              end
              -- Check for active jobs
              if obj.status.active and obj.status.active > 0 then
                hs.status = "Progressing"
                hs.message = "Job is running"
                return hs
              end
            end
            hs.status = "Progressing"
            hs.message = "Job status unknown"
            return hs
                  end
                end
              end
              hs.status = "Progressing"
              hs.message = "ScaledObject status unknown"
            else
              hs.status = "Progressing"
              hs.message = "ScaledObject status unknown"
            end
            return hs
          resource.customizations.health.keda.sh_ScaledObject: |
            hs = {}
            if obj.status ~= nil then
              if obj.status.conditions ~= nil then
                for _, condition in ipairs(obj.status.conditions) do
                  if condition.type == "Ready" then
                    if condition.status == "True" then
                      hs.status = "Healthy"
                      hs.message = "ScaledObject is ready"
                    else
                      hs.status = "Degraded"
                      hs.message = condition.reason or "ScaledObject not ready"
                    end
            return hs
          resource.customizations.health.opentelemetry.io_OpenTelemetryCollector: |
            hs = {}
            hs.status = "Healthy"
            hs.message = "Always Healthy - See https://github.com/argoproj/argo-cd/pull/24284"
            return hs
        params:
          server.insecure: true
        rbac:
          create: true
          policy.csv: |
            g, argocd-users, role:admin
      controller:
        replicas: 1
      global:
        domain: # to be filled by cluster-forge app
      redis:
        enabled: true
      redis-ha:
        enabled: false
      repoServer:
        autoscaling:
          enabled: false
        replicas: 1
      server:
        autoscaling:
          enabled: false
        replicas: 1
  argocd-config:
    ignoreDifferences:
      - group: external-secrets.io
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
        kind: ExternalSecret
    namespace: argocd
    path: argocd-config
    syncWave: 5
  cert-manager:
    namespace: cert-manager
    path: cert-manager/v1.18.2
    syncWave: -40
    valuesObject:
      installCRDs: true
  cluster-auth:
    namespace: cluster-auth
    path: cluster-auth/0.5.0
    syncWave: -25
    valuesFile: values.yaml
  cluster-auth-config:
    ignoreDifferences:
      - group: external-secrets.io
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
        kind: ExternalSecret
    namespace: cluster-auth
    path: cluster-auth-config
    syncWave: 5
  cnpg-operator:
    namespace: cnpg-system
    path: cnpg-operator/0.26.0
    syncWave: -30
    valuesFile: values.yaml
  external-secrets:
    namespace: external-secrets
    path: external-secrets/0.15.1
    syncWave: -40
    valuesFile: values.yaml
  external-secrets-config:
    namespace: external-secrets
    path: external-secrets-config
    syncWave: -10
  gateway-api:
    namespace: default
    path: gateway-api/v1.3.0
    syncWave: -50
  gitea:
    helmParameters:
      - name: clusterDomain
        value: "{{ .Values.global.domain }}"
      - name: gitea.config.server.ROOT_URL
        value: "https://gitea.{{ .Values.global.domain }}"
    namespace: cf-gitea
    path: gitea/12.3.0
    syncWave: -30
    valuesObject:
      clusterDomain: # to be filled by cluster-forge app
      gitea:
        admin:
          existingSecret: gitea-admin-credentials
        config:
          cache:
            ADAPTER: memory
          database:
            DB_TYPE: sqlite3
          queue:
            TYPE: level
          server:
            ROOT_URL: # to be filled by cluster-forge app
          session:
            PROVIDER: memory
      persistence:
        enabled: true
      postgresql:
        enabled: false
      postgresql-ha:
        enabled: false
      service:
        http: {}
        ssh: {}
      strategy:
        type: "Recreate"
      test:
        enabled: false
      valkey:
        enabled: false
      valkey-cluster:
        enabled: false
  gitea-config:
    helmParameters:
      - name: keycloak.realm
        value: "airm"
      - name: keycloak.url
        value: "https://kc.{{ .Values.global.domain }}"
    namespace: cf-gitea
    path: gitea-config
    syncWave: -20
    valuesFile: values.yaml
  kaiwo:
    namespace: kaiwo-system
    path: kaiwo/v0.2.0-rc11
    syncWave: -10
    valuesFile: values.yaml
  kaiwo-config:
    ignoreDifferences:
      - group: external-secrets.io
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
        kind: ExternalSecret
      - group: ""
        jsonPointers:
          - /spec/accessModes
        kind: "PersistentVolumeClaim"
    namespace: kaiwo-system
    path: kaiwo-config
    syncWave: 0
  kaiwo-crds:
    namespace: kaiwo-system
    path: kaiwo-crds/v0.2.0-rc11
    syncWave: -20
  keda:
    namespace: keda
    path: keda/2.18.1
    syncWave: -10
    valuesFile: values.yaml
  kedify-otel:
    ignoreDifferences:
      - group: ""
        jqPathExpressions:
          - ".status"
        kind: "Service"
        name: "keda-otel-scaler"
      - group: "apps"
        jqPathExpressions:
          - ".status.availableReplicas"
          - ".status.readyReplicas"
        kind: "Deployment"
    namespace: keda
    path: kedify-otel/v0.0.6
    syncWave: -5
    valuesObject:
      validatingAdmissionPolicy:
        enabled: false
  keycloak:
    helmParameters:
      - name: domain
        value: "{{ .Values.global.domain }}"
    ignoreDifferences:
      - group: external-secrets.io
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
        kind: ExternalSecret
    namespace: keycloak
    path: keycloak-old
    syncWave: -10
    valuesObject:
      auth:
        adminUser: admin
        existingSecret: "keycloak-credentials"
        passwordSecretKey: "KEYCLOAK_INITIAL_ADMIN_PASSWORD"
      extraEnvVars:
        - name: JAVA_OPTS_APPEND
          value: >-
            -XX:MaxRAMPercentage=65.0
            -XX:InitialRAMPercentage=50.0
            -XX:MaxMetaspaceSize=512m
            -XX:+ExitOnOutOfMemoryError
            -Djava.awt.headless=true
      extraStartupArgs: "--cache=ispn --features=scripts,admin-fine-grained-authz,token-exchange --import-realm"
      extraVolumeMounts:
        - mountPath: /opt/keycloak/providers
          name: keycloak-package-volume
        - mountPath: /opt/keycloak/data/import
          name: keycloak-realm-volume
      extraVolumes:
        - configMap:
            items:
              - key: keycloak-scripts.json
                path: META-INF/keycloak-scripts.json
              - key: domain-group-authenticator.js
                path: domain-group-authenticator.js
            name: keycloak-scripts
          name: keycloak-script-volume
        - emptyDir: {}
          name: keycloak-package-volume
        - configMap:
            name: keycloak-realm-templates-7kgh2hc6b2
          name: keycloak-airm-realm-template-volume
        - emptyDir: {}
          name: keycloak-realm-volume
        - configMap:
            name: keycloak-realm-templates-k8s
          name: keycloak-k8s-realm-template-volume
      initContainers:
        - command:
            - /bin/sh
            - -c
            - |
              cd /opt/scripts
              zip -r /opt/keycloak/providers/SilogenExtensionPackage.jar .
          image: ghcr.io/silogen/keycloak-init:0.1
          name: init-auth-extensions
          volumeMounts:
            - mountPath: /opt/keycloak/providers
              name: keycloak-package-volume
            - mountPath: /opt/scripts
              name: keycloak-script-volume
        - command:
            - /bin/sh
            - -c
            - |
              if [ -f "/opt/realm_templates/airm/airm-realm.json" ]; then
                  cp /opt/realm_templates/airm/airm-realm.json /opt/realms/airm-realm.json
                  sed -i -e "s/__AIRM_FRONTEND_CLIENT_SECRET__/$AIRM_FRONTEND_CLIENT_SECRET/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__AIRM_ADMIN_CLIENT_ID__/$AIRM_ADMIN_CLIENT_ID/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__AIRM_ADMIN_CLIENT_SECRET__/$AIRM_ADMIN_CLIENT_SECRET/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__AIRM_CI_CLIENT_SECRET__/$AIRM_CI_CLIENT_SECRET/g" /opt/realms/airm-realm.json

                  sed -i -e "s/__K8S_CLIENT_SECRET__/$K8S_CLIENT_SECRET/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__MINIO_CLIENT_SECRET__/$MINIO_CLIENT_SECRET/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__GITEA_CLIENT_SECRET__/$GITEA_CLIENT_SECRET/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__ARGOCD_CLIENT_SECRET__/$ARGOCD_CLIENT_SECRET/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__DEVUSER_INITIAL_PASSWORD__/$DEVUSER_INITIAL_PASSWORD/g" /opt/realms/airm-realm.json
              else
                  echo "Warning: /opt/realm_templates/airm/airm-realm.json not found, skipping airm realm setup"
              fi
          env:
            - name: AIRM_FRONTEND_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: FRONTEND_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: AIRM_ADMIN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: ADMIN_CLIENT_ID
                  name: airm-realm-credentials
            - name: AIRM_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: ADMIN_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: AIRM_CI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: CI_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: K8S_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: K8S_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: MINIO_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: MINIO_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: GITEA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: GITEA_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: ARGOCD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: ARGOCD_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: DEVUSER_INITIAL_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: KEYCLOAK_INITIAL_DEVUSER_PASSWORD
                  name: airm-realm-credentials
          image: ghcr.io/silogen/keycloak-init:0.1
          name: init-realm-scripts
          volumeMounts:
            - mountPath: /opt/realm_templates/airm
              name: keycloak-airm-realm-template-volume
            - mountPath: /opt/realm_templates/k8s
              name: keycloak-k8s-realm-template-volume
            - mountPath: /opt/realms
              name: keycloak-realm-volume
      podLabels:
        app: keycloak
      replicaCount: 1
      resources:
        limits:
          cpu: "500m"
          memory: "2Gi"
        requests:
          cpu: "250m"
          memory: "512Mi"
