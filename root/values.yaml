clusterForge:
  repoUrl: "https://github.com/silogen/cluster-forge.git"
  targetRevision: v1.7.0 # cluster-forge version git tag
  valuesFile: values.yaml
# source helm values file from separate git repo
externalValues:
  enabled: false
  #  repoUrl: # define if enabled
  targetRevision: main
  path: values.yaml
global:
  domain: app.silogen.ai
enabledApps:
  - aim-cluster-model-source
  - argocd
  - argocd-config
  - cert-manager
  - openbao
  - openbao-config
  - external-secrets
  - external-secrets-config
  - gitea
  - gitea-config
  - gateway-api
  - metallb
  - kgateway-crds
  - kgateway
  - kgateway-config
  - prometheus-crds
  - opentelemetry-operator
  - otel-lgtm-stack
  - cnpg-operator
  - cluster-auth
  - cluster-auth-config
  - keycloak
  - kyverno
  - kyverno-config
  - amd-gpu-operator
  - amd-gpu-operator-config
  - kuberay-operator
  - keda
  - kedify-otel
  - kserve-crds
  - kserve
  - rabbitmq
  - kueue
  - kueue-config
  - appwrapper
  - minio-operator
  - minio-tenant
  - minio-tenant-config
  - kaiwo-crds
  - kaiwo
  - kaiwo-config
  - airm
apps:
  # Core apps
  argocd:
    path: argocd/8.3.5
    namespace: argocd
    helmParameters:
      - name: global.domain
        value: "argocd.{{ .Values.global.domain }}"
      - name: configs.cm.oidc\.config
        value: |
          name: Keycloak
          issuer: https://kc.{{ .Values.global.domain }}/realms/airm
          clientID: argocd
          clientSecret: $$argocd-oidc-creds:client_secret
          requestedScopes: ["openid", "profile", "email", "groups"]
    syncWave: -3
    valuesObject:
      global:
        domain: # to be filled by cluster-forge app
      configs:
        params:
          server.insecure: true
        cm:
          resource.customizations.health.opentelemetry.io_OpenTelemetryCollector: |
            hs = {}
            hs.status = "Healthy"
            hs.message = "Always Healthy - See https://github.com/argoproj/argo-cd/pull/24284"
            return hs
        rbac:
          policy.csv: |
            g, argocd-users, role:admin
  argocd-config:
    path: argocd-config
    namespace: argocd
    syncWave: -2
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
  cert-manager:
    path: cert-manager/v1.18.2
    namespace: cert-manager
    syncWave: -3
    valuesObject:
      installCRDs: true
  openbao:
    path: openbao/0.18.2
    namespace: cf-openbao
    syncWave: -3
    ignoreDifferences:
      - group: "apps"
        kind: "Deployment"
        jsonPointers:
          - /spec/replicas
    valuesObject:
      injector:
        enabled: false
      server:
        affinity: |
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: openbao
                      app.kubernetes.io/instance: openbao
                      component: server
                  topologyKey: kubernetes.io/hostname
        ha:
          enabled: false
          raft:
            enabled: false
      ui:
        enabled: true

  openbao-config:
    path: openbao-config
    namespace: cf-openbao
    syncWave: -2
  external-secrets:
    path: external-secrets/0.15.1
    namespace: external-secrets
    valuesFile: values.yaml
    syncWave: -3
  external-secrets-config:
    path: external-secrets-config
    namespace: external-secrets
    syncWave: -3
  gitea:
    path: gitea/12.3.0
    namespace: cf-gitea
    helmParameters:
      - name: clusterDomain
        value: "{{ .Values.global.domain }}"
      - name: gitea.config.server.ROOT_URL
        value: "https://gitea.{{ .Values.global.domain }}"
    syncWave: -3
    valuesObject:
      clusterDomain: # to be filled by cluster-forge app
      strategy:
        type: "Recreate"
      gitea:
        admin:
          existingSecret: gitea-admin-credentials
        config:
          server:
            ROOT_URL: # to be filled by cluster-forge app
          database:
            DB_TYPE: sqlite3
          session:
            PROVIDER: memory
          cache:
            ADAPTER: memory
          queue:
            TYPE: level
      valkey-cluster:
        enabled: false
      valkey:
        enabled: false
      postgresql:
        enabled: false
      postgresql-ha:
        enabled: false
      persistence:
        enabled: true
      test:
        enabled: false

  gitea-config:
    path: gitea-config
    namespace: cf-gitea
    valuesFile: values.yaml
    helmParameters:
      - name: keycloak.url
        value: "https://kc.{{ .Values.global.domain }}"
      - name: keycloak.realm
        value: "airm"
    syncWave: -2
  gateway-api:
    path: gateway-api/v1.3.0
    namespace: default
    syncWave: -3
  metallb:
    path: metallb/v0.15.2
    namespace: default
    syncWave: -3
  kgateway-crds:
    path: kgateway-crds/v2.1.0-main
    namespace: kgateway-system
    valuesFile: values.yaml
    syncWave: -3
  kgateway:
    path: kgateway/v2.1.0-main
    namespace: kgateway-system
    syncWave: -2
    valuesObject:
      controller:
        image:
          registry: "ghcr.io"
          repository: silogen/kgateway-v2.1.0-main-websocket
          tag: "0.0.1"
  kgateway-config:
    path: kgateway-config
    namespace: kgateway-system
    valuesFile: values.yaml
    helmParameters:
      - name: domain
        value: "{{ .Values.global.domain }}"
    syncWave: -2
  prometheus-crds:
    path: prometheus-operator-crds/23.0.0
    namespace: prometheus-system
    valuesFile: values.yaml
    syncWave: -3
  opentelemetry-operator:
    path: opentelemetry-operator/0.93.1
    namespace: opentelemetry-operator-system
    syncWave: -3
    valuesObject:
      manager:
        collectorImage:
          repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
          tag: "0.140.0"
  otel-lgtm-stack:
    path: otel-lgtm-stack/v1.0.7
    namespace: otel-lgtm-stack
    helmParameters:
      - name: cluster.name
        value: "{{ .Values.global.domain }}"
    syncWave: -2
    valuesObject:
      # Cluster identification - will be populated by root/values.yaml helmParameters
      cluster:
        name: # to be filled by cluster-forge app based on domain
      # Component enablement (cluster-forge defaults)
      dashboards:
        enabled: true
      nodeExporter:
        enabled: true
      kubeStateMetrics:
        enabled: true
      # Storage configuration optimized for cluster-forge
      lgtm:
        storage:
          # Tempo storage for traces
          tempo: 50Gi
          # Loki storage for logs  
          loki: 50Gi
          # Grafana storage for dashboards/config  
          grafana: 10Gi
          # Mimir/Prometheus storage for metrics
          mimir: 50Gi
          # Loki additional storage
          extra: 50Gi
        # LGTM stack main deployment resources
        resources:
          limits:
            memory: 8Gi
          requests:
            memory: 2Gi
            cpu: '1'
      # Resource configuration optimized for cluster-forge
      collectors:
        resources:
          # Metrics collector (deployment mode)
          metrics:
            limits:
              memory: 8Gi
              cpu: '2'
            requests:
              memory: 1Gi
              cpu: 500m
          # Logs collector (daemonset mode)  
          logs:
            limits:
              memory: 2Gi
              cpu: '1'
            requests:
              memory: 400Mi
              cpu: 200m
      # Service configuration
      services:
        # Main LGTM stack service ports
        lgtm:
          grafana: 3000
          otelGrpc: 4317
          otelHttp: 4318
          prometheus: 9090
          loki: 3100
        # Kube state metrics service port
        kubeStateMetrics:
          http: 8080
        # Node exporter service port
        nodeExporter:
          metrics: 9100
  cnpg-operator:
    path: cnpg-operator/0.26.0
    namespace: cnpg-system
    valuesFile: values.yaml
    syncWave: -3
  cluster-auth:
    path: cluster-auth/0.5.0
    namespace: cluster-auth
    valuesFile: values.yaml
    syncWave: -2
  cluster-auth-config:
    path: cluster-auth-config
    namespace: cluster-auth
    syncWave: -2
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
  keycloak:
    path: keycloak-old
    namespace: keycloak
    valuesFile: values.yaml
    helmParameters:
      - name: domain
        value: "{{ .Values.global.domain }}"
    syncWave: -2
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
    valuesObject:
      resources:
        requests:
          memory: "512Mi"
          cpu: "500m"
        limits:
          memory: "1Gi"
          cpu: "1000m"
      podLabels:
        app: keycloak
      auth:
        adminUser: admin
        existingSecret: "keycloak-credentials"
        passwordSecretKey: "KEYCLOAK_INITIAL_ADMIN_PASSWORD"
      extraStartupArgs: "--cache=ispn --features=scripts,admin-fine-grained-authz,token-exchange --import-realm"
      initContainers:
        - command:
            - /bin/sh
            - -c
            - |
              cd /opt/scripts
              zip -r /opt/keycloak/providers/SilogenExtensionPackage.jar .
          image: ghcr.io/silogen/keycloak-init:0.1
          name: init-auth-extensions
          volumeMounts:
            - mountPath: /opt/keycloak/providers
              name: keycloak-package-volume
            - mountPath: /opt/scripts
              name: keycloak-script-volume
        - command:
            - /bin/sh
            - -c
            - |       
              if [ -f "/opt/realm_templates/airm/airm-realm.json" ]; then
                  cp /opt/realm_templates/airm/airm-realm.json /opt/realms/airm-realm.json
                  sed -i -e "s/__AIRM_FRONTEND_CLIENT_SECRET__/$AIRM_FRONTEND_CLIENT_SECRET/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__AIRM_ADMIN_CLIENT_ID__/$AIRM_ADMIN_CLIENT_ID/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__AIRM_ADMIN_CLIENT_SECRET__/$AIRM_ADMIN_CLIENT_SECRET/g" /opt/realms/airm-realm.json
                  sed -i -e "s/__AIRM_CI_CLIENT_SECRET__/$AIRM_CI_CLIENT_SECRET/g" /opt/realms/airm-realm.json
              else
                  echo "Warning: /opt/realm_templates/airm/airm-realm.json not found, skipping airm realm setup"
              fi
          env:
            - name: AIRM_FRONTEND_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: FRONTEND_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: AIRM_ADMIN_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  key: ADMIN_CLIENT_ID
                  name: airm-realm-credentials
            - name: AIRM_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: ADMIN_CLIENT_SECRET
                  name: airm-realm-credentials
            - name: AIRM_CI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: CI_CLIENT_SECRET
                  name: airm-realm-credentials
          image: ghcr.io/silogen/keycloak-init:0.1
          name: init-realm-scripts
          volumeMounts:
            - mountPath: /opt/realm_templates/airm
              name: keycloak-airm-realm-template-volume
            - mountPath: /opt/realm_templates/k8s
              name: keycloak-k8s-realm-template-volume
            - mountPath: /opt/realms
              name: keycloak-realm-volume
      extraVolumes:
        - configMap:
            name: keycloak-scripts
            items:
              - key: keycloak-scripts.json
                path: META-INF/keycloak-scripts.json
              - key: domain-group-authenticator.js
                path: domain-group-authenticator.js
          name: keycloak-script-volume
        - emptyDir: {}
          name: keycloak-package-volume
        - configMap:
            name: keycloak-realm-templates-7kgh2hc6b2
          name: keycloak-airm-realm-template-volume
        - emptyDir: {}
          name: keycloak-realm-volume
        - configMap:
            name: keycloak-realm-templates-k8s
          name: keycloak-k8s-realm-template-volume
      extraVolumeMounts:
        - mountPath: /opt/keycloak/providers
          name: keycloak-package-volume
        - mountPath: /opt/keycloak/data/import
          name: keycloak-realm-volume
      postgresql:
        enabled: false
      externalDatabase:
        host: "keycloak-cnpg-rw.keycloak.svc.cluster.local"
        port: 5432
        database: keycloak
        schema: public
        existingSecret: "keycloak-cnpg-user"
        existingSecretUserKey: "username"
        existingSecretPasswordKey: "password"
  kyverno:
    path: kyverno/3.5.1
    namespace: kyverno
    valuesFile: values.yaml
    syncWave: -3
  kyverno-config:
    path: kyverno-config
    namespace: kyverno
    syncWave: -3
  amd-gpu-operator:
    path: amd-gpu-operator/v1.4.0
    namespace: kube-amd-gpu
    syncWave: -1
    valuesObject:
      crds:
        defaultCR:
          install: false
  amd-gpu-operator-config:
    path: amd-gpu-operator-config
    namespace: kube-amd-gpu
    syncWave: -1
  kuberay-operator:
    path: kuberay-operator/1.4.2
    namespace: default
    valuesFile: values.yaml
    syncWave: -1
  keda:
    path: keda/2.18.1
    namespace: keda
    valuesFile: values.yaml
    syncWave: -2
  kedify-otel:
    path: kedify-otel/v0.0.6
    namespace: keda
    syncWave: -2
    valuesObject:
      validatingAdmissionPolicy:
        enabled: false
  kserve-crds:
    path: kserve-crds/v0.16.0
    namespace: kserve-system
    valuesFile: values.yaml
    syncWave: -3
  kserve:
    path: kserve/v0.16.0
    namespace: kserve-system
    syncWave: -2
    valuesObject:
      kserve:
        controller:
          deploymentMode: "Standard"
  rabbitmq:
    path: rabbitmq/v2.15.0
    namespace: rabbitmq-system
    syncWave: -1
  kueue:
    path: kueue/0.13.0
    namespace: kueue-system
    valuesFile: ../values_onenode.yaml
    syncWave: -1
  kueue-config:
    path: kueue-config
    namespace: kueue-system
    syncWave: -1
  appwrapper:
    path: appwrapper/v1.1.2
    namespace: appwrapper-system
    syncWave: -1
  minio-operator:
    path: minio-operator/7.1.1
    namespace: minio-operator
    valuesFile: values.yaml
    syncWave: -3
    valuesObject:
      tenant:
        name: default-minio-tenant
        configSecret:
          name: default-minio-tenant-env-configuration
          existingSecret: true
        pools:
          - servers: 1
            name: pool-0
            volumesPerServer: 1
            size: 500Gi
            storageClassName: direct
        buckets:
          - name: default-bucket
            objectLock: true
          - name: models
            objectLock: true
        users:
          - name: default-user
        certificate:
          requestAutoCert: false
          externalCaCertSecret:
          - name: cluster-tls
            type: kubernetes.io/secret/v1
        env:
          - name: MINIO_PROMETHEUS_AUTH_TYPE
            value: "public"
  minio-tenant:
    path: minio-tenant/7.1.1
    namespace: minio-tenant-default
    syncWave: -2
    valuesObject:
      tenant:
        name: default-minio-tenant
        configSecret:
          name: default-minio-tenant-env-configuration
          existingSecret: true
        pools:
          - servers: 1
            name: pool-0
            volumesPerServer: 1
            size: 500Gi
            storageClassName: direct
        buckets:
          - name: default-bucket
            objectLock: true
          - name: models
            objectLock: true
        users:
          - name: default-user
        certificate:
          requestAutoCert: false
          externalCaCertSecret:
          - name: cluster-tls
            type: kubernetes.io/secret/v1
        env:
          - name: MINIO_PROMETHEUS_AUTH_TYPE
            value: "public"
  minio-tenant-config:
    path: minio-tenant-config
    namespace: minio-tenant-default
    valuesFile: values.yaml
    helmParameters:
      - name: domain
        value: "{{ .Values.global.domain }}"
    syncWave: -1
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
  aim-cluster-model-source:
    path: aim-cluster-model-source
    namespace: kaiwo-system
    syncWave: -2
  kaiwo-crds:
    path: kaiwo-crds/v0.2.0-rc11
    namespace: kaiwo-system
    syncWave: -2
  kaiwo:
    path: kaiwo/v0.2.0-rc11
    namespace: kaiwo-system
    valuesFile: values.yaml
    syncWave: -1
  kaiwo-config:
    path: kaiwo-config
    namespace: kaiwo-system
    syncWave: -1
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
  airm:
    path: airm/0.3.1
    namespace: airm
    valuesFile: values.yaml
    helmParameters:
      - name: airm-api.airm.appDomain
        value: "{{ .Values.global.domain }}"
    syncWave: 0
    ignoreDifferences:
      - group: external-secrets.io
        kind: ExternalSecret
        jqPathExpressions:
          - ".spec.data[].remoteRef.conversionStrategy"
          - ".spec.data[].remoteRef.decodingStrategy"
          - ".spec.data[].remoteRef.metadataPolicy"
      - group: kyverno.io
        kind: ClusterPolicy
        jqPathExpressions:
          - ".spec.rules"
