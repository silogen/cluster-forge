apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-agent"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app: "{{ .Release.Name }}-agent"
spec:
  ports:
    - name: http
      port: {{ .Values.airm.agent.servicePort }}
      targetPort: 8000
  selector:
    app: "{{ .Release.Name }}-agent"
  type: ClusterIP
