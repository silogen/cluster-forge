apiVersion: batch/v1
kind: CronJob
metadata:
  name: "{{ .Release.Name }}-heartbeat-agent"
  namespace: "{{ .Release.Namespace }}"
spec:
  concurrencyPolicy: Replace
  schedule: "*/1 * * * *"
  suspend: false
  jobTemplate:
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/inject: "false"
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: check-agent-is-ready
              command:
                [
                  "/bin/sh",
                  "-c",
                  "while ! nc -z \"$ENDPOINT_URL_TO_CHECK\" \"$ENDPOINT_PORT_TO_CHECK\"; do echo \"Waiting for Airm Agent at ${ENDPOINT_URL_TO_CHECK}:${ENDPOINT_PORT_TO_CHECK}...\"; sleep 3; done; echo \"Airm Agent is accepting connections at ${ENDPOINT_URL_TO_CHECK}:${ENDPOINT_PORT_TO_CHECK}.\"; sleep 3; exit 0"
                ]
              image: "{{ .Values.airm.utilities.netcat.image.repository }}:{{ .Values.airm.utilities.netcat.image.tag }}"
              imagePullPolicy: "{{ .Values.airm.utilities.netcat.image.pullPolicy }}"
              env:
                - name: ENDPOINT_URL_TO_CHECK
                  value: "{{ .Release.Name }}-agent.{{ .Release.Namespace }}.svc.cluster.local"
                - name: ENDPOINT_PORT_TO_CHECK
                  value: "{{ .Values.airm.agent.servicePort }}"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
          containers:
            - name: airm-heartbeat-cron
              command:
                - curl
                - -X
                - POST
                - http://{{ .Release.Name }}-agent:{{ .Values.airm.agent.servicePort }}/heartbeats
              image: "{{ .Values.airm.utilities.curl.image.repository }}:{{ .Values.airm.utilities.curl.image.tag }}"
              imagePullPolicy: "{{ .Values.airm.utilities.curl.image.pullPolicy }}"
              resources:
                requests:
                  memory: "100Mi"
                  cpu: "50m"
                limits:
                  memory: "100Mi"
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
