apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-agent-webhook-cert
  namespace: {{ .Release.Namespace }}
spec:
  dnsNames:
  - "{{ .Release.Name }}-agent-webhook.{{ .Release.Namespace }}.svc"
  - "{{ .Release.Name }}-agent-webhook.{{ .Release.Namespace }}.svc.cluster.local"
  issuerRef:
    kind: Issuer
    name: {{ .Release.Name }}-agent-self-signed-issuer
  secretName: {{ .Release.Name }}-agent-webhook-cert
