apiVersion: v1
kind: ServiceAccount
metadata:
  name: "{{ .Release.Name }}-agent-webhook-sa"
  namespace: "{{ .Release.Namespace }}"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: "{{ .Release.Name }}-agent-webhook-role"
rules:
  # Webhook needs to read namespaces to check AIRM project labels
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: "{{ .Release.Name }}-agent-webhook-binding"
subjects:
  - kind: ServiceAccount
    name: "{{ .Release.Name }}-agent-webhook-sa"
    namespace: "{{ .Release.Namespace }}"
roleRef:
  kind: ClusterRole
  name: "{{ .Release.Name }}-agent-webhook-role"
  apiGroup: rbac.authorization.k8s.io
