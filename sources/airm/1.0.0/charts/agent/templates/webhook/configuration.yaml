# Single MutatingWebhookConfiguration with kind-specific webhooks.
# Each webhook handles all mutations (quota enforcement + workload tracking) for its resource type.
# This reduces HTTP round-trips compared to having separate webhooks per concern.

apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ .Release.Name }}-agent-webhooks
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ .Release.Name }}-agent-webhook-cert
webhooks:
# Pod webhook
- name: pod.airm.silogen.ai
  admissionReviewVersions: ["v1"]
  clientConfig:
    service:
      name: {{ .Release.Name }}-agent-webhook
      namespace: {{ .Release.Namespace }}
      path: /mutate-pod
      port: {{ .Values.airm.webhook.servicePort }}
  failurePolicy: Fail
  sideEffects: None
  timeoutSeconds: 10
  namespaceSelector:
    matchExpressions:
    - key: airm.silogen.ai/project-id
      operator: Exists
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
    scope: "Namespaced"

# Deployment webhook
- name: deployment.airm.silogen.ai
  admissionReviewVersions: ["v1"]
  clientConfig:
    service:
      name: {{ .Release.Name }}-agent-webhook
      namespace: {{ .Release.Namespace }}
      path: /mutate-deployment
      port: {{ .Values.airm.webhook.servicePort }}
  failurePolicy: Fail
  sideEffects: None
  timeoutSeconds: 10
  namespaceSelector:
    matchExpressions:
    - key: airm.silogen.ai/project-id
      operator: Exists
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: ["apps"]
    apiVersions: ["v1"]
    resources: ["deployments"]
    scope: "Namespaced"

