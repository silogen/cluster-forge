domain: # to be filled by cluster-forge app

# Apps gateway (`https`): the external LoadBalancer front door. Terminates TLS (cluster-tls)
# for apps, owns the k8s.<domain> TLS-passthrough (kube API) and the ai-passthrough listeners
# on the same :443 VIP by SNI. No separate tls-passthrough gateway.
appsGateway:
  serviceType: LoadBalancer

# Stable ClusterIP `https` selecting the apps-gateway data plane, used by CoreDNS for the
# *.domain rewrite (in-cluster resolution).
gatewayDnsService:
  enabled: true

# Dedicated AI gateway (`ai-gateway`): a separate Envoy (ClusterIP) for AIGatewayRoute traffic,
# isolating inference/EPP failures from the apps gateway (EAI-6805). The apps gateway TLS-
# passes-through routeHostname to it by SNI and ai-gateway terminates its own TLS. AI routes
# land here once ai-gateway-discovery targets it (GATEWAY_NAME=ai-gateway, in silogen/core).
aiGateway:
  enabled: false
  # SNI host the apps gateway passes through to ai-gateway. MUST equal the discovery
  # controller's controller.gateway.routeHostname (AIRouteHostname), e.g. gateway.<domain>.
  # Required when enabled — the ai-passthrough listener/route only render when set.
  routeHostname: ""
  # Stable ClusterIP `ai-gateway` (CoreDNS target / passthrough backend).
  dnsService:
    enabled: true

# SPIKE (rate-limiting PoC, RL-1). Deploys an ephemeral Redis backing Envoy Gateway's
# global rate-limit service and (optionally) a per-key BackendTrafficPolicy. The matching
# EnvoyGateway control-plane switch lives in root/values.yaml
# (config.envoyGateway.rateLimit.backend.redis.url -> ratelimit-redis Service below).
rateLimit:
  # Deploys ratelimit-redis (Deployment + Service). Required for any global rate limiting.
  enabled: true
  redis:
    image: redis:7-alpine
  # The actual per-key test policy. Left disabled by default so deploying the branch readies
  # the infra without enforcing anything. Once we have a real API key on the cluster, set
  # policy.enabled=true + policy.apiKeyId (and redeploy), OR kubectl-apply a filled copy of
  # the rendered BackendTrafficPolicy directly for faster spike iteration.
  policy:
    enabled: false
    # x-api-key-id value to limit (cluster-auth sets this = identity.Username for the key).
    apiKeyId: ""
    # What the policy attaches to. Default: the whole ai-gateway Gateway (simplest for the
    # PoC); narrow to the per-service HTTPRoute later for true per-inference-service limits.
    targetRef:
      group: gateway.networking.k8s.io
      kind: Gateway
      name: ai-gateway
    requests:
      limit: 5
      unit: Minute
    tokens:
      limit: 1000
      unit: Minute
