{{- if .Values.gatewayDnsService.enabled }}
# Stable ClusterIP for CoreDNS *.domain rewrite — not a LoadBalancer front door.
# External traffic uses Envoy Gateway auto-generated LoadBalancer (MetalLB).
apiVersion: v1
kind: Service
metadata:
  name: https
  namespace: envoy-gateway-system
spec:
  selector:
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: envoy-gateway
    app.kubernetes.io/name: envoy
    gateway.envoyproxy.io/owning-gateway-name: https
    gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway-system
  ports:
  - name: https-{{ .Values.ports.https }}
    port: {{ .Values.ports.https }}
    protocol: TCP
    targetPort: 10443
  type: ClusterIP
{{- end }}
