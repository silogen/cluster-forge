{{- if and .Values.aiGateway.enabled .Values.aiGateway.dnsService.enabled }}
# Stable ClusterIP `ai-gateway` selecting the ai-gateway data plane (HTTPS listener). This is
# the passthrough backend the apps gateway sends the AI hostname to (tlsroute-ai-passthrough),
# and the CoreDNS target for the AI hostname in-cluster.
apiVersion: v1
kind: Service
metadata:
  name: ai-gateway
  namespace: envoy-gateway-system
spec:
  selector:
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: envoy-gateway
    app.kubernetes.io/name: envoy
    gateway.envoyproxy.io/owning-gateway-name: ai-gateway
    gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway-system
  ports:
  - name: https-{{ .Values.ports.aiGatewayHttps }}
    port: {{ .Values.ports.aiGatewayHttps }}
    protocol: TCP
    targetPort: 10443
  type: ClusterIP
{{- end }}
