{{- if .Values.k8sApiPassthrough.enabled }}
# TLS passthrough to kubernetes API on Gateway :6443 (k8s.domain).
# Requires node-ip != MetalLB VIP — see k8sApiPassthrough in values.yaml.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: k8s-passthrough
  namespace: default
spec:
  hostnames:
  - k8s.{{ .Values.domain }}
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: https
    namespace: envoy-gateway-system
    sectionName: k8s-passthrough
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: kubernetes
      port: 443
      weight: 1
{{- end }}
