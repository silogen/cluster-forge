# SNI k8s.<domain> -> kubernetes API service (TLS passthrough via the apps gateway's
# k8s-passthrough listener). In the `default` namespace alongside the `kubernetes` service,
# so no ReferenceGrant is needed.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: k8s-api-passthrough
  namespace: default
spec:
  hostnames:
    - k8s.{{ .Values.domain }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: https
      namespace: envoy-gateway-system
      sectionName: k8s-passthrough
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: kubernetes
          port: 443
          weight: 1
