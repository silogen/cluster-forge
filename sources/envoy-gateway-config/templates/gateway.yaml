apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: https
  namespace: envoy-gateway-system
  annotations:
    # Links to the GatewayConfig that enables globalLLMRequestCosts for token metadata.
    # The GatewayConfig is deployed by the aim-gateway chart.
    aigateway.envoyproxy.io/gateway-config: aim-gateway-global-costs
spec:
  gatewayClassName: envoy-gateway
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: access-logging-config
  listeners:
    - allowedRoutes:
        namespaces:
          from: All
      hostname: "*.{{ .Values.domain }}"
      name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ''
            kind: Secret
            name: cluster-tls
        mode: Terminate
