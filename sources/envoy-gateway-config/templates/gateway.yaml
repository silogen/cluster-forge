# Shared listener: apps via HTTPRoute, AI via AIGatewayRoute on the same :443 Gateway.
# Do not use mergeGateways — Envoy AI Gateway does not support it (envoyproxy/ai-gateway#1638).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: https
  namespace: envoy-gateway-system
  annotations:
    aigateway.envoyproxy.io/gateway-config: ai-extproc
spec:
  gatewayClassName: envoy-gateway
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: access-logging-config
  listeners:
    - allowedRoutes:
        namespaces:
          from: All
      hostname: "*.{{ .Values.domain }}"
      name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ''
            kind: Secret
            name: cluster-tls
        mode: Terminate
{{- if .Values.k8sApiPassthrough.enabled }}
    - allowedRoutes:
        kinds:
          - group: gateway.networking.k8s.io
            kind: TLSRoute
        namespaces:
          from: All
      hostname: "k8s.{{ .Values.domain }}"
      name: k8s-passthrough
      port: 6443
      protocol: TLS
      tls:
        mode: Passthrough
{{- end }}
