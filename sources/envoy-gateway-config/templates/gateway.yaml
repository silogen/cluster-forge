# Apps gateway: terminates TLS and serves apps via HTTPRoute and AI via AIGatewayRoute.
# Exposed as ClusterIP (see appsGateway.serviceType); the tls-passthrough gateway is the
# external front door and TLS-passes-through to this gateway by SNI.
# Do not use mergeGateways — Envoy AI Gateway does not support it (envoyproxy/ai-gateway#1638).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: https
  namespace: envoy-gateway-system
  annotations:
    aigateway.envoyproxy.io/gateway-config: ai-extproc
spec:
  gatewayClassName: envoy-gateway
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: access-logging-config
  listeners:
    - allowedRoutes:
        namespaces:
          from: All
      hostname: "*.{{ .Values.domain }}"
      name: https
      port: 443
      protocol: HTTPS
      tls:
        certificateRefs:
          - group: ''
            kind: Secret
            name: cluster-tls
        mode: Terminate
