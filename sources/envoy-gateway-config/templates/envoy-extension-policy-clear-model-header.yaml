{{- if .Values.aiGateway.enabled }}
# Second Lua filter: removes x-ai-eg-model just before the router when
# x-ai-eg-backend is set (UUID-based routing from the "backend" request body field).
#
# The EPP ext_proc filters (one per InferencePool) sit between the first Lua filter
# and the router. Each EPP reads the request body, extracts the model name, and adds
# x-ai-eg-model back as a header mutation after the first Lua filter already removed it.
# Without this filter, the router sees x-ai-eg-model and the oldest AIM's model-name
# rule fires first via Envoy first-match semantics, routing to the wrong AIM.
#
# Positioned before the router (after all EPP ext_procs) via filterOrder in
# ai-gateway-proxy-config.yaml, giving it the final word on routing headers.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: clear-model-header-for-routing
  namespace: envoy-gateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: ai-gateway
  lua:
    - type: Inline
      inline: |
        function envoy_on_request(request_handle)
          if request_handle:headers():get("x-ai-eg-backend") ~= nil then
            request_handle:headers():remove("x-ai-eg-model")
          end
        end
{{- end }}
