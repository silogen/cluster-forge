{{- if .Values.tlsPassthroughGateway.enabled }}
# tls-passthrough gateway: the external front door. Owns the MetalLB LoadBalancer on :443 and
# does pure TLS passthrough by SNI (see the tls-passthrough TLSRoutes):
#   k8s.<domain>        -> kubernetes API service
#   everything else     -> apps gateway (`https` ClusterIP), which terminates TLS.
# Separate Envoy data plane from the apps gateway (no mergeGateways), and listens on :443
# only so it never hijacks pod->apiserver (:6443) traffic on cluster-bloom.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: tls-passthrough
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy-gateway
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: tls-passthrough-proxy-config
  listeners:
    # TLS passthrough is SNI-based, so the listener and its routes must carry hostnames —
    # an empty hostname yields no filter chain and an empty Envoy config. *.<domain> covers
    # both app hostnames and k8s.<domain>; the k8s route wins by SNI longest-match.
    - name: tls
      hostname: "*.{{ .Values.domain }}"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
      allowedRoutes:
        kinds:
          - group: gateway.networking.k8s.io
            kind: TLSRoute
        namespaces:
          from: All
{{- end }}
