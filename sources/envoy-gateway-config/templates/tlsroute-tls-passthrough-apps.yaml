{{- if .Values.tlsPassthroughGateway.enabled }}
# Wildcard *.<domain>: everything except k8s.<domain> (which has a more specific route and
# wins by SNI longest-match) is passed through to the apps gateway's stable ClusterIP
# (`https`), which terminates TLS and routes via HTTPRoute / AIGatewayRoute.
# TLS passthrough is SNI-based, so this must carry a hostname. Requires gatewayDnsService.enabled.
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TLSRoute
metadata:
  name: tls-passthrough-apps
  namespace: envoy-gateway-system
spec:
  hostnames:
    - "*.{{ .Values.domain }}"
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: tls-passthrough
      namespace: envoy-gateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: https
          port: 443
          weight: 1
{{- end }}
