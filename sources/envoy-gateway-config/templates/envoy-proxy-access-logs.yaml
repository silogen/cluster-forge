# EnvoyProxy configuration for access logging and pod placement.
# Referenced by Gateway via infrastructure.parametersRef.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: access-logging-config
  namespace: envoy-gateway-system
spec:
  filterOrder:
    - name: envoy.filters.http.lua
      before: envoy.filters.http.ext_authz
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        {{- if .Values.appsGateway.envoyServiceAnnotations }}
        annotations:
          {{- toYaml .Values.appsGateway.envoyServiceAnnotations | nindent 10 }}
        {{- end }}
        {{- if .Values.appsGateway.envoyServicePatch }}
        patch:
          {{- toYaml .Values.appsGateway.envoyServicePatch | nindent 10 }}
        {{- end }}
        # LoadBalancer: the apps gateway is the external front door and owns the VIP on :443
        # (HTTPS terminate + k8s TLS-passthrough listeners).
        type: {{ .Values.appsGateway.serviceType }}
      envoyDeployment:
        pod:
          {{- if .Values.appsGateway.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.appsGateway.nodeSelector | nindent 12 }}
          {{- end }}
          priorityClassName: "system-cluster-critical"
  telemetry:
    accessLog:
      settings:
        - format:
            type: JSON
            json:
              start_time: "%START_TIME%"
              method: "%REQ(X-ENVOY-ORIGINAL-METHOD?:METHOD)%"
              path: "%REQ(X-ENVOY-ORIGINAL-PATH?:PATH)%"
              protocol: "%PROTOCOL%"
              response_code: "%RESPONSE_CODE%"
              response_flags: "%RESPONSE_FLAGS%"
              bytes_received: "%BYTES_RECEIVED%"
              bytes_sent: "%BYTES_SENT%"
              total_duration: "%DURATION%"
              resp_backend_service_time: "%RESP(X-ENVOY-UPSTREAM-SERVICE-TIME)%"
              req_x_forwarded_for: "%REQ(X-FORWARDED-FOR)%"
              user_agent: "%REQ(USER-AGENT)%"
              request_id: "%REQ(X-REQUEST-ID)%"
              authority: "%REQ(:AUTHORITY)%"
              backendHost: "%UPSTREAM_HOST%"
              backendCluster: "%UPSTREAM_CLUSTER%"
              model: "%REQ(x-ai-eg-model)%"
              llm_input_token: "%DYNAMIC_METADATA(io.envoy.ai_gateway:llm_input_token)%"
              llm_output_token: "%DYNAMIC_METADATA(io.envoy.ai_gateway:llm_output_token)%"
              llm_total_token: "%DYNAMIC_METADATA(io.envoy.ai_gateway:llm_total_token)%"
              api_key_id: "%REQ(x-api-key-id)%"
              aim_service_id: "%REQ(x-aim-service-id)%"
          sinks:
            - type: File
              file:
                path: /dev/stdout
