{{- if .Values.tlsPassthroughGateway.enabled }}
# EnvoyProxy for the tls-passthrough gateway: serviceType-controlled external service + first-node placement.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: tls-passthrough-proxy-config
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: {{ .Values.tlsPassthroughGateway.serviceType }}
        {{- if eq .Values.tlsPassthroughGateway.serviceType "LoadBalancer" }}
        {{- with .Values.tlsPassthroughGateway.loadBalancerIP }}
        loadBalancerIP: {{ . | quote }}
        {{- end }}
        {{- end }}
      envoyDeployment:
        pod:
          nodeSelector:
            cluster-bloom/first-node: "true"
          priorityClassName: "system-cluster-critical"
{{- end }}
