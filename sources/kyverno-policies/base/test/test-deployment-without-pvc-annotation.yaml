apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment-without-pvc-annotation
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app-no-pvc
  template:
    metadata:
      labels:
        app: test-app-no-pvc
    spec:
      containers:
      - name: test-container
        image: nginx:latest
        ports:
        - containerPort: 80