apiVersion: batch/v1
kind: Job
metadata:
  name: test-modelcache-job
  namespace: default
  labels:
    app.kubernetes.io/managed-by: modelcache-controller
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: modelcache-controller
    spec:
      restartPolicy: Never
      containers:
      - name: model-download
        image: huggingface/transformers-pytorch-gpu:latest
        command: ["python", "-c", "print('Downloading model...')"]
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"