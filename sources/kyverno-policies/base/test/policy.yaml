# Source: kyverno-policies-base/templates/dynamic-pvc-creation.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-pvc-generator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-pvc-generator
subjects:
  - kind: ServiceAccount
    name: kyverno-background-controller
    namespace: kyverno
---
# Source: kyverno-policies-base/templates/dynamic-pvc-creation.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: dynamic-pvc-creation
spec:
  admission: true
  background: false
  emitWarning: false
  rules:
    - generate:
        apiVersion: v1
        data:
          spec:
            accessModes:
              - ReadWriteMany
            resources:
              requests:
                storage: '{{ request.object.metadata.annotations."pvc.silogen.ai/user-pvc-size" }}'
            storageClassName: '{{ request.object.metadata.annotations."pvc.silogen.ai/user-pvc-storage-class-name" }}'
        kind: PersistentVolumeClaim
        name: pvc-{{ request.object.metadata.annotations."pvc.silogen.ai/user-pvc-uid" }}
        namespace: '{{ request.object.metadata.namespace }}'
        synchronize: false
      match:
        resources:
          kinds:
            - Deployment
            - Pod
      name: create-pvc-if-annotated
      preconditions:
        all:
          - key: '{{ request.object.metadata.annotations."pvc.silogen.ai/user-pvc-auto-create" }}'
            operator: Equals
            value: "true"
          - key: '{{ request.object.metadata.annotations."pvc.silogen.ai/user-pvc-size" }}'
            operator: NotEquals
            value: ""
          - key: '{{ request.object.metadata.annotations."pvc.silogen.ai/user-pvc-storage-class-name" }}'
            operator: NotEquals
            value: ""
      skipBackgroundRequests: true
  validationFailureAction: Enforce
---
# Source: kyverno-policies-base/templates/modelcache-resource-constraints.yaml
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: modelcache-download-resource-limits
spec:
  rules:
  - name: add-resource-constraints-to-download-jobs
    match:
      any:
      - resources:
          kinds:
          - Job
          selector:
            matchLabels:
              app.kubernetes.io/managed-by: modelcache-controller
    mutate:
      patchStrategicMerge:
        spec:
          template:
            spec:
              containers:
              - (name): "model-download"
                resources:
                  limits:
                    memory: "32Gi"
                  requests:
                    memory: "4Gi"
                    cpu: "2"
                env:
                - name: HF_XET_HIGH_PERFORMANCE
                  value: "0"
                - name: HF_XET_NUM_CONCURRENT_RANGE_GETS
                  value: "8"
                - name: HF_XET_RECONSTRUCT_WRITE_SEQUENTIALLY
                  value: "1"
