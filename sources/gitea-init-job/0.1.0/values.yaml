# small|medium|large (injected by bootstrap script)
clusterSize: null

# Domain for the cluster (injected by bootstrap script)
# Example: "compute.amd.com"
domain: null

# Git revision to deploy (injected by bootstrap script)
targetRevision: null

# Base image repository for AIRM components (injected by bootstrap script when specified)
# Example: "ghcr.io/silogen"
airmImageRepository: null

# Comma-separated list of disabled apps (injected by bootstrap script when --disabled-apps is used)
# Example: "airm,airm-infra-cnpg"
disabledApps: null

# Whether to deploy only AIWB components (injected by bootstrap script when --aiwb-only is used)
aiwbOnly: false

# Comma-separated AIM hardware families to install (injected by bootstrap script when AIM_HARDWARE_FAMILY is set)
# Empty/null = install all (legacy). Example: "epyc,instinct"
aimHardwareFamily: null

# GPU stack family driving ROCm + GPU Operator defaults (injected by cluster-bloom from GPU_STACK_FAMILY).
# Empty/null = instinct (current defaults). Example: "radeon"
gpuStackFamily: null

# GPU Operator ArgoCD app path for the resolved family (injected by cluster-bloom).
# Example: "amd-gpu-operator/v1.4.1"
gpuOperatorPath: null

# GPU Operator config ArgoCD app path for the resolved family (injected by cluster-bloom).
# Example: "amd-gpu-operator-config/v1.4.1"
gpuOperatorConfigPath: null

# DeviceConfig out-of-tree driver ROCm version for the resolved family (injected by cluster-bloom).
# Example: "7.0"
gpuDeviceConfigDriverVersion: null
