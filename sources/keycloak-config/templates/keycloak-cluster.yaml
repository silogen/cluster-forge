---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-cnpg-superuser-credentials
  namespace: keycloak
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-secret-store
  target:
    creationPolicy: Owner
    name: keycloak-cnpg-superuser
  data:
    - remoteRef:
        key: keycloak-cnpg-superuser-username
        property: value
      secretKey: username
    - remoteRef:
        key: keycloak-cnpg-superuser-password
        property: value
      secretKey: password

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-cnpg-user-credentials
  namespace: keycloak
spec:
  data:
    - remoteRef:
        key: keycloak-cnpg-user-username
        property: value
      secretKey: username
    - remoteRef:
        key: keycloak-cnpg-user-password
        property: value
      secretKey: password
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-secret-store
  target:
    creationPolicy: Owner
    name: keycloak-cnpg-user
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-cnpg
  namespace: keycloak
spec:
  affinity:
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
      postInitSQL:
        - GRANT CREATE ON SCHEMA public TO keycloak
      secret:
        name: keycloak-cnpg-user
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  instances: {{ .Values.cnpg.instances | default 1 }}
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  postgresql:
    parameters:
      auto_explain.log_min_duration: 10s
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: all
      shared_buffers: 256MB
    pg_hba:
      - host all all 10.244.0.0/16 md5
  primaryUpdateStrategy: unsupervised
  resources:
    limits:
      cpu: {{ .Values.cnpg.resources.limits.cpu | default "2" | quote }}
      memory: {{ .Values.cnpg.resources.limits.memory | default "1Gi" | quote }}
    requests:
      cpu: {{ .Values.cnpg.resources.requests.cpu | default "1" | quote }}
      memory: {{ .Values.cnpg.resources.requests.memory | default "512Mi" | quote }}
  serviceAccountTemplate:
    metadata:
      annotations:
        iam.gke.io/gcp-service-account: dev-gke-sa@silogen-dev.iam.gserviceaccount.com
  startDelay: 300
  stopDelay: 300
  storage:
    size: {{ .Values.cnpg.storage.size | default "50Gi" | quote }}
    storageClass: default
  superuserSecret:
    name: keycloak-cnpg-superuser
  walStorage:
    size: {{ .Values.cnpg.walStorage.size | default "50Gi" | quote }}
    storageClass: default
