domain: # to be filled by cluster-forge app
seaweed:
  storageClassName: mlstorage
  master:
    replicas: 1
    volumeSizeLimitMB: 1024
  volume:
    replicas: 1
    requests:
      storage: 25Gi
  filer:
    replicas: 1
    requests:
      storage: 10Gi

# S3 bucket initialization
initJob:
  enabled: true
  buckets:
    - name: default-bucket