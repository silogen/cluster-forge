apiVersion: v1
kind: Service
metadata:
  name: filer-s3
  namespace: seaweedfs-instance
spec:
  ports:
    - name: http
      port: 80
      targetPort: 8333
      protocol: TCP
  selector:
    app.kubernetes.io/component: filer
    app.kubernetes.io/instance: seaweed
    app.kubernetes.io/managed-by: seaweedfs-operator
    app.kubernetes.io/name: seaweedfs