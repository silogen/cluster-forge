apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: seaweedfs-es-s3-config
  namespace: seaweedfs-instance
  annotations:
    # PreSync + sync-wave: ensure OpenBao-backed Secret exists (and Argo marks this
    # resource Healthy per ExternalSecret health rules) before the Seaweed CR syncs.
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-2"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-secret-store
  # Shorter interval so the filer picks up OpenBao updates soon after the secret
  # manager reconciles static keys (default openbao cron is every 5m).
  refreshInterval: 1m
  target:
    name: seaweedfs-s3-config
    template:
      data:
        s3.json: |
          {
            "identities": [
              {
                "name": "Console",
                "actions": [
                  "Admin"
                ],
                "credentials": [
                  {
                    "accessKey": "{{ "{{" }}.CONSOLE_ACCESS_KEY{{ "}}"}}",
                    "secretKey": "{{ "{{" }}.CONSOLE_SECRET_KEY{{ "}}"}}"
                  }
                ]
              },
              {
                "name": "ApiUser",
                "actions": [
                  "Admin"
                ],
                "credentials": [
                  {
                    "accessKey": "{{ "{{" }}.API_ACCESS_KEY{{ "}}"}}",
                    "secretKey": "{{ "{{" }}.API_SECRET_KEY{{ "}}"}}"
                  }
                ]
              }
            ] 
          }
  # OpenBao paths use legacy "minio-*" keys (shared with AIRM / Keycloak); values feed SeaweedFS only.
  data:
    - secretKey: API_ACCESS_KEY
      remoteRef:
        key: secrets/data/minio-api-access-key
        property: value
    - secretKey: API_SECRET_KEY
      remoteRef:
        key: secrets/data/minio-api-secret-key
        property: value
    - secretKey: CONSOLE_ACCESS_KEY
      remoteRef:
        key: secrets/data/minio-console-access-key
        property: value
    - secretKey: CONSOLE_SECRET_KEY
      remoteRef:
        key: secrets/data/minio-console-secret-key
        property: value