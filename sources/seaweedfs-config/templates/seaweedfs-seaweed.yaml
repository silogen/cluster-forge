{{- with .Values.seaweed }}
apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
  name: seaweed
  namespace: seaweedfs-instance
spec:
  image: chrislusf/seaweedfs:latest
  volumeServerDiskCount: 1
  hostSuffix: "seaweedfs-instance.svc.cluster.local"
  master:
    ingress:
      enabled: false
    replicas: {{ .master.replicas }}
    volumeSizeLimitMB: 1024
  volume:
    ingress:
      enabled: false
    replicas: {{ .volume.replicas }}
    storageClassName: {{ .storageClassName }}
    requests:
      storage: {{ .volume.requests.storage }}
    # Topology configuration for rack/datacenter-aware placement
    rack: "rack1"
    dataCenter: "dc1"
  filer:
    replicas: {{ .filer.replicas }}
    volumes:
      - name: s3-metadata
        persistentVolumeClaim:
          claimName: pvc-seaweed-s3-metadata
    volumeMounts:
      - mountPath: /data/
        name: s3-metadata
    config: |
      [leveldb2]
      enabled = true
      dir = "/data/filerldb2"
  s3:
    ingress:
      enabled: false
    configSecret:
      name: seaweedfs-s3-config
      key: s3.json
{{- end}}