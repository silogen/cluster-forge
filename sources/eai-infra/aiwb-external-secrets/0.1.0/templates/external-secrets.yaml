# =============================================================================
# Core secrets (always required)
# =============================================================================
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.minio.credentialsSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  data:
    - remoteRef:
        key: minio-api-access-key
        property: value
      secretKey: {{ .Values.minio.accessKeyKey }}
    - remoteRef:
        key: minio-api-secret-key
        property: value
      secretKey: {{ .Values.minio.secretKeyKey }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecretStore }}
  target:
    name: {{ .Values.minio.credentialsSecretName }}
    template:
      type: Opaque
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.keycloak.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  data:
    - remoteRef:
        key: airm-ui-keycloak-secret
        property: value
      secretKey: value
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecretStore }}
  target:
    name: {{ .Values.keycloak.secretName }}
    template:
      type: Opaque
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.clusterAuth.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  data:
    - remoteRef:
        key: cluster-auth-admin-token
        property: value
      secretKey: value
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecretStore }}
  target:
    name: {{ .Values.clusterAuth.secretName }}
    template:
      type: Opaque
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.postgresql.userSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  data:
    - remoteRef:
        key: aiwb-cnpg-user-password
        property: value
      secretKey: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecretStore }}
  target:
    name: {{ .Values.postgresql.userSecretName }}
    template:
      type: Opaque
      mergePolicy: Merge
      data:
        # CNPG expects both username and password; username from chart, password from vault
        # TODO move username to vault as well
        username: {{ .Values.postgresql.username | quote }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.postgresql.superuserSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  data:
    - remoteRef:
        key: aiwb-cnpg-superuser-username
        property: value
      secretKey: username
    - remoteRef:
        key: aiwb-cnpg-superuser-password
        property: value
      secretKey: password
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecretStore }}
  target:
    name: {{ .Values.postgresql.superuserSecretName }}
    template:
      type: Opaque
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.frontend.nextAuthSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  data:
    - remoteRef:
        key: aiwb-ui-auth-nextauth-secret
        property: value
      secretKey: NEXTAUTH_SECRET
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecretStore }}
  target:
    name: {{ .Values.frontend.nextAuthSecretName }}
    template:
      type: Opaque

# =============================================================================
# Standalone mode secrets (only when not integrated with AIRM)
# =============================================================================
{{- if .Values.standAloneMode }}
---
# MinIO credentials for the workbench namespace
# This allows workloads in the workbench namespace to access MinIO
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.minio.credentialsSecretName }}
  namespace: {{ .Values.defaultNamespace | default "workbench" }}
spec:
  data:
    - remoteRef:
        key: minio-api-access-key
        property: value
      secretKey: {{ .Values.minio.accessKeyKey }}
    - remoteRef:
        key: minio-api-secret-key
        property: value
      secretKey: {{ .Values.minio.secretKeyKey }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecretStore }}
  target:
    name: {{ .Values.minio.workloadCredentialsSecretName  }}
    template:
      type: Opaque
{{- end }}