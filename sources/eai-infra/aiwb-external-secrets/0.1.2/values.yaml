---
# Standalone mode: true or false
# true: AIWB manages its own namespace, creates Kyverno policies, and secrets
# false: AIRM manages namespaces, policies, and secrets
standAloneMode: false

# Name of the default namespace to create (only used when standAloneMode: true)
defaultNamespace: "workbench"

externalSecretStore: "openbao-secret-store"
frontend:
  nextAuthSecretName: "aiwb-nextauth-secret"

keycloak:
  secretName: "aiwb-ui-keycloak-secret"
  userCredentialsSecretName: "aiwb-user-credentials"

# S3-compatible object storage configuration
# Note: Named "minio" for backward compatibility, but used with SeaweedFS
minio:
  credentialsSecretName: "minio-credentials"  # Secret name kept for backward compatibility
  accessKeyKey: "minio-access-key"             # Key name kept for backward compatibility
  secretKeyKey: "minio-secret-key"             # Key name kept for backward compatibility

# ClusterAuth configuration (for API key management)
clusterAuth:
  secretName: "cluster-auth-admin-token"

# Scoped OpenBao write token for the API-key KV path (EAI-7277). Consumed by the AIWB backend
# as OPENBAO_TOKEN; must match openBao.secretName in the core aiwb chart.
openbaoToken:
  secretName: "aiwb-openbao-token"

# PostgreSQL CNPG Configuration
postgresql:
  username: "aiwb_user"
  userSecretName: "aiwb-cnpg-user"
  superuserSecretName: "aiwb-cnpg-superuser"
