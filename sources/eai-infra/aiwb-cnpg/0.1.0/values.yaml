# PostgreSQL CNPG Configuration
database: "aiwb"
username: "aiwb_user"
image: "ghcr.io/cloudnative-pg/postgresql:17.2"
instances: 3
userSecretName: "aiwb-cnpg-user"
superuserSecretName: "aiwb-cnpg-superuser"
sharedBuffers: "256MB"
resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1"
storage:
  size: "10Gi"
  storageClass: "default"
walStorage:
  size: "2Gi"
  storageClass: "default"
