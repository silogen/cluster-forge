# PostgreSQL CNPG Configuration
database: "airm"
username: "airm_user"
image: "ghcr.io/cloudnative-pg/postgresql:17.2"
instances: 1
userSecretName: "airm-cnpg-user"
superuserSecretName: "airm-cnpg-superuser"
sharedBuffers: "256MB"
resources:
  requests:
    memory: "512Mi"
    cpu: "1"
  limits:
    memory: "1Gi"
    cpu: "2"
storage:
  size: "50Gi"
  storageClass: "default"
walStorage:
  size: "50Gi"
  storageClass: "default"
