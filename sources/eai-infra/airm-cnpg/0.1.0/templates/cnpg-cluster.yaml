---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: "{{ .Release.Name }}-cnpg"
  namespace: "{{ .Release.Namespace }}"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  affinity:
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone
  bootstrap:
    initdb:
      database: {{ .Values.database }}
      owner: {{ .Values.username }}
      postInitSQL:
        - GRANT CREATE ON SCHEMA public TO "{{ .Values.username }}"
      secret:
        name: "{{ .Values.userSecretName }}"
  imageName: {{ .Values.image }}
  instances: {{ .Values.instances }}
  nodeMaintenanceWindow:
    inProgress: false
    reusePVC: true
  postgresql:
    parameters:
      auto_explain.log_min_duration: "10s"
      pg_stat_statements.max: "10000"
      pg_stat_statements.track: "all"
      shared_buffers: "{{ .Values.sharedBuffers }}"
      wal_compression: "pglz" # default is "off"
    pg_hba:
      # Allow connections from pods in the cluster
      - host all all 10.244.0.0/16 md5
  primaryUpdateStrategy: unsupervised
  resources:
    {{- toYaml .Values.resources | nindent 4 }}
  startDelay: 300
  stopDelay: 300
  storage:
    {{- toYaml .Values.storage | nindent 4 }}
  superuserSecret:
    name: {{ .Values.superuserSecretName }}
  walStorage:
    {{- toYaml .Values.walStorage | nindent 4 }}
