gateway:
  name: https
  namespace: envoy-gateway-system

# List of AIM Engine inference service backends to expose through the AI Gateway.
# Each entry creates an Envoy Gateway Backend + AIServiceBackend pair.
# Override this per cluster in the cluster-values repo.
# Example:
#   backends:
#     - name: my-model
#       serviceName: wb-aim-xxxx-predictor
#       serviceNamespace: workbench
#       servicePort: 80
#       modelName: "org/model-name"
backends: []

# Metrics are scraped from the ai-gateway-extproc sidecar (port 1064/metrics)
# by otel-collector-metrics-rest in the otel-lgtm-stack namespace. No chart-local
# collector is needed.

# API key authentication via Envoy Gateway SecurityPolicy.
# When enabled, inference requests must include a valid Bearer token.
# Secret format: each key in .data is the client ID (api_key_id),
# each value is the raw API key string (no "Bearer" prefix).
# Override secretName and enabled per cluster in cluster-values.
apiKeyAuth:
  enabled: false
  secretName: aim-gateway-api-keys
  forwardClientIDHeader: x-api-key-id
