gateway:
  name: https
  namespace: envoy-gateway-system

# List of AIM Engine inference service backends to expose through the AI Gateway.
# Each entry creates an Envoy Gateway Backend + AIServiceBackend pair.
# Override this per cluster in the cluster-values repo.
# Example:
#   backends:
#     - name: my-model
#       serviceName: wb-aim-xxxx-predictor
#       serviceNamespace: workbench
#       servicePort: 80
#       modelName: "org/model-name"
backends: []

# OTel collector DaemonSet that reads Envoy access logs and emits
# aim_gateway_inference_requests_total{model="..."} to Prometheus/Mimir.
# Requires the opentelemetry-operator to be running in the cluster.
otelCollector:
  enabled: true
  otlpEndpoint: lgtm-stack.otel-lgtm-stack.svc.cluster.local:4317
