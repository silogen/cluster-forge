gateway:
  name: https
  namespace: envoy-gateway-system

# List of AIM Engine inference service backends to expose through the AI Gateway.
# Each entry creates an Envoy Gateway Backend + AIServiceBackend pair.
# Override this per cluster in the cluster-values repo.
# Example:
#   backends:
#     - name: my-model
#       serviceName: wb-aim-xxxx-predictor
#       serviceNamespace: workbench
#       servicePort: 80
#       modelName: "org/model-name"
backends: []

# Metrics are scraped from the ai-gateway-extproc sidecar (port 1064/metrics)
# by otel-collector-metrics-rest in the otel-lgtm-stack namespace. No chart-local
# collector is needed.

# API key authentication via Envoy Gateway SecurityPolicy.
# When enabled, inference requests must include a valid Bearer token.
# Secret format: each key in .data is the client ID (api_key_id),
# each value is the raw API key string (no "Bearer" prefix).
# Override secretName and enabled per cluster in cluster-values.
apiKeyAuth:
  enabled: false
  secretName: aim-gateway-api-keys
  forwardClientIDHeader: x-api-key-id

# Per-API-key token quota enforcement via Envoy AI Gateway QuotaPolicy.
# Quotas are counted in tokens (input + output) per time window.
# shadowMode: true observes without enforcing — safe for initial rollout.
# Override limits and enable per cluster in cluster-values.
quotaPolicy:
  enabled: false
  shadowMode: true
  perKeyTokenLimit: 1000000   # tokens per window per API key
  perKeyDuration: 1h
  globalTokenLimit: 10000000  # tokens per window across all keys (safety net)
  globalDuration: 1h
  # globalEnforced: when false (default), defaultBucket is omitted so the global
  # safety-net limit does not enforce while per-key rules are still in shadowMode.
  # Set to true only after tuning limits and disabling shadowMode.
  globalEnforced: false
