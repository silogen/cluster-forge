# Per-API-key token quota enforcement via Envoy AI Gateway QuotaPolicy.
# One QuotaPolicy is created per AIServiceBackend, scoped to its model.
#
# clientSelectors with type: Distinct creates an independent token bucket for
# each unique x-api-key-id value — no pre-enumeration of keys required.
# shadowMode: true observes quota consumption without blocking requests,
# allowing limits to be tuned before enforcement is turned on.
#
# Skipped when no backends are configured or quotaPolicy is disabled.
{{- if and .Values.backends .Values.quotaPolicy.enabled }}
{{- range .Values.backends }}
---
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: QuotaPolicy
metadata:
  name: aim-gateway-quota-{{ .name }}
  namespace: {{ $.Release.Namespace }}
spec:
  targetRefs:
    - group: aigateway.envoyproxy.io
      kind: AIServiceBackend
      name: {{ .name }}
  perModelQuotas:
    - modelName: {{ .modelName | quote }}
      quota:
        mode: Exclusive
        costExpression: "input_tokens + output_tokens"
        {{- if $.Values.quotaPolicy.globalEnforced }}
        defaultBucket:
          limit: {{ $.Values.quotaPolicy.globalTokenLimit }}
          duration: {{ $.Values.quotaPolicy.globalDuration | quote }}
        {{- end }}
        bucketRules:
          - clientSelectors:
              - headers:
                  - name: x-api-key-id
                    type: Distinct
            quota:
              limit: {{ $.Values.quotaPolicy.perKeyTokenLimit }}
              duration: {{ $.Values.quotaPolicy.perKeyDuration | quote }}
            shadowMode: {{ $.Values.quotaPolicy.shadowMode }}
{{- end }}
{{- end }}
