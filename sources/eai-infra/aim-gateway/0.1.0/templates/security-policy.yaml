# Validates Bearer tokens on inference requests against API key Secrets.
# forwardClientIDHeader injects the matched client ID (api_key_id) as
# x-api-key-id on every validated request forwarded to the AIM backend.
#
# Targets the HTTPRoute generated by AIGatewayRoute (same name, same namespace)
# rather than the Gateway, to avoid conflicting with the cluster-wide
# cluster-auth ExtAuth SecurityPolicy which targets the Gateway level.
# Skipped when no backends are configured or apiKeyAuth is disabled.
#
# BOOTSTRAP: The Secret named by apiKeyAuth.secretName must exist in this
# namespace before auth can function. It is not created by this chart.
# Each entry: data key = api_key_id (client identifier), value = raw Bearer token.
# Create it manually or provision via ExternalSecret from OpenBao.
# Example:
#   kubectl create secret generic aim-gateway-api-keys \
#     --from-literal=<api_key_id>=<raw_token> -n <namespace>
{{- if and .Values.backends .Values.apiKeyAuth.enabled }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: aim-gateway-api-key-auth
  namespace: {{ .Release.Namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: aim-inference-route
  apiKeyAuth:
    credentialRefs:
      - group: ""
        kind: Secret
        name: {{ .Values.apiKeyAuth.secretName }}
    extractFrom:
      - headers:
          - authorization
    forwardClientIDHeader: {{ .Values.apiKeyAuth.forwardClientIDHeader }}
    sanitize: true
{{- end }}
