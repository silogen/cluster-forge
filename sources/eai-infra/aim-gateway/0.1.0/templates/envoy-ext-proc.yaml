# These resources wire the AI Gateway ext_proc sidecar (injected by the AI Gateway
# controller into the Envoy pod) into the Envoy Gateway filter chain so that:
#   1. The ext_proc sidecar can handle both request routing and response body token counting.
#   2. Token counts (llm_input_token, llm_output_token, llm_total_token) are written as
#      Envoy dynamic metadata and picked up by the access log and OTel collector.
#
# Architecture:
#   - Backend: exposes the ext_proc Unix socket as an Envoy Backend resource.
#   - EnvoyExtensionPolicy: attaches an HTTP-level ext_proc filter to the Gateway.
#     writableNamespaces must include io.envoy.ai_gateway so Envoy does not drop the
#     DynamicMetadata the ext_proc sidecar writes to that namespace.
#   - GatewayConfig: enables globalLLMRequestCosts so the sidecar emits token metadata
#     for all routes (not just InferencePool routes, which have aigw_route_name set).
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: Backend
metadata:
  name: ai-gateway-extproc-uds
  namespace: {{ .Values.gateway.namespace }}
spec:
  endpoints:
  - unix:
      path: /etc/ai-gateway-extproc-uds/run.sock
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: ai-gateway-extproc
  namespace: {{ .Values.gateway.namespace }}
spec:
  extProc:
  - backendRefs:
    - group: gateway.envoyproxy.io
      kind: Backend
      name: ai-gateway-extproc-uds
      namespace: {{ .Values.gateway.namespace }}
    failOpen: true
    processingMode:
      request:
        body: Buffered
      response:
        body: Buffered
    metadata:
      # writableNamespaces tells Envoy to accept DynamicMetadata from the ext_proc
      # response in the io.envoy.ai_gateway namespace and merge it into StreamInfo.
      # Without this, Envoy silently drops the token metadata even when the ext_proc
      # sidecar correctly sets it, because setDynamicMetadata() short-circuits when
      # untypedReceivingMetadataNamespaces is empty.
      writableNamespaces:
      - io.envoy.ai_gateway
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ .Values.gateway.name }}
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: GatewayConfig
metadata:
  name: aim-gateway-global-costs
  namespace: {{ .Values.gateway.namespace }}
  annotations:
    # Force re-reconciliation when this resource changes. Increment to trigger.
    touched: "1778683432"
spec:
  # globalLLMRequestCosts applies to all routes regardless of aigw_route_name.
  # Required for K8s Service backends (non-InferencePool), where the ext_proc
  # resolveRouteName() returns "" and route-scoped llmRequestCosts never match.
  globalLLMRequestCosts:
  - metadataKey: llm_input_token
    type: InputToken
  - metadataKey: llm_output_token
    type: OutputToken
  - metadataKey: llm_total_token
    type: TotalToken
