# Grants envoy-gateway service account read access to AI Gateway CRDs.
# Required when extensionManager.resources includes AIGatewayRoute/AIServiceBackend.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "ai-gateway-helm.controller.fullname" . }}-envoy-gateway-ai-resources
rules:
  - apiGroups:
      - "aigateway.envoyproxy.io"
    resources:
      - "aigatewayroutes"
      - "aiservicebackends"
    verbs:
      - "get"
      - "list"
      - "watch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ai-gateway-helm.controller.fullname" . }}-envoy-gateway-ai-resources
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "ai-gateway-helm.controller.fullname" . }}-envoy-gateway-ai-resources
subjects:
  - kind: ServiceAccount
    name: envoy-gateway
    namespace: {{ .Values.envoyGateway.namespace }}
