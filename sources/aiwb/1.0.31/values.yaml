---
# Default values for AIWB (AI Workbench)

# Standalone mode: true or false
# true: AIWB is scoped to a single namespace. It creates and manages this namespace,
#   along with its Kyverno policies and secrets. The API rejects requests for any other
#   namespace because there is no group-based authorization to verify access outside
#   the managed namespace.
# false: AIRM manages namespaces, policies, and secrets. Users can access multiple
#   project namespaces based on their JWT group claims.
standAloneMode: false

# Name of the namespace to create and scope to (only used when standAloneMode: true).
# All AIWB resources (AIMs, workloads, workspaces, datasets) will be confined to this namespace.
defaultNamespace: "workbench"

# Metadata prefixes for labels and annotations on Kubernetes resources
metadataPrefix:
  # EAI Apps prefix for workload identification (workload-id, project-id labels)
  # TODO: Will change to "apps.eai.amd.com" in the future
  eaiApps: "airm.silogen.ai"
  # AIWB prefix for AIWB-specific labels and annotations (e.g., creator)
  aiwb: "aiwb.apps.eai.amd.com"

# Application domain (base domain for all services)
appDomain: "PUBLIC-IP"

# kgateway configuration for HTTPRoute resources
kgateway:
  namespace: kgateway-system
  gatewayName: https
  api:
    servicePort: 8080
    prefixValue: aiwbapi
    timeouts:
      stream:
        backendRequest: 30m
        request: 30m
      nonStream:
        backendRequest: 10m
        request: 10m
  ui:
    servicePort: 8000
    prefixValue: aiwbui
    timeouts:
      backendRequest: 1m
      request: 1m
  keycloak:
    prefixValue: kc

# Backend (API) configuration
backend:
  # Cluster host for external URLs (e.g., https://workloads.app-dev.silogen.ai)
  # If not set, defaults to https://workloads.{appDomain}
  clusterHost: ""
  image:
    repository: amdenterpriseai/aiwb-api
    pullPolicy: IfNotPresent
    tag: 1.0.3
  # NOTE: AIWB currently only supports 1 replica due to the poller/syncer setup.
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
    targetPort: 8080
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi
  imagePullSecrets: []
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Polling Intervals (seconds)
  polling:
    syncerPollingIntervalSeconds: 5
    syncerPendingTimeoutSeconds: 60
  # Dataset Configuration
  datasets:
    maxFileSizeMB: 100
  # Liveness and readiness probes
  livenessProbe:
    httpGet:
      path: /v1/health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /v1/health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Frontend (UI) configuration
frontend:
  image:
    repository: amdenterpriseai/aiwb-ui
    pullPolicy: IfNotPresent
    tag: 1.0.3
  replicaCount: 1
  service:
    port: 8000
    targetPort: 8000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  imagePullSecrets: []
  nextAuthSecretName: "aiwb-nextauth-secret"

# Keycloak/OIDC configuration
keycloak:
  url: "http://keycloak.keycloak.svc.cluster.local:8080"
  internalUrl: "http://keycloak.keycloak.svc.cluster.local:8080"
  realm: "airm"
  clientId: "354a0fa1-35ac-4a6d-9c4d-d661129c2cd0"
  secretName: "aiwb-ui-keycloak-secret"

# MinIO configuration
minio:
  url: "http://minio.minio-tenant-default.svc.cluster.local:80"
  bucket: "default-bucket"
  credentialsSecretName: "minio-credentials"
  accessKeyKey: "minio-access-key"
  secretKeyKey: "minio-secret-key"

# ClusterAuth configuration (for API key management)
clusterAuth:
  url: "http://cluster-auth.cluster-auth.svc.cluster.local:8081"
  secretName: "cluster-auth-admin-token"

# Prometheus configuration (for metrics queries)
prometheus:
  url: "http://lgtm-stack.otel-lgtm-stack.svc.cluster.local:9090"

# AIM Configuration
# A cluster-scoped AIMClusterRuntimeConfig is always created by this chart.
# Named "default" so the AIM operator applies it automatically to all AIMServices,
# including those created via kubectl without an explicit runtimeConfigName.
aim:
  clusterRuntimeConfigName: "default"
  pvcHeadroomPercent: 100
  routing:
    enabled: true
    requestTimeout: "30m"

# PostgreSQL CNPG Configuration
postgresql:
  host: "aiwb-infra-cnpg-cnpg-rw.aiwb.svc.cluster.local"
  port: 5432
  database: "aiwb"
  username: "aiwb_user"
  userSecretName: "aiwb-cnpg-user"

# OpenTelemetry Collector Configuration (for vLLM metrics)
otelCollector:
  image: "otel/opentelemetry-collector-contrib:0.114.0"
  scrapeInterval: "30s"
  endpoint: "http://lgtm-stack.otel-lgtm-stack.svc.cluster.local:4318"

# Ingress configuration (optional)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: aiwb.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

# RBAC configuration
rbac:
  serviceAccountName: "aiwb"
