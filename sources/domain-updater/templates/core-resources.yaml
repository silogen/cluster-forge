---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: domain-updater-sa
  namespace: cf-system
  labels:
    app: domain-updater
    component: service-account
automountServiceAccountToken: true

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: domain-updater-role
  labels:
    app: domain-updater
    component: rbac
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets", "events"]
  verbs: ["get", "list", "create", "update", "patch", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "update", "patch", "watch"]
- apiGroups: ["cert-manager.io"]
  resources: ["certificates"]
  verbs: ["get", "list", "update", "patch", "watch"]
- apiGroups: ["argoproj.io"]
  resources: ["applications"]
  verbs: ["get", "list", "update", "patch", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "create", "update", "patch", "delete", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: domain-updater-binding
  labels:
    app: domain-updater
    component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: domain-updater-role
subjects:
- kind: ServiceAccount
  name: domain-updater-sa
  namespace: cf-system

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: domain-update-scripts
  namespace: cf-system
  labels:
    app: domain-updater
    component: scripts
data:
  update-domain.sh: |
    #!/bin/bash
    set -e
    
    echo "Starting domain update process..."
    echo "Trigger Type: $TRIGGER_TYPE"
    echo "Old Domain: ${OLD_DOMAIN:-none}"
    echo "New Domain: $NEW_DOMAIN"
    echo "Force Update: $FORCE_UPDATE"
    echo "Test Mode: $TEST_MODE"
    
    # Exit early if no domain change detected (unless forced)
    if [ "$OLD_DOMAIN" = "$NEW_DOMAIN" ] && [ "$FORCE_UPDATE" != "true" ]; then
        echo "No domain change detected and force update not enabled, skipping update"
        exit 0
    fi
    
    # Validate new domain
    if [ -z "$NEW_DOMAIN" ]; then
        echo "ERROR: NEW_DOMAIN is required"
        exit 1
    fi
    
    # Update cluster-domain ConfigMap if it exists
    echo "Step 1: Updating cluster domain ConfigMaps..."
    if kubectl get configmap cluster-domain -n default >/dev/null 2>&1; then
        kubectl patch configmap cluster-domain -n default --type='merge' -p="{\"data\":{\"domain\":\"$NEW_DOMAIN\"}}"
        echo "Updated cluster-domain ConfigMap"
    else
        echo "cluster-domain ConfigMap not found, creating it..."
        kubectl create configmap cluster-domain --from-literal=domain="$NEW_DOMAIN" -n default
    fi
    
    # Update current domain tracker
    kubectl create configmap current-domain-config --from-literal=domain="$NEW_DOMAIN" -n cf-system --dry-run=client -o yaml | kubectl apply -f -
    echo "Updated current-domain-config tracker"
    
    # Trigger ArgoCD refresh
    echo "Step 2: Triggering ArgoCD application refresh..."
    if kubectl get application cluster-forge -n argocd >/dev/null 2>&1; then
        kubectl patch application cluster-forge -n argocd --type='merge' -p='{"operation":{"sync":{"prune":true}}}'
        echo "Triggered cluster-forge application sync"
    else
        echo "cluster-forge application not found"
    fi
    
    # Create completion event
    echo "Step 3: Creating completion event..."
    kubectl create event domain-update-completed --message="Domain successfully updated from ${OLD_DOMAIN:-unknown} to $NEW_DOMAIN via $TRIGGER_TYPE trigger" --namespace=cf-system --reason=DomainUpdateCompleted || true
    
    echo "Domain update process completed successfully"
    echo "Domain updated from ${OLD_DOMAIN:-unknown} to $NEW_DOMAIN"

---
apiVersion: v1
kind: Service
metadata:
  name: domain-update-webhook
  namespace: cf-system
  labels:
    app: domain-updater
    component: webhook
spec:
  selector:
    app: domain-updater
    component: webhook
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP