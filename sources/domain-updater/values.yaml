global:
  domain: ""

domainUpdater:
  enabled: true
  autoSync: true
  testMode: false
  pollInterval: "3m"
  manualTrigger:
    enabled: true
    webhook: true
    cli: true
    allowUnsafeDomains: false
  
trigger:
  type: "automatic"  # automatic, manual, webhook
  force: false
  
image:
  repository: ghcr.io/silogen/cluster-tool
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "domain-updater-sa"
  annotations: {}

rbac:
  create: true

resources:
  limits:
    memory: "512Mi"
    cpu: "500m"
  requests:
    memory: "256Mi"
    cpu: "100m"

webhook:
  enabled: true
  port: 8080
  service:
    type: ClusterIP
    port: 8080
  
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: domain-webhook.local
        paths:
          - path: /
            pathType: Prefix
    tls: []

  secret:
    name: domain-webhook-secret
    key: secret

nodeSelector: {}
tolerations: []
affinity: {}