---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: https
      namespace: kgateway-system
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: lgtm-stack
          port: {{ .Values.services.lgtm.grafana }}
          weight: 1
      matches:
        - headers:
            - name: Host
              type: RegularExpression
              value: grafana\..*
          path:
            type: PathPrefix
            value: /
