apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-requests-limits
  annotations:
    policies.kyverno.io/title: Require Limits and Requests
    policies.kyverno.io/category: Best Practices, EKS Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.6.0
    policies.kyverno.io/description: >-
      As application workloads share cluster resources, it is important to limit resources
      requested and consumed by each Pod. It is recommended to require resource requests and
      limits per Pod, especially for memory and CPU. If a Namespace level request or limit is specified,
      defaults will automatically be applied to each Pod based on the LimitRange configuration.
      This policy validates that all containers have something specified for memory and CPU
      requests and memory limits.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: validate-resources
    match:
      any:
      - resources:
          kinds:
          - Pod
          operations:
          - CREATE
          - UPDATE
    exclude:
        any:
        - resources:
            namespaces:
            - argocd
            - cf-gitea
            - longhorn
            - minio-operator
            - external-secrets
            - kueue-system
            - minio-tenant-default
            - cert-manager
            - kuberay-operator
    validate:
      message: "Memory resource limits and CPU and memory resource requests are required."
      foreach:
        - list: "request.object.spec.containers"
          pattern:
            resources:
              requests:
                memory: "?*"
                cpu: "?*"
              limits:
                memory: "?*"
          preconditions:
                all:
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "docker.io/istio*"
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "docker.io/semitechnologies*"
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "docker.io/liquibase*"
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "percona/*"
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "rabbitmq*"
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "ghcr.io/cloudnative-pg*"
                  - key: "{{ element.image }}"
                    operator: NotEquals
                    value: "gcr.io/knative-releases*"
