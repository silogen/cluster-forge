# AIWB Standalone Secrets
# This file contains only the secrets needed for AIWB standalone installation
# All credentials use "placeholder" for development - replace with secure values for production

---
# aiwb/aiwb-cnpg-superuser
apiVersion: v1
kind: Secret
metadata:
  name: aiwb-cnpg-superuser
  namespace: aiwb
type: Opaque
stringData:
  password: placeholder
  username: placeholder

---
# aiwb/aiwb-cnpg-user
apiVersion: v1
kind: Secret
metadata:
  name: aiwb-cnpg-user
  namespace: aiwb
type: Opaque
stringData:
  password: placeholder
  username: aiwb_user

---
# aiwb/aiwb-nextauth-secret
# NextAuth.js secret for session encryption
apiVersion: v1
kind: Secret
metadata:
  name: aiwb-nextauth-secret
  namespace: aiwb
type: Opaque
stringData:
  NEXTAUTH_SECRET: placeholder

---
# aiwb/aiwb-ui-keycloak-secret
# Keycloak client secret for AIWB UI OIDC authentication
apiVersion: v1
kind: Secret
metadata:
  name: aiwb-ui-keycloak-secret
  namespace: aiwb
type: Opaque
stringData:
  value: placeholder

---
# aiwb/cluster-auth-admin-token
# Admin token for cluster-auth service API calls
apiVersion: v1
kind: Secret
metadata:
  name: cluster-auth-admin-token
  namespace: aiwb
type: Opaque
stringData:
  value: placeholder

---
# aiwb/minio-credentials
# MinIO credentials for AIWB to access object storage
# Must match the MinIO tenant root credentials
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: aiwb
type: Opaque
stringData:
  minio-access-key: placeholder
  minio-secret-key: placeholder

---
# keycloak/airm-realm-credentials
# Initial credentials for airm realm setup
apiVersion: v1
kind: Secret
metadata:
  name: airm-realm-credentials
  namespace: keycloak
type: Opaque
stringData:
  ADMIN_CLIENT_ID: placeholder
  ADMIN_CLIENT_SECRET: placeholder
  ARGOCD_CLIENT_SECRET: placeholder
  CI_CLIENT_SECRET: placeholder
  FRONTEND_CLIENT_SECRET: placeholder
  GITEA_CLIENT_SECRET: placeholder
  K8S_CLIENT_SECRET: placeholder
  KEYCLOAK_INITIAL_DEVUSER_PASSWORD: placeholder
  MINIO_CLIENT_SECRET: placeholder

---
# keycloak/keycloak-cnpg-superuser
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-cnpg-superuser
  namespace: keycloak
type: Opaque
stringData:
  password: placeholder
  username: placeholder

---
# keycloak/keycloak-cnpg-user
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-cnpg-user
  namespace: keycloak
type: Opaque
stringData:
  password: placeholder
  username: keycloak

---
# keycloak/keycloak-credentials
# Keycloak admin console credentials
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  namespace: keycloak
type: Opaque
stringData:
  KEYCLOAK_INITIAL_ADMIN_PASSWORD: placeholder

---
# workbench/minio-credentials
# MinIO credentials for workspace pods to access object storage
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: workbench
type: Opaque
stringData:
  minio-access-key: placeholder
  minio-secret-key: placeholder

---
# minio-tenant-default/default-user
# MinIO tenant user credentials
apiVersion: v1
kind: Secret
metadata:
  name: default-user
  namespace: minio-tenant-default
type: Opaque
stringData:
  API_ACCESS_KEY: api-default-user
  API_SECRET_KEY: placeholder
  CONSOLE_ACCESS_KEY: placeholder
  CONSOLE_SECRET_KEY: placeholder
