# Secrets Override - Hardcoded Values
# This file contains ONLY secrets with values that CANNOT be "placeholder"
# due to hardcoded expectations in helm charts or other components.
#
# Previous entries for `aiwb-cnpg-user` and `keycloak-cnpg-user` were removed:
# they duplicated the Secrets already created by `secrets-aiwb-cnpg.yaml`
# (identical username/password content) and were therefore no-ops in
# PLUGGABLE_DB=false mode and orphaned Secrets in PLUGGABLE_DB=true mode.

---
# minio-tenant-default/default-user
# API_ACCESS_KEY is hardcoded as "api-default-user" in OpenBao secret definitions
# See: cluster-forge/sources/openbao-config/0.1.0/templates/openbao-secret-definitions.yaml
apiVersion: v1
kind: Secret
metadata:
  name: default-user
  namespace: minio-tenant-default
type: Opaque
stringData:
  API_ACCESS_KEY: api-default-user
  API_SECRET_KEY: placeholder
  CONSOLE_ACCESS_KEY: placeholder
  CONSOLE_SECRET_KEY: placeholder
