# Secrets Override - Hardcoded Values
# This file contains ONLY secrets with values that CANNOT be "placeholder"
# due to hardcoded expectations in helm charts or other components

---
# keycloak/keycloak-cnpg-user
# Username is hardcoded as "keycloak" in Keycloak helm chart database configuration
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-cnpg-user
  namespace: keycloak
type: Opaque
stringData:
  password: placeholder
  username: keycloak

---
# aiwb/aiwb-cnpg-user
# Username is hardcoded as "aiwb_user" in AIWB helm chart values.yaml
# See: cluster-forge/sources/aiwb/1.0.3/values.yaml line 173
apiVersion: v1
kind: Secret
metadata:
  name: aiwb-cnpg-user
  namespace: aiwb
type: Opaque
stringData:
  password: placeholder
  username: aiwb_user

---
# minio-tenant-default/default-user
# API_ACCESS_KEY is hardcoded as "api-default-user" in OpenBao secret definitions
# See: cluster-forge/sources/openbao-config/0.1.0/templates/openbao-secret-definitions.yaml
apiVersion: v1
kind: Secret
metadata:
  name: default-user
  namespace: minio-tenant-default
type: Opaque
stringData:
  API_ACCESS_KEY: api-default-user
  API_SECRET_KEY: placeholder
  CONSOLE_ACCESS_KEY: placeholder
  CONSOLE_SECRET_KEY: placeholder
