---
# Grants the Kyverno admission controller list/get on Routes so the
# validate-policy.kyverno.svc webhook accepts ClusterPolicies that
# reference route.openshift.io Routes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:additional:admission-controller:routes
  labels:
    app.kubernetes.io/component: admission-controller
    app.kubernetes.io/instance: kyverno
    app.kubernetes.io/part-of: kyverno
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]

---
# Grants the Kyverno background controller the permissions it needs to
# actually generate, sync and clean up Routes created by the
# generate-routes-from-httproutes ClusterPolicy.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:additional:background-controller:routes
  labels:
    app.kubernetes.io/component: background-controller
    app.kubernetes.io/instance: kyverno
    app.kubernetes.io/part-of: kyverno
    rbac.kyverno.io/aggregate-to-background-controller: "true"
rules:
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "deletecollection"]
  # OpenShift gates `spec.host` on Routes behind a virtual `routes/custom-host`
  # subresource. Without this, generated Routes are rejected by the OpenShift
  # route admission plugin with: "spec.host: Forbidden: you do not have
  # permission to set the host field of the route".
  - apiGroups: ["route.openshift.io"]
    resources: ["routes/custom-host"]
    verbs: ["create", "update"]