apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: cf-rabbitmq-scc
priority: 100
allowPrivilegedContainer: false
allowPrivilegeEscalation: false
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
readOnlyRootFilesystem: false
# Required capabilities for RabbitMQ
allowedCapabilities:
  - SETUID
  - SETGID
  - CHOWN
  - DAC_OVERRIDE
  - FOWNER
  - FSETID
requiredDropCapabilities:
  - ALL
# CRITICAL: Allow RabbitMQ to run as any user/group
runAsUser:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
# Flexible contexts
seLinuxContext:
  type: RunAsAny
seccompProfiles:
  - '*'
# Required volume types for RabbitMQ
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - ephemeral
  - ephemeral
# CRITICAL: Service account binding
users:
  - system:serviceaccount:airm:airm-rabbitmq-server          # Original service account
  - system:serviceaccount:airm:airm-infra-rabbitmq-rabbitmq-server  # StatefulSet service account

