---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: cf-openbao-scc
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: []
defaultAddCapabilities: []
requiredDropCapabilities:
  - ALL
readOnlyRootFilesystem: false
# Allow pod-defined UID/GID values
runAsUser:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
# Required for restricted policy compatibility
seccompProfiles:
  - '*'
users:
  - system:serviceaccount:cf-openbao:openbao
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - ephemeral

