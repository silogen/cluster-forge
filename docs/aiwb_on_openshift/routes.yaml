# NOTE: The `host` fields below use the ${DOMAIN} placeholder, which install_base.sh
# substitutes with the cluster's OpenShift apps domain at apply time. If you apply
# this file by hand, render it first, e.g.:
#   DOMAIN=apps.<cluster>.example.com envsubst '${DOMAIN}' < routes.yaml | kubectl apply -f -
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aiwb-api
  namespace: aiwb
spec:
  host: aiwbapi.${DOMAIN}
  to:
    name: aiwb-api
    weight: 100
    kind: Service
  port:
    targetPort: web
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
  path: ''
  alternateBackends: []

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: aiwb-ui
  namespace: aiwb
spec:
  host: aiwbui.${DOMAIN}
  to:
    name: aiwb-ui
    weight: 100
    kind: Service
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
  path: ''
  alternateBackends: []

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: keycloak
  namespace: keycloak
spec:
  host: kc.${DOMAIN}
  to:
    name: keycloak
    weight: 100
    kind: Service
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
  path: ''
  alternateBackends: []
