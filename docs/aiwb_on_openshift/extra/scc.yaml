# ============================================================================
# KYVERNO SCC-GENERATOR RBAC
# ============================================================================
# Lets the Kyverno controllers manage SecurityContextConstraints so the
# generate-scc-on-namespaces ClusterPolicy (kyverno-scc-for-ns.yaml) can create
# per-project SCCs. The background-controller performs the generate; the
# admission-controller needs list/get or the policy validation webhook rejects
# the ClusterPolicy at apply time. Safe to exist before Kyverno is installed.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-scc-generator
rules:
  - apiGroups:
      - security.openshift.io
    resources:
      - securitycontextconstraints
    verbs:
      - create
      - update
      - patch
      - delete
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kyverno-scc-generator-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kyverno-scc-generator
subjects:
  - kind: ServiceAccount
    name: kyverno-background-controller
    namespace: kyverno
  - kind: ServiceAccount
    name: kyverno-admission-controller
    namespace: kyverno

# ============================================================================
# ANYUID SCC GRANTS (per-namespace ClusterRoleBindings)
# ============================================================================
# Grant the built-in `anyuid` SCC to every service account in each component
# namespace. Upstream Helm charts often run as root or fixed UIDs, which
# OpenShift's restricted-v2 SCC blocks. These bind the virtual group
# system:serviceaccounts:<ns>, so they take effect regardless of whether the
# namespace or its service accounts exist yet (they can be applied up front).
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: anyuid-scc-aim-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:serviceaccounts:aim-system
---
