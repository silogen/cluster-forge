---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: cf-openbao-scc
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities: []
defaultAddCapabilities: []
requiredDropCapabilities:
  - ALL
readOnlyRootFilesystem: false
# Allow pod-defined UID/GID values
runAsUser:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
# Required for restricted policy compatibility
seccompProfiles:
  - '*'
users:
  - system:serviceaccount:cf-openbao:openbao
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - ephemeral

---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: cf-otel-lgtm-stack-scc
priority: 100
allowPrivilegedContainer: true
allowPrivilegeEscalation: true
allowHostDirVolumePlugin: true
allowHostIPC: true
allowHostNetwork: true
allowHostPID: true
allowHostPorts: true

# Allow the exact capabilities used by the init container
allowedCapabilities:
  - SETUID
  - SETGID
  - CHOWN
  - DAC_OVERRIDE
  - FOWNER
  - FSETID
requiredDropCapabilities:
  - ALL

# Allow root (UID 0) and other explicit users
runAsUser:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny

# SELinux and seccomp relaxed
seLinuxContext:
  type: RunAsAny
seccompProfiles:
  - '*'

readOnlyRootFilesystem: false

# Allow all common volume types
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - ephemeral
  - hostPath 

# Bind the SCC to the service account in your namespace
users:
  - system:serviceaccount:otel-lgtm-stack:my-kube-state-metrics
  - system:serviceaccount:otel-lgtm-stack:nodeexporter-prometheus-node-exporter
  - system:serviceaccount:otel-lgtm-stack:default
  - system:serviceaccount:otel-lgtm-stack:otel-collector

---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: cf-opentelemetry-operator-scc
priority: 100
allowPrivilegedContainer: false
allowPrivilegeEscalation: false
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false

# Allow the exact capabilities used by the init container
allowedCapabilities:
  - SETUID
  - SETGID
  - CHOWN
  - DAC_OVERRIDE
  - FOWNER
  - FSETID
requiredDropCapabilities:
  - ALL

# Allow root (UID 0) and other explicit users
runAsUser:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny

# SELinux and seccomp relaxed
seLinuxContext:
  type: RunAsAny
seccompProfiles:
  - '*'

readOnlyRootFilesystem: false

# Allow all common volume types
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - ephemeral

# Bind the SCC to the service account in your namespace.
# NOTE: install_base.sh deploys the operator into the `opentelemetry-system`
# namespace (not the chart's upstream default `opentelemetry-operator-system`).
# The operator pod sets seccompProfile: RuntimeDefault, which the `anyuid` SCC
# cannot admit, so this SCC (seccompProfiles: '*') must target the real SA.
users:
  - system:serviceaccount:opentelemetry-system:opentelemetry-operator

---
# CloudNative PostgreSQL (CNPG) Security Context Constraints
# Allows CNPG operator and PostgreSQL instances to run with proper permissions
# Tested and working configuration for IBM Block CSI storage
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: cf-cnpg-operator-scc
# Must beat the upstream `cnpg-chmod-bypass-scc` (priority 200); otherwise
# that SCC wins admission and, because it is RunAsAny everywhere, admits
# the pod with no injected fsGroup. The kubelet then does not chgrp the
# IBM Block PVC mount, leaving it root-owned, and initdb fails with
# "could not create directory /var/lib/postgresql/data/pgdata: Permission denied".
priority: 201
allowPrivilegedContainer: false
allowPrivilegeEscalation: false
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
readOnlyRootFilesystem: false
allowedCapabilities:
  - SETUID
  - SETGID
  - CHOWN
  - DAC_OVERRIDE
  - FOWNER
  - FSETID
requiredDropCapabilities:
  - ALL
# Inherit UID/GID from each target namespace's annotations
# (openshift.io/sa.scc.uid-range and .supplemental-groups) instead of
# hardcoding a single value. That way the SCC keeps working after a
# namespace is recreated and gets a new OpenShift-allocated range.
# The injected fsGroup is what triggers the kubelet to chgrp the PVC
# mount, giving the postgres process write access to create pgdata/.
runAsUser:
  type: MustRunAsRange
fsGroup:
  type: MustRunAs
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
seccompProfiles:
  - '*'
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
users:
  - system:serviceaccount:aiwb:aiwb-infra-cnpg-cnpg
  - system:serviceaccount:keycloak:keycloak-cnpg

---
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: cf-cnpg-controller-scc
  annotations:
    description: "Dedicated SCC for CNPG operator pod that needs to run as UID 10001"
    target-pod: "cnpg-operator-cloudnative-pg"
    target-namespace: "cnpg-system"
    created-for: "CNPG operator pod SCC conflict resolution"
allowHostDirVolumePlugin: false
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities:
  - SETUID
  - SETGID
  - CHOWN
  - DAC_OVERRIDE
  - FOWNER
  - FSETID
defaultAddCapabilities: null
requiredDropCapabilities:
  - ALL
fsGroup:
  type: MustRunAs
  ranges:
    - min: 10001
      max: 10001
runAsUser:
  type: MustRunAs
  uid: 10001
seLinuxContext:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
seccompProfiles:
  - runtime/default
priority: 101
readOnlyRootFilesystem: false
userNamespaceLevel: AllowHostLevel
users:
  - system:serviceaccount:cnpg-system:cnpg-operator-cloudnative-pg
groups: []
volumes:
  - configMap
  - downwardAPI
  - emptyDir
  - persistentVolumeClaim
  - projected
  - secret
  - hostPath

