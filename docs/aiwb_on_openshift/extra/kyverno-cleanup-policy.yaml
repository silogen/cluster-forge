---
# Pre-fetch every Namespace once into Kyverno's global context, list-watch
# style. Without this, the cleanup policy would have to look up the
# source namespace per SCC via `context.apiCall`, but Kyverno caches
# `apiCall` results across all matched resources in a single tick — i.e.
# it fires the apiCall once with the FIRST SCC's namespace name and
# reuses that result for every other SCC. That makes per-resource
# orphan detection impossible (and is actively dangerous: depending on
# iteration order, a stale cached "ns gone" result can cause healthy
# SCCs to be deleted by mistake). A `globalReference` is JMESPath-
# filtered per-resource, so each SCC gets its own correct lookup.
apiVersion: kyverno.io/v2alpha1
kind: GlobalContextEntry
metadata:
  name: namespaces
spec:
  kubernetesResource:
    group: ""
    version: v1
    resource: namespaces
---
apiVersion: kyverno.io/v2
kind: ClusterCleanupPolicy
metadata:
  name: cleanup-orphaned-sccs
  annotations:
    policies.kyverno.io/title: Cleanup Orphaned SCCs
    policies.kyverno.io/category: Cleanup
    policies.kyverno.io/subject: SecurityContextConstraints
    policies.kyverno.io/description: >-
      Removes orphaned SecurityContextConstraints generated by the
      `generate-scc-on-namespaces-activity` policy when their source
      namespace is gone or has been recreated with a different UID
      since the SCC was generated.
spec:
  schedule: "*/1 * * * *"
  match:
    any:
    - resources:
        kinds:
        - SecurityContextConstraints
        selector:
          matchLabels:
            app.kubernetes.io/managed-by: kyverno
            generate.kyverno.io/policy-name: generate-scc-on-namespaces-activity
  context:
  - name: namespacesList
    globalReference:
      name: namespaces
      jmesPath: "@"
  conditions:
    all:
    # Single condition that resolves the source namespace's CURRENT UID
    # via the globalReference (or 'GONE' if the namespace has been
    # deleted) and compares it to the UID the SCC was generated for.
    # NotEquals handles both cases:
    #   - namespace gone     -> 'GONE'        != trig-uid -> delete
    #   - namespace recreated -> new-uid      != trig-uid -> delete
    #   - namespace unchanged -> trig-uid     == trig-uid -> keep
    #
    # IMPORTANT — gotchas baked into this single condition:
    #
    # 1. The matched resource is bound to `target` (NOT `request.object`,
    #    which is admission-only and silently resolves to empty here —
    #    that was the original bug that made this policy a no-op).
    #
    # 2. `split` is a 2-arg function in Kyverno JMESPath:
    #    `split(s, sep)`. The pipe form `s | split(sep)` silently
    #    produces nothing (no error logged).
    #
    # 3. We deliberately do NOT split this into two conditions
    #    (e.g. a `starts_with` sanity check + the orphan check). Kyverno
    #    only loads `context.globalReference` for the FIRST condition
    #    that references it; if a context-free condition is listed
    #    earlier, the context-using condition gets silently skipped.
    - key: '{{ namespacesList[?metadata.name == ''{{ split(target.users[0], '':'')[2] }}''].metadata.uid | [0] || ''GONE'' }}'
      operator: NotEquals
      value: '{{ target.metadata.labels."generate.kyverno.io/trigger-uid" }}'
