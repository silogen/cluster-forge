---
- name: Domain Update Tool
  hosts: localhost
  gather_facts: false
  vars:
    # Required variables (pass via -e or vars file)
    new_domain: "{{ NEW_DOMAIN | default('') }}"
    certificate_path: "{{ CERT_PATH | default('') }}"
    private_key_path: "{{ KEY_PATH | default('') }}"

    # Optional variables
    old_domain: "{{ OLD_DOMAIN | default('') }}"
    kubeconfig: "{{ KUBECONFIG | default(ansible_env.HOME + '/.kube/config') }}"
    skip_git_update: "{{ SKIP_GIT_UPDATE | default(false) | bool }}"
    # Regexp stored as var to avoid YAML parser issues with backslash+colon in inline values
    domain_regexp: "^(\\s*domain:\\s*).*$"
    domain_replace: "\\1{{ new_domain }}"
    dnsmasq_regexp: "^address=/[^/]+/"
    dot_pattern: "."
    dash_char: "-"
    default_repo_path: infrastructure/cluster-values

  tasks:
    - name: Check required variables and display usage
      when: new_domain == '' or certificate_path == '' or private_key_path == ''
      block:
        - name: Display usage information
          ansible.builtin.debug:
            msg: |
              ❌ ERROR: Missing required variables

              Usage: sudo ~/bloom run {{ ansible_play_book | default('./trigger-domain-update.yaml') }} \
                       -e NEW_DOMAIN=new-domain.silogen.ai \
                       -e CERT_PATH=/usr/local/share/ca-certificates/new-domain.pem \
                       -e KEY_PATH=/usr/local/share/ca-certificates/new-domain.key

              Required variables:
                NEW_DOMAIN    - The new domain name (e.g., new-domain.silogen.ai)
                CERT_PATH     - Absolute path to the TLS certificate file
                KEY_PATH      - Absolute path to the TLS private key file

              Optional variables:
                OLD_DOMAIN       - Previous domain (auto-detected if not provided)
                SKIP_GIT_UPDATE  - Set to 'true' to skip git repository update (default: false)
                GITEA_REPO_PATH  - Override repository path (default: auto-discover)

              Example:
                sudo ~/bloom run {{ ansible_play_book | default('./trigger-domain-update.yaml') }} \
                  -e NEW_DOMAIN=my-cluster.example.com \
                  -e CERT_PATH=/etc/ssl/certs/my-cluster.pem \
                  -e KEY_PATH=/etc/ssl/private/my-cluster.key

        - name: Fail with clear message
          ansible.builtin.fail:
            msg: "Missing required variables. See usage above."

    - name: Capture run timestamp
      ansible.builtin.shell: date +%s
      register: run_timestamp
      changed_when: false

    - name: Capture run timestamp ISO
      ansible.builtin.shell: date -u +%Y-%m-%dT%H:%M:%SZ
      register: run_timestamp_iso
      changed_when: false

    - name: Validate prerequisites
      block:
        - name: Validate new domain format
          ansible.builtin.fail:
            msg: "Invalid domain format: {{ new_domain }}"
          when: new_domain is not match("^([a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?\\.)+[a-zA-Z]{2,}$")

        - name: Validate certificate file exists
          ansible.builtin.shell: "test -f {{ certificate_path }}"
          delegate_to: localhost
          changed_when: false

        - name: Validate private key file exists
          ansible.builtin.shell: "test -f {{ private_key_path }}"
          delegate_to: localhost
          changed_when: false

        - name: Check kubectl connectivity
          ansible.builtin.shell: "kubectl get namespace kgateway-system"
          changed_when: false

    - name: Detect cluster-bloom DNS configuration
      block:
        - name: Check for DNSMASQ configuration file
          ansible.builtin.stat:
            path: /etc/dnsmasq.d/keycloak.conf
          register: dnsmasq_config
          delegate_to: localhost

        - name: Check for resolv.conf backup (indicates FIX_DNS was used)
          ansible.builtin.find:
            paths: /etc
            patterns: "resolv.conf.pre-dnsmasq-*"
          register: resolv_backup
          delegate_to: localhost

        - name: Read current DNSMASQ domain if exists
          ansible.builtin.shell: |
            if [ -f /etc/dnsmasq.d/keycloak.conf ]; then
              grep "address=/" /etc/dnsmasq.d/keycloak.conf | head -1 | cut -d'/' -f2 || echo ""
            else
              echo ""
            fi
          register: current_dnsmasq_domain
          delegate_to: localhost
          changed_when: false

        - name: Check systemd-resolved status
          ansible.builtin.shell: systemctl is-active systemd-resolved 2>/dev/null || echo "inactive"
          register: systemd_resolved_status
          delegate_to: localhost
          changed_when: false

        - name: Set DNS configuration facts
          ansible.builtin.set_fact:
            cluster_bloom_dns_enabled: "{{ dnsmasq_config.stat.exists }}"
            cluster_bloom_fix_dns_used: "{{ resolv_backup.files | length > 0 }}"
            current_dns_domain: "{{ current_dnsmasq_domain.stdout }}"
            systemd_resolved_was_disabled: "{{ systemd_resolved_status.stdout != 'active' }}"

        - name: Display DNS configuration status
          ansible.builtin.debug:
            msg: |
              🔍 Cluster-Bloom DNS Configuration Status:
              DNSMASQ enabled: {{ cluster_bloom_dns_enabled }}
              FIX_DNS was used: {{ cluster_bloom_fix_dns_used }}
              Current DNS domain: {{ current_dns_domain if current_dns_domain else "none" }}
              systemd-resolved disabled: {{ systemd_resolved_was_disabled }}

    - name: Extract domain from gitea config if old_domain not provided
      when: old_domain == ''
      block:
        - name: Get gitea-config-script ConfigMap
          ansible.builtin.shell: |
            kubectl get configmap gitea-config-script -n cf-gitea -o yaml 2>/dev/null | grep "KC_URL=" | head -1 | cut -d'=' -f2 | sed 's|https://[^.]*\.||g' | sed 's|{{ '{{' }}.*{{ '}}' }}||g' | xargs || echo ""
          register: gitea_config_result
          ignore_errors: true
          changed_when: false

        - name: Extract domain from KC_URL in gitea config
          ansible.builtin.set_fact:
            extracted_domain: "{{ gitea_config_result.stdout | trim }}"
          when: 
            - gitea_config_result is succeeded
            - gitea_config_result.stdout is defined
            - gitea_config_result.stdout | trim != ""
            - "'Values' not in gitea_config_result.stdout"
          ignore_errors: true

        - name: Set old_domain from extraction
          ansible.builtin.set_fact:
            old_domain: "{{ extracted_domain }}"
          when: 
            - extracted_domain is defined
            - extracted_domain != ''
            - "'Values' not in extracted_domain"

        - name: Fail if old_domain could not be determined
          ansible.builtin.fail:
            msg: "Could not extract old domain from cluster configuration. Please provide OLD_DOMAIN parameter."
          when: old_domain == ''

    - name: Get current domain for reference
      ansible.builtin.shell: "kubectl get configmap current-domain-config -n kgateway-system -o jsonpath='{.data.domain}' 2>/dev/null || echo 'unknown'"
      register: current_domain_result
      ignore_errors: true
      changed_when: false

    - name: Display domain change summary
      ansible.builtin.debug:
            msg: |
              🚀 Domain Change Summary:
              Old domain: {{ old_domain }}
              New domain: {{ new_domain }}
              Certificate: {{ certificate_path }}
              Private key: {{ private_key_path }}
              Repository URL: https://gitea.{{ old_domain }}/infrastructure/cluster-values.git

    - name: Update cluster-values repository
      when: not skip_git_update
      block:
        - name: Discover Gitea HTTP service name
          ansible.builtin.shell: |
            kubectl get svc -n cf-gitea -o jsonpath='{.items[*].metadata.name}' | tr ' ' '\n' | grep -E 'http|web|gitea' | grep -v ssh | head -1
          register: gitea_svc_name
          changed_when: false

        - name: Fail if no Gitea HTTP service found
          ansible.builtin.fail:
            msg: "No Gitea HTTP service found in namespace cf-gitea. Check: kubectl get svc -n cf-gitea"
          when: gitea_svc_name.stdout | trim == ""

        - name: Start port-forward to Gitea
          ansible.builtin.shell: |
            #!/bin/bash
            nohup kubectl port-forward -n cf-gitea svc/{{ gitea_svc_name.stdout | trim }} 3000:3000 \
              > /tmp/gitea-port-forward.log 2>&1 &
            PF_PID=$!
            disown $PF_PID
            echo $PF_PID
          args:
            executable: /bin/bash
          register: port_forward_pid
          changed_when: false

        - name: Wait for port-forward to be ready
          ansible.builtin.wait_for:
            port: 3000
            host: 127.0.0.1
            timeout: 15

        - name: Get Gitea admin credentials from cluster
          ansible.builtin.shell: |
            SECRET=$(kubectl get secret -n cf-gitea -o name 2>/dev/null | grep -iE 'admin|gitea-admin|init-gitea' | head -1)
            if [ -n "$SECRET" ]; then
              USERNAME=$(kubectl get $SECRET -n cf-gitea -o jsonpath='{.data.username}' 2>/dev/null | base64 -d 2>/dev/null || echo "admin")
              PASSWORD=$(kubectl get $SECRET -n cf-gitea -o jsonpath='{.data.password}' 2>/dev/null | base64 -d 2>/dev/null || true)
              echo "${USERNAME}:${PASSWORD}"
            fi
          register: gitea_admin_creds
          changed_when: false
          ignore_errors: true

        - name: Write Gitea repo discovery script
          ansible.builtin.copy:
            dest: /tmp/gitea-discover.py
            content: |
              import urllib.request, json, sys, base64
              base_url = sys.argv[1]
              credentials = sys.argv[2] if len(sys.argv) > 2 else ""
              headers = {}
              if credentials and ":" in credentials:
                  creds = base64.b64encode(credentials.encode()).decode()
                  headers["Authorization"] = "Basic " + creds
              def get(url):
                  r = urllib.request.urlopen(urllib.request.Request(url, headers=headers))
                  return json.loads(r.read())
              all_repos = []
              page = 1
              while True:
                  data = get(base_url + "/repos/search?limit=50&page=" + str(page))
                  repos = data.get("data", [])
                  if not repos:
                      break
                  all_repos.extend(repos)
                  page += 1
              names = [r["full_name"] for r in all_repos]
              keywords = ["cluster-values", "values", "cluster_values"]
              match = next((n for kw in keywords for n in names if kw in n.lower()), "")
              print(match)
              sys.stderr.write("AVAILABLE_REPOS:" + ",".join(names) + "\n")

        - name: Discover cluster-values repository path via Gitea API
          ansible.builtin.shell: >-
            python3 /tmp/gitea-discover.py
            http://localhost:3000/api/v1
            "{{ gitea_admin_creds.stdout | trim }}"
            2>/tmp/gitea-repo-discovery.log
          register: gitea_repo_discovery
          changed_when: false
          ignore_errors: true

        - name: Show available repos if discovery failed
          ansible.builtin.shell: cat /tmp/gitea-repo-discovery.log 2>/dev/null || echo "no log"
          register: available_repos_log
          changed_when: false
          when: gitea_repo_discovery.stdout | trim == ""

        - name: Fail if cluster-values repo not found
          ansible.builtin.fail:
            msg: >-
              Could not find cluster-values repository via Gitea API.
              Set GITEA_REPO_PATH=ORG/REPONAME in your vars file to override.
          when: gitea_repo_discovery.stdout | trim == "" and (GITEA_REPO_PATH is not defined or GITEA_REPO_PATH == "")

        - name: Set resolved repo path (from discovery)
          ansible.builtin.set_fact:
            cluster_values_repo_path: "{{ gitea_repo_discovery.stdout | trim }}"
          when: gitea_repo_discovery.stdout | trim != ""

        - name: Set resolved repo path (from override)
          ansible.builtin.set_fact:
            cluster_values_repo_path: "{{ GITEA_REPO_PATH | default(default_repo_path) }}"
          when: gitea_repo_discovery.stdout | trim == ""

        - name: Set clone destination path
          ansible.builtin.set_fact:
            cluster_values_clone_path: "/tmp/cluster-values-{{ run_timestamp.stdout }}"

        - name: Build Gitea clone URL
          ansible.builtin.shell: |
            CREDS="{{ gitea_admin_creds.stdout | trim }}"
            if [ -n "$CREDS" ]; then
              echo "http://${CREDS}@localhost:3000/{{ cluster_values_repo_path }}.git"
            else
              echo "http://localhost:3000/{{ cluster_values_repo_path }}.git"
            fi
          register: gitea_clone_url_result
          changed_when: false

        - name: Clone cluster-values via port-forward
          ansible.builtin.git:
            repo: "{{ gitea_clone_url_result.stdout | trim }}"
            dest: "{{ cluster_values_clone_path }}"
            force: yes
          register: git_clone

        - name: Update global.domain in values.yaml
          ansible.builtin.replace:
            path: "{{ cluster_values_clone_path }}/values.yaml"
            regexp: "{{ domain_regexp }}"
            replace: "{{ domain_replace }}"

        - name: Commit and push domain change
          ansible.builtin.shell: |
            cd {{ cluster_values_clone_path }}
            git config user.name "Domain Update"
            git config user.email "automation@{{ new_domain }}"
            git add values.yaml
            git commit -m "feat: update domain to {{ new_domain }}"
            git push origin main

      always:
        - name: Stop port-forward
          ansible.builtin.shell: |
            kill {{ port_forward_pid.stdout | trim }} 2>/dev/null || true
          when: port_forward_pid is defined and port_forward_pid.stdout | trim != ""
          changed_when: false

    - name: Update system DNS configuration (cluster-bloom integration)
      when: cluster_bloom_dns_enabled
      block:
        - name: Backup current DNSMASQ configuration
          ansible.builtin.copy:
            src: /etc/dnsmasq.d/keycloak.conf
            dest: "/etc/dnsmasq.d/keycloak.conf.backup-{{ run_timestamp.stdout }}"
            remote_src: yes
            mode: "0644"
          delegate_to: localhost

        - name: Read current DNSMASQ configuration
          ansible.builtin.slurp:
            src: /etc/dnsmasq.d/keycloak.conf
          register: current_dnsmasq_config
          delegate_to: localhost

        - name: Update DNSMASQ domain resolution
          ansible.builtin.replace:
            path: /etc/dnsmasq.d/keycloak.conf
            regexp: "{{ dnsmasq_regexp }}"
            replace: "address=/{{ new_domain }}/"
          delegate_to: localhost
          register: dnsmasq_updated

        - name: Test DNSMASQ configuration before restart
          ansible.builtin.shell: dnsmasq --test --conf-file=/etc/dnsmasq.d/keycloak.conf
          delegate_to: localhost
          register: dnsmasq_test
          failed_when: dnsmasq_test.rc != 0

        - name: Restart DNSMASQ service
          ansible.builtin.systemd:
            name: dnsmasq
            state: restarted
          delegate_to: localhost
          when: dnsmasq_updated.changed

        - name: Wait for DNSMASQ to be ready
          ansible.builtin.wait_for:
            port: 53
            host: 127.0.0.1
            timeout: 10
          delegate_to: localhost

        - name: Test new domain DNS resolution
          ansible.builtin.shell: |
            nslookup {{ new_domain }} 127.0.0.1 || exit 1
            nslookup google.com 127.0.0.1 || exit 1
          delegate_to: localhost
          register: dns_resolution_test
          retries: 3
          delay: 2
          until: dns_resolution_test.rc == 0

        - name: Display DNS update success
          ansible.builtin.debug:
            msg: |
              ✅ DNSMASQ configuration updated successfully:
              Old domain: {{ current_dns_domain }}
              New domain: {{ new_domain }}
              DNS resolution test: PASSED
              
      rescue:
        - name: Rollback DNSMASQ configuration on failure
          block:
            - name: Stop DNSMASQ service
              ansible.builtin.systemd:
                name: dnsmasq
                state: stopped
              delegate_to: localhost
              ignore_errors: yes

            - name: Restore DNSMASQ configuration backup
              ansible.builtin.copy:
                src: "/etc/dnsmasq.d/keycloak.conf.backup-{{ run_timestamp.stdout }}"
                dest: /etc/dnsmasq.d/keycloak.conf
                remote_src: yes
                mode: "0644"
              delegate_to: localhost

            - name: Restart DNSMASQ service with original config
              ansible.builtin.systemd:
                name: dnsmasq
                state: started
              delegate_to: localhost

            - name: Fail with DNS rollback message
              ansible.builtin.fail:
                msg: >-
                  ❌ DNSMASQ configuration update failed and has been rolled back.
                  Original DNS configuration restored.
                  Error details: {{ ansible_failed_result.msg | default("DNS resolution test failed") }}.
                  The domain change process cannot continue safely.
          
    - name: Apply TLS certificates to cluster
      block:
        - name: Read certificate files
          ansible.builtin.slurp:
            src: "{{ item.path }}"
          register: cert_contents
          loop:
            - path: "{{ certificate_path }}"
              key: tls_crt
            - path: "{{ private_key_path }}"
              key: tls_key
          delegate_to: localhost

        - name: Compute TLS secret name (domain-specific backup)
          ansible.builtin.set_fact:
            tls_secret_name: "{{ new_domain | replace(dot_pattern, dash_char) }}-tls"

        - name: Update cluster-tls secret (used by gateway)
          ansible.builtin.shell: |
            kubectl apply -f - <<EOF
            apiVersion: v1
            kind: Secret
            metadata:
              name: cluster-tls
              namespace: kgateway-system
              annotations:
                cluster-forge.silogen.ai/domain: "{{ new_domain }}"
                cluster-forge.silogen.ai/updated-at: "{{ run_timestamp_iso.stdout }}"
            type: kubernetes.io/tls
            data:
              tls.crt: {{ cert_contents.results[0].content }}
              tls.key: {{ cert_contents.results[1].content }}
            EOF
          changed_when: true

        - name: Create domain-specific TLS secret backup
          ansible.builtin.shell: |
            kubectl apply -f - <<EOF
            apiVersion: v1
            kind: Secret
            metadata:
              name: {{ tls_secret_name }}
              namespace: kgateway-system
              annotations:
                cluster-forge.silogen.ai/domain: "{{ new_domain }}"
                cluster-forge.silogen.ai/backup: "true"
            type: kubernetes.io/tls
            data:
              tls.crt: {{ cert_contents.results[0].content }}
              tls.key: {{ cert_contents.results[1].content }}
            EOF
          changed_when: true

        - name: Restart kGateway pods to pick up new certificate
          ansible.builtin.shell: |
            # Find kGateway deployment/daemonset
            KGATEWAY_RESOURCE=$(kubectl get deploy,daemonset -n kgateway-system -o name | grep -i kgateway | head -1)
            if [ -n "$KGATEWAY_RESOURCE" ]; then
              echo "Restarting $KGATEWAY_RESOURCE"
              kubectl rollout restart -n kgateway-system $KGATEWAY_RESOURCE
              kubectl rollout status -n kgateway-system $KGATEWAY_RESOURCE --timeout=120s
            else
              echo "No kGateway deployment/daemonset found, trying pod deletion"
              kubectl delete pods -n kgateway-system -l app.kubernetes.io/name=kgateway || true
              sleep 5
            fi
          changed_when: true

        - name: Update current domain ConfigMap (triggers ArgoCD sync)
          ansible.builtin.shell: |
            kubectl apply -f - <<EOF
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: current-domain-config
              namespace: kgateway-system
            data:
              domain: {{ new_domain }}
              updated_at: "{{ run_timestamp_iso.stdout }}"
              updated_by: "simplified-domain-change-playbook"
              method: "manual-execution"
            EOF
          changed_when: true

    - name: Trigger immediate ArgoCD sync (one-time)
      block:
        - name: Write ArgoCD sync patch file
          ansible.builtin.copy:
            dest: /tmp/argocd-sync-patch.json
            content: >-
              {"operation":{"initiatedBy":{"username":"simplified-domain-change"},"sync":{"syncStrategy":{"apply":{"force":true}}}}}

        - name: Force sync critical applications
          ansible.builtin.shell: >-
            kubectl patch application {{ item }}
            -n argocd --type merge
            -p "$(cat /tmp/argocd-sync-patch.json)"
          loop:
            - argocd
            - gitea
            - keycloak
            - minio-tenant
          ignore_errors: true
          changed_when: true

        - name: Wait for ArgoCD applications to sync (polling)
          ansible.builtin.shell: |
            #!/bin/bash
            set -e

            APPS=("argocd" "gitea" "keycloak" "minio-tenant")
            MAX_WAIT=45
            CHECK_INTERVAL=5
            ELAPSED=0

            echo "Waiting for ArgoCD applications to sync (max ${MAX_WAIT}s)..."

            while [ $ELAPSED -lt $MAX_WAIT ]; do
              ALL_SYNCED=true

              for APP in "${APPS[@]}"; do
                SYNC_STATUS=$(kubectl get application "$APP" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
                HEALTH_STATUS=$(kubectl get application "$APP" -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")

                echo "[$ELAPSED s] $APP: sync=$SYNC_STATUS, health=$HEALTH_STATUS"

                if [[ "$SYNC_STATUS" != "Synced" ]]; then
                  ALL_SYNCED=false
                fi
              done

              if [ "$ALL_SYNCED" = true ]; then
                echo "All applications synced successfully!"
                exit 0
              fi

              sleep $CHECK_INTERVAL
              ELAPSED=$((ELAPSED + CHECK_INTERVAL))
            done

            echo "WARNING: Timeout reached after ${MAX_WAIT}s. Some applications may not be fully synced."
            echo "Continuing anyway - check application status manually if needed."
            exit 0
          args:
            executable: /bin/bash
          register: sync_wait_result
          changed_when: false

        - name: Display sync wait results
          ansible.builtin.debug:
            var: sync_wait_result.stdout_lines

    - name: Verify domain change success
      block:
        - name: Check DNS resolution for new domain
          ansible.builtin.shell: |
            echo "=== DNS Resolution Test ==="
            nslookup argocd.{{ new_domain }} || echo "nslookup failed"
            echo ""
            echo "=== Checking /etc/resolv.conf ==="
            cat /etc/resolv.conf
            echo ""
            echo "=== Testing DNS with dig (if available) ==="
            dig argocd.{{ new_domain }} || echo "dig not available"
          register: dns_debug
          changed_when: false
          ignore_errors: true

        - name: Display DNS debug info
          ansible.builtin.debug:
            var: dns_debug.stdout_lines

        - name: Check TLS secret status
          ansible.builtin.shell: |
            echo "=== TLS Secret Status ==="
            kubectl get secret {{ tls_secret_name }} -n kgateway-system -o yaml | grep -A 2 "kind:\|name:\|namespace:\|type:"
            echo ""
            echo "=== Current Domain ConfigMap ==="
            kubectl get configmap current-domain-config -n kgateway-system -o yaml | grep -A 5 "^data:"
          register: tls_debug
          changed_when: false
          ignore_errors: true

        - name: Display TLS debug info
          ansible.builtin.debug:
            var: tls_debug.stdout_lines

        - name: Check ArgoCD application sync status
          ansible.builtin.shell: |
            echo "=== ArgoCD App Status ==="
            kubectl get applications -n argocd -o custom-columns=NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status
            echo ""
            echo "=== ArgoCD Pods ==="
            kubectl get pods -n argocd
          register: argocd_debug
          changed_when: false
          ignore_errors: true

        - name: Display ArgoCD debug info
          ansible.builtin.debug:
            var: argocd_debug.stdout_lines

        - name: Check gateway/ingress configuration
          ansible.builtin.shell: |
            echo "=== Gateway Resources ==="
            kubectl get gateway,httproute -n kgateway-system || echo "No gateways found"
            echo ""
            echo "=== Gateway HTTPS Listener Details ==="
            kubectl get gateway https -n kgateway-system -o yaml | grep -A 20 "listeners:"
            echo ""
            echo "=== HTTPRoute Details ==="
            kubectl get httproute -A -o custom-columns=NAMESPACE:.metadata.namespace,NAME:.metadata.name,HOSTNAMES:.spec.hostnames
            echo ""
            echo "=== HTTPRoute for ArgoCD ==="
            kubectl get httproute -A -o yaml | grep -B 5 -A 10 "argocd\." || echo "No argocd HTTPRoute found"
            echo ""
            echo "=== All TLS Secrets in kgateway-system ==="
            kubectl get secrets -n kgateway-system | grep tls || echo "No TLS secrets found"
            echo ""
            echo "=== Ingress Resources ==="
            kubectl get ingress -A | grep -E "argocd|gitea|keycloak" || echo "No ingresses found"
          register: gateway_debug
          changed_when: false
          ignore_errors: true

        - name: Display Gateway debug info
          ansible.builtin.debug:
            var: gateway_debug.stdout_lines

        - name: Test new domain accessibility with verbose output
          ansible.builtin.shell: |
            echo "=== Testing HTTPS Connection ==="
            curl -v -k --connect-timeout 10 --max-time 15 \
              "https://argocd.{{ new_domain }}/api/version" 2>&1 || echo "curl failed with exit code: $?"
          register: curl_debug
          changed_when: false
          ignore_errors: true

        - name: Display curl debug info
          ansible.builtin.debug:
            var: curl_debug.stdout_lines

        - name: Test new domain accessibility
          ansible.builtin.uri:
            url: "https://argocd.{{ new_domain }}/api/version"
            method: GET
            validate_certs: false
            status_code: [200, 401, 403]  # 401/403 are ok - service is responding
          register: domain_check
          retries: 3
          delay: 15
          ignore_errors: true

        - name: Display completion status
          ansible.builtin.debug:
            msg: |
              🎯 Domain Change Complete with DNS Integration!
              
              ✅ Updated cluster-values repository with new domain
              ✅ Applied new TLS certificates to cluster
              ✅ Updated domain ConfigMap (no automatic watching)
              ✅ Triggered one-time ArgoCD sync
              {% if cluster_bloom_dns_enabled %}✅ Updated system DNS (DNSMASQ) configuration{% else %}⚠️  No system DNS (DNSMASQ) detected - cluster-bloom not used{% endif %}
              {% if domain_check is succeeded %}✅ New domain is accessible{% else %}⚠️  Domain check failed - may need time to propagate{% endif %}
              
              Domain Integration Summary:
              • Previous domain: {{ old_domain }} (K8s) / {{ current_dns_domain if current_dns_domain else "none" }} (DNS)
              • New domain: {{ new_domain }}
              • Cluster-Bloom DNS: {% if cluster_bloom_dns_enabled %}ENABLED and UPDATED{% else %}NOT DETECTED{% endif %}
              • FIX_DNS was used: {% if cluster_bloom_fix_dns_used %}YES{% else %}NO{% endif %}
              
              Access URLs:
              • ArgoCD:  https://argocd.{{ new_domain }}
              • Gitea:   https://gitea.{{ new_domain }}
              • Keycloak: https://kc.{{ new_domain }}
              
              🔥 The fire of the forge eliminates impurities!
              
              Note: This simplified implementation removes all automatic 
              watching/polling. Future domain changes require re-running 
              this playbook manually.
