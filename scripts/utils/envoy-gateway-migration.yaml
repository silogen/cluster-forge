---
# Comprehensive Envoy-Gateway Migration Job
# 
# This one-time job combines TLS secret migration and node labeling operations
# for users upgrading their cluster from kgateway to envoy-gateway.
#
# Usage: 
#   1. Ensure MetalLB is deployed: kubectl get ipaddresspool cluster-bloom-ip-pool -n metallb-system
#   2. Apply this job: kubectl apply -f envoy-gateway-migration.yaml
#   3. Monitor progress: kubectl logs -f job/envoy-gateway-migration -n envoy-gateway-system
#   4. Clean up: kubectl delete -f envoy-gateway-migration.yaml (auto-cleanup after 10 minutes)
#   5. Proceed with cluster-forge upgrade
#
# Operations performed:
#   Phase 1 (Init Container): Creates envoy-gateway-system namespace and copies cluster-tls secret from kgateway-system
#   Phase 2 (Main Container): Labels first node with cluster-bloom/first-node=true based on MetalLB IP
#

# Namespace for envoy-gateway-system (created first)
apiVersion: v1
kind: Namespace
metadata:
  name: envoy-gateway-system
  labels:
    app.kubernetes.io/name: envoy-gateway
    app.kubernetes.io/part-of: cluster-forge
---
# ServiceAccount for comprehensive migration
apiVersion: v1
kind: ServiceAccount
metadata:
  name: envoy-gateway-migration-sa
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/name: envoy-gateway-migration
    app.kubernetes.io/part-of: cluster-forge
---
# ClusterRole with combined permissions for both operations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: envoy-gateway-migration-role
  labels:
    app.kubernetes.io/name: envoy-gateway-migration
    app.kubernetes.io/part-of: cluster-forge
rules:
# Secrets management (for TLS copy operation)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "patch"]
# Namespace management (for TLS copy operation)  
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "create"]
# Node management (for node labeling operation)
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "patch", "update"]
# MetalLB IPAddressPool access (for node labeling operation)
- apiGroups: ["metallb.io"]
  resources: ["ipaddresspools"]
  verbs: ["get", "list"]
---
# ClusterRoleBinding to grant permissions to ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: envoy-gateway-migration-binding
  labels:
    app.kubernetes.io/name: envoy-gateway-migration
    app.kubernetes.io/part-of: cluster-forge
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: envoy-gateway-migration-role
subjects:
- kind: ServiceAccount
  name: envoy-gateway-migration-sa
  namespace: envoy-gateway-system
---
# Comprehensive migration job with sequential execution
apiVersion: batch/v1
kind: Job
metadata:
  name: envoy-gateway-migration
  namespace: envoy-gateway-system
  labels:
    app.kubernetes.io/name: envoy-gateway-migration
    app.kubernetes.io/part-of: cluster-forge
  annotations:
    description: "Comprehensive one-time migration from kgateway to envoy-gateway"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600  # Auto-cleanup after 10 minutes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: envoy-gateway-migration
        app.kubernetes.io/part-of: cluster-forge
    spec:
      restartPolicy: OnFailure
      serviceAccountName: envoy-gateway-migration-sa
      
      # Phase 1: TLS Secret Copy (Init Container)
      initContainers:
      - name: tls-copy
        image: alpine/k8s:1.28.13
        command:
        - /bin/sh
        - -c
        - |
          echo "🔧 Envoy-Gateway Migration Job Started"
          echo "================================================"
          echo
          echo "📋 Phase 1: TLS Secret Migration"
          echo "--------------------------------"
          
          # Check if source secret exists
          if ! kubectl get secret cluster-tls -n kgateway-system >/dev/null 2>&1; then
            echo "ℹ️  Source secret cluster-tls not found in kgateway-system namespace"
            echo "ℹ️  This is expected during initial deployment - no copy needed"
            echo "✅ Phase 1 Complete: TLS migration skipped (no source secret)"
            echo
            # Create status file for main container
            echo "skipped" > /shared/tls-status
            exit 0
          fi
          
          # Verify target namespace exists (should exist from manifest)
          if ! kubectl get namespace envoy-gateway-system >/dev/null 2>&1; then
            echo "❌ ERROR: envoy-gateway-system namespace not found"
            echo "❌ This job should be applied after namespace creation"
            exit 1
          fi
          echo "✅ envoy-gateway-system namespace verified"
          
          # Check if target secret already exists
          if kubectl get secret cluster-tls -n envoy-gateway-system >/dev/null 2>&1; then
            echo "ℹ️  Target secret cluster-tls already exists in envoy-gateway-system"
            echo "✅ Phase 1 Complete: TLS migration already done"
            echo
            # Create status file for main container
            echo "exists" > /shared/tls-status
            exit 0
          fi
          
          echo "🔄 Copying cluster-tls secret with identical key-value pairs..."
          
          # Copy the secret directly using kubectl
          kubectl get secret cluster-tls -n kgateway-system -o yaml | \
          sed 's/namespace: kgateway-system/namespace: envoy-gateway-system/' | \
          sed '/resourceVersion:/d' | \
          sed '/uid:/d' | \
          sed '/creationTimestamp:/d' | \
          kubectl apply -f -
          
          if [ $? -eq 0 ]; then
            echo "✅ Successfully copied cluster-tls secret to envoy-gateway-system"
            echo "✅ Secret contains the same key-value pairs as the original"
            echo "✅ Phase 1 Complete: TLS migration successful"
            echo
            # Create status file for main container
            echo "copied" > /shared/tls-status
          else
            echo "❌ Failed to copy cluster-tls secret"
            exit 1
          fi
        resources:
          requests:
            cpu: "50m"
            memory: "256Mi" 
          limits:
            cpu: "100m"
            memory: "512Mi"
        volumeMounts:
        - name: shared-data
          mountPath: /shared
      
      # Phase 2: Node Labeling (Main Container)
      containers:
      - name: node-labeling
        image: bitnami/kubectl:latest
        command: ["/bin/bash"]
        args:
        - -c
        - |
          set -e
          
          echo "📋 Phase 2: Node Labeling for Gateway Placement"
          echo "----------------------------------------------"
          
          # Check TLS migration status
          if [ -f /shared/tls-status ]; then
            TLS_STATUS=$(cat /shared/tls-status)
            case $TLS_STATUS in
              "copied")
                echo "ℹ️  Phase 1 Result: TLS secret successfully copied"
                ;;
              "exists")
                echo "ℹ️  Phase 1 Result: TLS secret already existed"
                ;;
              "skipped")
                echo "ℹ️  Phase 1 Result: TLS migration skipped (no source secret)"
                ;;
            esac
          else
            echo "⚠️  Warning: Could not determine Phase 1 status"
          fi
          echo
          
          # Colors for output
          RED='\033[0;31m'
          GREEN='\033[0;32m'
          YELLOW='\033[1;33m'
          BLUE='\033[0;34m'
          NC='\033[0m'
          
          print_success() { echo -e "${GREEN}✅ $1${NC}"; }
          print_error() { echo -e "${RED}❌ $1${NC}"; }
          print_warning() { echo -e "${YELLOW}⚠️  $1${NC}"; }
          print_info() { echo -e "${BLUE}🔍 $1${NC}"; }
          print_target() { echo -e "${BLUE}🎯 $1${NC}"; }
          
          # 1. Check if MetalLB IPAddressPool exists
          print_info "Checking for MetalLB IPAddressPool..."
          if ! kubectl get ipaddresspool cluster-bloom-ip-pool -n metallb-system >/dev/null 2>&1; then
            print_error "MetalLB IPAddressPool 'cluster-bloom-ip-pool' not found"
            print_info "Ensure cluster-forge has deployed MetalLB before running this job"
            print_info "Check with: kubectl get ipaddresspool -n metallb-system"
            exit 1
          fi
          print_success "MetalLB IPAddressPool found"
          
          # 2. Extract IP address from MetalLB pool
          print_info "Extracting IP address from MetalLB pool..."
          METALLB_IP=$(kubectl get ipaddresspool cluster-bloom-ip-pool -n metallb-system -o jsonpath='{.spec.addresses[0]}' | cut -d'/' -f1)
          
          if [ -z "$METALLB_IP" ]; then
            print_error "Could not extract IP from MetalLB IPAddressPool"
            print_info "Check pool configuration: kubectl describe ipaddresspool cluster-bloom-ip-pool -n metallb-system"
            exit 1
          fi
          print_success "Found MetalLB IP: $METALLB_IP"
          
          # 3. Find node with matching IP in annotations
          print_info "Searching for node with IP $METALLB_IP..."
          
          # Get all nodes and their annotations, search for matching IP
          TARGET_NODE=""
          while read -r node_name annotations; do
            if echo "$annotations" | grep -q "\"alpha.kubernetes.io/provided-node-ip\":\"$METALLB_IP\"" || \
               echo "$annotations" | grep -q "\"etcd.rke2.cattle.io/node-address\":\"$METALLB_IP\"" || \
               echo "$annotations" | grep -q "\"rke2.cattle.io/node-external-ip\":\"$METALLB_IP\""; then
              TARGET_NODE="$node_name"
              break
            fi
          done < <(kubectl get nodes -o jsonpath='{range .items[*]}{.metadata.name}{" "}{.metadata.annotations}{"\n"}{end}')
          
          # 4. Validate we found a node
          if [ -z "$TARGET_NODE" ]; then
            print_error "No node found with IP $METALLB_IP in node annotations"
            print_warning "Checked annotations:"
            print_warning "  - alpha.kubernetes.io/provided-node-ip"
            print_warning "  - etcd.rke2.cattle.io/node-address"
            print_warning "  - rke2.cattle.io/node-external-ip"
            echo
            print_info "Available nodes and their IPs:"
            kubectl get nodes -o custom-columns="NAME:.metadata.name,EXTERNAL-IP:.status.addresses[?(@.type==\"ExternalIP\")].address,INTERNAL-IP:.status.addresses[?(@.type==\"InternalIP\")].address" 2>/dev/null || kubectl get nodes -o wide
            echo
            print_info "Debug: Node annotations containing IP addresses:"
            kubectl get nodes -o jsonpath='{range .items[*]}{.metadata.name}{": "}{.metadata.annotations}{"\n"}{end}' | grep -E '(provided-node-ip|node-address|node-external-ip)' || echo "No matching annotations found"
            exit 1
          fi
          
          print_target "Target node identified: $TARGET_NODE"
          
          # 5. Check if label already exists
          EXISTING_LABEL=$(kubectl get node "$TARGET_NODE" -o jsonpath='{.metadata.labels.cluster-bloom/first-node}' 2>/dev/null || echo "")
          
          if [ "$EXISTING_LABEL" = "true" ]; then
            print_success "Node $TARGET_NODE already has cluster-bloom/first-node=true label"
            print_info "No action needed. Label is already correctly applied."
            print_info "Current cluster-bloom labels on $TARGET_NODE:"
            kubectl get node "$TARGET_NODE" --show-labels | grep -o 'cluster-bloom/[^,]*' | head -5 || echo "No cluster-bloom labels found"
            echo
            print_target "Next steps:"
            print_info "1. Proceed with cluster-forge upgrade"
            print_info "2. Verify envoy-gateway pods schedule on this node"
            echo "✅ Phase 2 Complete: Node labeling already done"
            echo
            echo "🚀 MIGRATION COMPLETE"
            echo "Next steps:"
            echo "1. Proceed with cluster-forge upgrade"  
            echo "2. Verify envoy-gateway pods schedule correctly"
            echo "3. Validate LoadBalancer service functionality"
            echo
            echo "Job will auto-delete in 10 minutes"
            exit 0
          elif [ -n "$EXISTING_LABEL" ]; then
            print_warning "Node $TARGET_NODE has cluster-bloom/first-node=$EXISTING_LABEL (will be updated to 'true')"
          fi
          
          # 6. Apply the label
          print_info "Applying label cluster-bloom/first-node=true to node $TARGET_NODE..."
          if kubectl label node "$TARGET_NODE" cluster-bloom/first-node=true --overwrite >/dev/null 2>&1; then
            print_success "Label applied successfully"
          else
            print_error "Failed to apply label to node $TARGET_NODE"
            print_info "Check permissions: kubectl auth can-i patch nodes"
            exit 1
          fi
          
          # 7. Verify the label was applied
          print_info "Verifying label application..."
          APPLIED_LABEL=$(kubectl get node "$TARGET_NODE" -o jsonpath='{.metadata.labels.cluster-bloom/first-node}' 2>/dev/null || echo "")
          
          if [ "$APPLIED_LABEL" = "true" ]; then
            echo
            print_success "SUCCESS! Label cluster-bloom/first-node=true applied to node $TARGET_NODE"
            echo
            print_info "Label verification:"
            kubectl get node "$TARGET_NODE" --show-labels | grep 'cluster-bloom/first-node=true' && echo "  ✅ Label confirmed"
            echo
            print_target "Next steps:"
            print_info "1. Proceed with cluster-forge upgrade to deploy envoy-gateway with node targeting"
            print_info "2. Verify envoy-gateway pods schedule on the labeled node:"
            print_info "   kubectl get pods -n envoy-gateway-system -o wide"
            print_info "3. Check that LoadBalancer services get IPs from MetalLB:"
            print_info "   kubectl get svc -A --field-selector spec.type=LoadBalancer"
            echo
            print_success "✅ Phase 2 Complete: Node labeling successful"
            echo
            echo "🚀 MIGRATION COMPLETE"
            echo "Next steps:"
            echo "1. Proceed with cluster-forge upgrade"
            echo "2. Verify envoy-gateway pods schedule correctly"  
            echo "3. Validate LoadBalancer service functionality"
            echo
            print_success "Upgrade preparation complete!"
            print_info "Job will auto-delete in 10 minutes"
          else
            print_error "FAILED! Label was not applied correctly"
            print_error "Expected: cluster-bloom/first-node=true"
            print_error "Actual: cluster-bloom/first-node=$APPLIED_LABEL"
            exit 1
          fi
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "200m"
            memory: "512Mi"
        volumeMounts:
        - name: shared-data
          mountPath: /shared
      
      volumes:
      - name: shared-data
        emptyDir: {}
      
      tolerations:
      # Allow scheduling on any node regardless of taints
      - operator: Exists
