apiVersion: v1
kind: ConfigMap
metadata:
  name: gitea-init-scripts
  namespace: cf-gitea
data:
  init-gitea.sh: |
    #!/bin/bash

    set -e
    DOMAIN={{ .Values.domain }}
    GITEA_URL="${GITEA_URL:-http://gitea-http.cf-gitea.svc:3000}"
    GITEA_ADMIN_USER="${GITEA_ADMIN_USER:-silogen-admin}"
    
    echo "Waiting for Gitea service to be ready..."
    for i in {1..30}; do
      if curl -s --max-time 5 "${GITEA_URL}" >/dev/null 2>&1; then
        echo "Gitea service is ready and responding"
        break
      fi
      if [ $i -eq 30 ]; then
        echo "ERROR: Gitea service not ready after 30 attempts"
        exit 1
      fi
      echo "Waiting for Gitea to be ready... attempt $i/30"
      sleep 2
    done
    
    echo "Step 0: Create admin access token"
    GITEA_TOKEN=$(kubectl -n cf-gitea exec deploy/gitea -c gitea -- \
      gitea admin user generate-access-token --raw --username "$GITEA_ADMIN_USER" --token-name "api-token-$(date +%s)" --scopes all
    )
    kubectl create secret generic gitea-admin-token --from-literal=token="${GITEA_TOKEN}" --namespace=cf-gitea --dry-run=client -o yaml | kubectl apply -f -
    
    echo "Step 1: Creating organization 'cluster-org'..."
    curl -X POST "${GITEA_URL}/api/v1/orgs" \
      -H "Authorization: token ${GITEA_TOKEN}" \
      -H "Content-Type: application/json" \
      -d '{
        "username": "cluster-org",
        "full_name": "Cluster Organization",
        "description": "Organization for cluster management repositories",
        "visibility": "public"
      }' || echo "Failed to create organization, might already exist"
    
    echo "Step 2: Creating repository 'cluster-forge' as mirror..."
    if curl -s -f -H "Authorization: token ${GITEA_TOKEN}" "${GITEA_URL}/api/v1/repos/cluster-org/cluster-forge" >/dev/null 2>&1; then
      echo "Repository 'cluster-forge' already exists"
    else
        MAX_ATTEMPTS=5
        ATTEMPT=1
        SUCCESS=false
        
        while [ $ATTEMPT -le $MAX_ATTEMPTS ] && [ "$SUCCESS" = false ]; do
            echo "Migration attempt $ATTEMPT/$MAX_ATTEMPTS..."
            
            HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/migration_response.json -X POST "${GITEA_URL}/api/v1/repos/migrate" \
              -H "Authorization: token ${GITEA_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{
                "clone_addr": "https://github.com/silogen/cluster-forge.git",
                "repo_name": "cluster-forge",
                "repo_owner": "cluster-org",
                "service": "git",
                "mirror": true,
                "mirror_interval": "15m",
                "private": false
              }')
            
            case $HTTP_CODE in
                201)
                    echo "Repository migration completed successfully"
                    SUCCESS=true
                    ;;
                *)
                    echo "Attempt $ATTEMPT failed with HTTP $HTTP_CODE, retrying..."
                    echo "Cleaning up failed repository..."
                    sleep 1
                    curl -s -X DELETE "${GITEA_URL}/api/v1/repos/cluster-org/cluster-forge" \
                      -H "Authorization: token ${GITEA_TOKEN}" >/dev/null 2>&1
                    echo "Failed repository deleted..."
                    ;;
            esac
            
            if [ "$SUCCESS" = false ] && [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                sleep 5
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
        done
        
        if [ "$SUCCESS" = false ]; then
            echo "ERROR: Failed to create mirror repository after $MAX_ATTEMPTS attempts"
            exit 1
        fi
    fi

    # set mirror default branch (--dev mode)
    if [ "{{ .Values.targetRevision }}" != "main" ]; then
      curl -X PATCH "${GITEA_URL}/api/v1/repos/cluster-org/cluster-forge" \
      -H "Authorization: token ${GITEA_TOKEN}" \
      -H "Content-Type: application/json" \
      -d '{"default_branch": "{{ .Values.targetRevision }}"}'
    fi
    
    echo "Step 3: Creating repository 'cluster-values'..."
    curl -X POST "${GITEA_URL}/api/v1/orgs/cluster-org/repos" \
      -H "Authorization: token ${GITEA_TOKEN}" \
      -H "Content-Type: application/json" \
      -d '{
        "name": "cluster-values",
        "description": "Cluster configuration values repository",
        "private": false,
        "auto_init": true
      }' || echo "Repository might already exist"
    
    echo "Step 4: Creating user 'devuser'..."
    curl -X POST "${GITEA_URL}/api/v1/admin/users" \
      -H "Authorization: token ${GITEA_TOKEN}" \
      -H "Content-Type: application/json" \
      -d '{
        "username": "devuser",
        "email": "devuser@'${DOMAIN}'",
        "password": "password",
        "full_name": "Dev User",
        "must_change_password": false,
        "send_notify": false
      }' || echo "User creation failed, might already exist or insufficient permissions"
    
    echo "Step 5: Getting organization 'cluster-org' owners team id..."
    OWNERS_TEAM_ID=$(curl -s -H "Authorization: token ${GITEA_TOKEN}" -H "Content-Type: application/json" \
      "${GITEA_URL}/api/v1/orgs/cluster-org/teams" | \
      jq -r '.[] | select(.name == "Owners") | .id')
    
    echo "Step 6: Adding user 'devuser' to organization 'cluster-org' owners..."
    curl -X PUT "${GITEA_URL}/api/v1/teams/${OWNERS_TEAM_ID}/members/devuser" \
      -H "Authorization: token ${GITEA_TOKEN}" \
      -H "Content-Type: application/json" || echo "Failed to add user to organization"
    
    echo "Step 7: Creating values.yaml file with cluster-forge reference in cluster-values repo..."
    
    # Get the complete values file from the configmap created by bootstrap.sh
    echo "DEBUG: Checking if initial-cf-values configmap exists..."
    if kubectl get configmap initial-cf-values -n cf-gitea >/dev/null 2>&1; then
        echo "DEBUG: ConfigMap found, extracting data..."
        kubectl get configmap initial-cf-values -n cf-gitea -o jsonpath='{.data.initial-cf-values}' > /tmp/complete_values.yaml
        
        # Debug: Show what we got from the configmap
        echo "DEBUG: Content of initial-cf-values configmap (first 20 lines):"
        head -20 /tmp/complete_values.yaml
        echo "DEBUG: File size: $(wc -l < /tmp/complete_values.yaml) lines"
        
        # Install yq if not present (lightweight approach)
        if ! command -v yq >/dev/null 2>&1; then
            echo "DEBUG: Installing yq..."
            wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
            chmod +x /usr/local/bin/yq
        fi
        
        echo "DEBUG: Checking for enabledApps section:"
        yq eval '.enabledApps' /tmp/complete_values.yaml || echo "DEBUG: No enabledApps found"
        echo "DEBUG: EnabledApps count: $(yq eval '.enabledApps | length' /tmp/complete_values.yaml 2>/dev/null || echo 0)"
    else
        echo "ERROR: initial-cf-values configmap not found!"
        exit 1
    fi
    
    # Extract enabledApps and create enabledApps section with disabled apps commented out
    cat > /tmp/values.yaml << 'EOF'
    clusterForge:
      repoURL: http://gitea-http.cf-gitea.svc:3000/cluster-org/cluster-forge.git
      path: root
      targetRevision:  {{ .Values.targetRevision }}
    
    # clusterSize is set by bootstrap script via --CLUSTER_SIZE=values_<size>.yaml (defaults to medium)
    global:
      clusterSize: {{ .Values.clusterSize }}
      domain: DOMAIN_PLACEHOLDER
    
    # Applications enabled for this cluster
    # This overrides the enabledApps from size-specific values to exclude disabled apps
    enabledApps:
    EOF
    
    # Get the complete app list from the merged values (which includes size-specific enabledApps)
    {{- if .Values.disabledApps }}
    echo "DEBUG: Filtering out disabled apps: {{ .Values.disabledApps }}"
    
    # Validate that disabled patterns match at least one real app
    echo "DEBUG: Validating disabled app patterns..."
    IFS=',' read -ra PATTERNS <<< "{{ .Values.disabledApps }}"
    declare -A pattern_matched
    for pattern in "${PATTERNS[@]}"; do
      pattern_matched["$pattern"]=false
    done
    
    # Process enabledApps with disabled apps filtered out completely
    yq eval '.enabledApps[]' /tmp/complete_values.yaml | while IFS= read -r app; do
      # Check if app matches any disabled pattern (supports wildcards)
      disabled=false
      matched_pattern=""
      for pattern in "${PATTERNS[@]}"; do
        # Use case statement for wildcard matching
        case "$app" in
          $pattern) 
            disabled=true
            matched_pattern="$pattern"
            pattern_matched["$pattern"]=true
            break
            ;;
        esac
      done
      
      if [ "$disabled" = "true" ]; then
        echo "DEBUG: Excluding disabled app: $app (matches pattern: $matched_pattern)"
        # Add as comment for documentation
        echo "  #- $app                    # Disabled by --disabled-apps" >> /tmp/values.yaml
      else
        echo "DEBUG: Including enabled app: $app"
        echo "  - $app" >> /tmp/values.yaml
      fi
    done
    
    # Check if any patterns didn't match anything
    echo "DEBUG: Checking for unmatched patterns..."
    unmatched_patterns=()
    for pattern in "${PATTERNS[@]}"; do
      # Re-check each pattern against all apps
      pattern_found=false
      while IFS= read -r app; do
        case "$app" in
          $pattern) 
            pattern_found=true
            break
            ;;
        esac
      done < <(yq eval '.enabledApps[]' /tmp/complete_values.yaml)
      
      if [ "$pattern_found" = "false" ]; then
        unmatched_patterns+=("$pattern")
      fi
    done
    
    # Fail if any patterns didn't match
    if [ ${#unmatched_patterns[@]} -gt 0 ]; then
      echo "ERROR: The following disabled app patterns did not match any applications:"
      for pattern in "${unmatched_patterns[@]}"; do
        echo "  - $pattern"
      done
      echo ""
      echo "Available applications:"
      yq eval '.enabledApps[]' /tmp/complete_values.yaml | sed 's/^/  - /'
      echo ""
      echo "Please check your --disabled-apps parameter for typos."
      exit 1
    fi
    {{- else }}
    echo "DEBUG: No disabled apps specified, including all apps normally"
    # No disabled apps, include all enabledApps from merged values
    yq eval '.enabledApps[]' /tmp/complete_values.yaml | while IFS= read -r app; do
      echo "DEBUG: Adding app: $app"
      echo "  - $app" >> /tmp/values.yaml
    done
    {{- end }}
    
    {{- if .Values.airmImageRepository }}
    
    # Add AIRM configuration if repository is specified
    cat >> /tmp/values.yaml << 'EOF'

    # AIRM Image Repository Configuration
    apps:
      airm:
        helmParameters:
          # APP-DOMAIN (defined in base, but would be overridden here if omitted)
          - name: airm-api.airm.appDomain
            value: "DOMAIN_PLACEHOLDER"
          # BACKEND (airm-api)
          - name: airm-api.airm.backend.image.repository
            value: "{{ .Values.airmImageRepository }}/airm-api"
          - name: airm-api.airm.backend.imagePullSecrets[0].name
            value: regcred
          # FRONTEND (airm-ui)
          - name: airm-api.airm.frontend.image.repository
            value: "{{ .Values.airmImageRepository }}/airm-ui"
          - name: airm-api.airm.frontend.imagePullSecrets[0].name
            value: regcred
          # DISPATCHER (airm-dispatcher)
          - name: airm-dispatcher.airm.dispatcher.image.repository
            value: "{{ .Values.airmImageRepository }}/airm-dispatcher"
          - name: airm-dispatcher.airm.dispatcher.imagePullSecrets[0].name
            value: regcred
          # AGENT (airm-agent)
          - name: agent.airm.imagePullSecrets[0].name
            value: regcred
    EOF
    {{- end }}
    
    sed -i "s/DOMAIN_PLACEHOLDER/${DOMAIN}/g" /tmp/values.yaml
    
    # Debug: Show final values.yaml content
    echo "DEBUG: Final values.yaml content:"
    cat /tmp/values.yaml
    
    curl -X POST "${GITEA_URL}/api/v1/repos/cluster-org/cluster-values/contents/values.yaml" \
      -H "Authorization: token ${GITEA_TOKEN}" \
      -H "Content-Type: application/json" \
      -d '{
        "message": "Initialize cluster values configuration",
        "content": "'$(base64 -w 0 < /tmp/values.yaml)'",
        "branch": "main"
      }' || echo "Failed to create values.yaml file"
    
    echo "Setup completed successfully!"
