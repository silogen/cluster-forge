---
# Create ClusterForge parent application

- name: Deploy ClusterForge parent application
  ansible.builtin.shell: |
    helm template cluster-forge "{{ source_root }}/root" \
      --show-only templates/cluster-forge.yaml \
      --values "{{ base_values_file }}" \
      {% if size_values_stat.stat.exists %}--values "{{ size_values_file }}" \{% endif %}
      --set global.clusterSize="values_{{ cluster_size }}.yaml" \
      --set global.domain="{{ domain }}" \
      --set clusterForge.targetRevision="{{ target_revision }}" \
      --namespace argocd \
      --kube-version "{{ kube_version }}" | \
    kubectl apply -f -
  when: not template_only
  changed_when: true

- name: Log ClusterForge application creation
  ansible.builtin.debug:
    msg:
      - "=== Creating ClusterForge Parent App ==="
      - "Target revision: {{ target_revision }}"
  when: not template_only
